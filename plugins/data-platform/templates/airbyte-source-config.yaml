# ---------------------------------------------------------------------------
# Airbyte source connector configuration starter
# ---------------------------------------------------------------------------
# Generated by data-platform/templates/airbyte-source-config.yaml
# Last reviewed: 2026-05-21
#
# Use this as a starting point for new Airbyte source configurations.
# Fill in the {{...}} placeholders and remove sources you don't need.
#
# For each source: credentials live in env vars, NEVER inline.
# The data-platform-smells hook flags inline secrets.
#
# Companion docs:
#   - data-platform/skills/connector-configuration.md
#   - data-platform/knowledge/ipaas-connector-landscape-2026.md
#   - data-platform/knowledge/quickbooks-online-integration.md
# ---------------------------------------------------------------------------

# Engagement metadata (used by destination + sync orchestration)
engagement:
  client_name: "{{Client Name}}"
  case: "{{A | B | C | D}}"
  start_date: "{{YYYY-MM-DD}}"
  destination_warehouse: "{{Supabase Pro / Postgres / BigQuery / Snowflake / etc.}}"

# ---------------------------------------------------------------------------
# Source: QuickBooks Online
# ---------------------------------------------------------------------------
# Rate limits: 10 req/s per realm-ID; batch 120/min; concurrent ~10
# OAuth: 1-hour access tokens; 100-day rolling refresh expiry
# ---------------------------------------------------------------------------
sources:
  quickbooks_online:
    type: source-quickbooks
    enabled: false  # flip to true when configuring
    connection:
      auth_type: oauth2
      client_id: "${QBO_CLIENT_ID}"
      client_secret: "${QBO_CLIENT_SECRET}"
      refresh_token: "${QBO_REFRESH_TOKEN}"  # rotate on every use; persist new token
      realm_id: "${QBO_REALM_ID}"
      sandbox: false
    streams:
      - name: Customer
        sync_mode: incremental
        cursor_field: MetaData.LastUpdatedTime
        primary_key: Id
      - name: Invoice
        sync_mode: incremental
        cursor_field: MetaData.LastUpdatedTime
        primary_key: Id
      - name: Payment
        sync_mode: incremental
        cursor_field: MetaData.LastUpdatedTime
        primary_key: Id
      - name: Bill
        sync_mode: incremental
      - name: Item
        sync_mode: incremental
      - name: Account
        sync_mode: full_refresh  # chart of accounts changes rarely
      - name: JournalEntry
        sync_mode: incremental
    sync_cadence: daily  # nightly is the default; hourly only if dashboard needs intraday
    rate_limit:
      max_requests_per_second: 10
      max_concurrent: 10
      retry_after_header_honored: true

  # -------------------------------------------------------------------------
  # Source: Stripe
  # -------------------------------------------------------------------------
  # Pattern: batch ELT for history + separate webhook handlers for real-time
  # -------------------------------------------------------------------------
  stripe:
    type: source-stripe
    enabled: false
    connection:
      account_id: "${STRIPE_ACCOUNT_ID}"
      client_secret: "${STRIPE_SECRET_KEY}"  # use restricted key in production
      start_date: "{{YYYY-MM-DD}}"
      lookback_window_days: 0  # 0 = no lookback; increase to handle late-arriving events
    streams:
      - name: customers
        sync_mode: incremental
      - name: charges
        sync_mode: incremental
      - name: payment_intents
        sync_mode: incremental
      - name: subscriptions
        sync_mode: incremental
      - name: invoices
        sync_mode: incremental
      - name: refunds
        sync_mode: incremental
      - name: disputes
        sync_mode: incremental
    sync_cadence: daily

  # -------------------------------------------------------------------------
  # Source: Salesforce
  # -------------------------------------------------------------------------
  # Bulk API 2.0: 150M records/day, 15k batches/24h, 10k records/batch, 10MB payload
  # -------------------------------------------------------------------------
  salesforce:
    type: source-salesforce
    enabled: false
    connection:
      auth_type: oauth2
      client_id: "${SF_CLIENT_ID}"
      client_secret: "${SF_CLIENT_SECRET}"
      refresh_token: "${SF_REFRESH_TOKEN}"
      is_sandbox: false
      start_date: "{{YYYY-MM-DD}}"
    streams:
      - name: Account
        sync_mode: incremental
        cursor_field: LastModifiedDate
      - name: Contact
        sync_mode: incremental
        cursor_field: LastModifiedDate
      - name: Opportunity
        sync_mode: incremental
        cursor_field: LastModifiedDate
      - name: Case
        sync_mode: incremental
        cursor_field: LastModifiedDate
      # Add custom objects per engagement scope
    sync_cadence: daily

  # -------------------------------------------------------------------------
  # Source: HubSpot
  # -------------------------------------------------------------------------
  # Rate limits: 110/10s OAuth marketplace; 4/sec CRM Search API
  # -------------------------------------------------------------------------
  hubspot:
    type: source-hubspot
    enabled: false
    connection:
      auth_type: oauth2
      client_id: "${HUBSPOT_CLIENT_ID}"
      client_secret: "${HUBSPOT_CLIENT_SECRET}"
      refresh_token: "${HUBSPOT_REFRESH_TOKEN}"
      start_date: "{{YYYY-MM-DD}}"
    streams:
      - name: companies
      - name: contacts
      - name: deals
      - name: tickets
      - name: engagements
    sync_cadence: daily

  # -------------------------------------------------------------------------
  # Source: Google Analytics 4
  # -------------------------------------------------------------------------
  # NOTE: native BigQuery export is FREE and the recommended path when
  # destination is BigQuery. Use this Airbyte connector only when destination
  # is NOT BigQuery.
  # -------------------------------------------------------------------------
  ga4:
    type: source-google-analytics-data-api
    enabled: false
    connection:
      property_ids:
        - "${GA4_PROPERTY_ID}"
      credentials_json: "${GA4_SERVICE_ACCOUNT_JSON}"  # base64-encoded JSON in env
      date_ranges_start_date: "{{YYYY-MM-DD}}"
    custom_reports:
      - name: traffic_acquisition
        dimensions: [sessionDefaultChannelGroup, date]
        metrics: [sessions, newUsers, engagedSessions, engagementRate]
      - name: page_path_engagement
        dimensions: [pagePath, date]
        metrics: [screenPageViews, averageSessionDuration]
    sync_cadence: daily

  # -------------------------------------------------------------------------
  # Source: Shopify
  # -------------------------------------------------------------------------
  # GraphQL Admin API required for new apps since April 1, 2025
  # -------------------------------------------------------------------------
  shopify:
    type: source-shopify
    enabled: false
    connection:
      shop: "${SHOPIFY_SHOP_DOMAIN}"  # e.g., "store-name" (without .myshopify.com)
      credentials:
        auth_method: oauth2
        client_id: "${SHOPIFY_CLIENT_ID}"
        client_secret: "${SHOPIFY_CLIENT_SECRET}"
        access_token: "${SHOPIFY_ACCESS_TOKEN}"
      start_date: "{{YYYY-MM-DD}}"
    streams:
      - name: customers
      - name: orders
      - name: order_refunds
      - name: products
      - name: inventory_items
    sync_cadence: daily

# ---------------------------------------------------------------------------
# Destination
# ---------------------------------------------------------------------------
destination:
  type: "{{destination-postgres | destination-supabase | destination-bigquery | destination-snowflake}}"
  connection:
    host: "${DESTINATION_HOST}"
    port: "${DESTINATION_PORT}"
    database: "${DESTINATION_DATABASE}"
    username: "${DESTINATION_USERNAME}"
    password: "${DESTINATION_PASSWORD}"  # in env var; the hook flags inline secrets
    schema: "{{raw_<source_name>}}"  # one schema per source for clean dbt-ingest

# ---------------------------------------------------------------------------
# Acceptance criteria
# ---------------------------------------------------------------------------
# Before turning a source's enabled flag to true:
#   * Credentials provisioned in env vars (NEVER inline)
#   * OAuth refresh tokens persisted with rotation-on-use discipline
#   * Initial historical backfill scope sized (start_date set)
#   * Rate-limit-aware retry verified (Airbyte CDK honors Retry-After by default)
#   * Destination schema created (separate schema per source)
#   * Cost estimate calculated (Airbyte credit consumption / Fivetran MAR)
#
# Refresh triggers for this template:
#   * Source API version-bump (e.g., Shopify GraphQL transition)
#   * Airbyte CDK release with new auth method or stream patterns
#   * New source added to the consulting practice's regular toolkit
#   * Rate-limit numbers change (verify quarterly)
