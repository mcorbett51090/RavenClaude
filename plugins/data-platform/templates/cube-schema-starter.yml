# Cube schema starter — multi-tenant analytics
# ---------------------------------------------------------------------------
# Generated by data-platform/templates/cube-schema-starter.yml
# Last reviewed: 2026-05-21
#
# This file is the Cube schema convention starter for a Case C (productized SaaS)
# or Case B-with-Cube engagement. Drop into your Cube project's schema/ directory.
#
# Demonstrates:
#   1. A cube with measures + dimensions
#   2. access_policy with securityContext (multi-tenant scoping)
#   3. Pre-aggregation pattern with tenant_id partition
#   4. A view that isolates the partner-facing query surface
#
# CRITICAL: every cube touching tenant-scoped data MUST have access_policy.
# Without it, Cube serves whatever the query asks for — catastrophic for
# multi-tenant deployments.
#
# Used together with:
#   - templates/database-schema-starter.sql — the underlying Postgres
#   - templates/jwt-issuer.ts — issues the JWT that populates securityContext
#   - skills/cube-schema-scaffolding.md — the patterns explained
#   - skills/rls-policy-authoring.md — defense-in-depth at the DB layer
# ---------------------------------------------------------------------------

cubes:
  # -------------------------------------------------------------------------
  # Cube: orders — example fact cube
  # -------------------------------------------------------------------------
  - name: orders
    title: "Orders"
    description: "Customer order facts. One row per order."
    sql_table: fact_orders

    # ---------------------------------------------------------------------
    # Multi-tenant access policy
    # ---------------------------------------------------------------------
    # CRITICAL: every cube touching tenant data needs this.
    # The viewer's JWT populates securityContext.tenant_id at query time.
    # Cube injects WHERE tenant_id = '<jwt-claim>' before generating SQL.
    access_policy:
      - role: viewer
        conditions:
          - filter:
              member: orders.tenant_id
              operator: equals
              values:
                - "{ securityContext.tenant_id }"

    # ---------------------------------------------------------------------
    # Joins (uncomment + adjust when needed)
    # ---------------------------------------------------------------------
    # joins:
    #   - name: customers
    #     sql: "{CUBE}.customer_id = {customers}.id"
    #     relationship: many_to_one

    # ---------------------------------------------------------------------
    # Measures
    # ---------------------------------------------------------------------
    measures:
      - name: count
        type: count

      - name: total_revenue
        sql: amount
        type: sum
        format: currency

      - name: avg_order_value
        sql: amount
        type: avg
        format: currency

      - name: unique_customers
        sql: customer_id
        type: count_distinct

    # ---------------------------------------------------------------------
    # Dimensions
    # ---------------------------------------------------------------------
    dimensions:
      - name: id
        sql: id
        type: string
        primary_key: true
        public: false  # hide from query surface but available for joins

      - name: tenant_id
        sql: tenant_id
        type: string
        public: false  # used by access_policy; not directly queryable

      - name: order_date
        sql: order_date
        type: time

      - name: customer_id
        sql: customer_id
        type: string

      - name: amount
        sql: amount
        type: number

    # ---------------------------------------------------------------------
    # Pre-aggregations
    # ---------------------------------------------------------------------
    # CRITICAL: include tenant_id in dimensions to keep pre-aggs tenant-scoped.
    # A pre-agg without tenant_id is a cross-tenant leak.
    pre_aggregations:
      - name: daily_by_tenant
        measures:
          - orders.total_revenue
          - orders.count
          - orders.unique_customers
        dimensions:
          - orders.tenant_id
        time_dimension: orders.order_date
        granularity: day
        refresh_key:
          every: "1 hour"
        scheduled_refresh: true

  # -------------------------------------------------------------------------
  # Cube: customers — example dimension cube
  # -------------------------------------------------------------------------
  - name: customers
    title: "Customers"
    description: "Customer dimension. One row per unique customer."
    sql_table: dim_customer

    access_policy:
      - role: viewer
        conditions:
          - filter:
              member: customers.tenant_id
              operator: equals
              values:
                - "{ securityContext.tenant_id }"

    measures:
      - name: count
        type: count

      - name: active_count
        type: count
        filters:
          - sql: "{CUBE}.is_active = true"

    dimensions:
      - name: customer_sk
        sql: customer_sk
        type: string
        primary_key: true

      - name: tenant_id
        sql: tenant_id
        type: string
        public: false

      - name: display_name
        sql: display_name
        type: string

      - name: email
        sql: email
        type: string

      - name: segment
        sql: segment
        type: string

      - name: created_at
        sql: created_at
        type: time

# ---------------------------------------------------------------------------
# Views — partner-facing query surfaces
# ---------------------------------------------------------------------------
# Views isolate what's queryable from the dashboard layer. Use views to
# present clean metric surfaces; keep underlying cubes' internals (joins,
# alternate keys, raw measures) hidden.
#
# IMPORTANT: views need their own access_policy — access_policy on the
# underlying cube doesn't always propagate. Verify per view.
# ---------------------------------------------------------------------------
views:
  - name: revenue_analytics
    title: "Revenue Analytics"
    description: "Partner-facing revenue surface. Tenant-scoped via securityContext."
    cubes:
      - join_path: orders
        includes:
          - total_revenue
          - count
          - avg_order_value
          - unique_customers
          - order_date

    access_policy:
      - role: viewer
        conditions:
          - filter:
              member: orders.tenant_id
              operator: equals
              values:
                - "{ securityContext.tenant_id }"

# ---------------------------------------------------------------------------
# Acceptance criteria for any Cube schema:
#   1. Every cube touching tenant data has access_policy
#   2. Every pre-aggregation includes tenant_id as a dimension
#   3. Every view has its own access_policy (don't rely on cube-level)
#   4. Primary-key dimensions are marked public: false (queryable but not directly)
#   5. tenant_id dimension is marked public: false (used by policy, not exposed)
#   6. Cross-boundary denial test passes in CI:
#      - Issue JWT with tenant-A claim
#      - Query Cube for tenant-B's data (explicit filter)
#      - Result must be empty (access_policy overrides explicit filter)
#
# Refresh triggers for this template:
#   - Cube major version bump (currently targeting Cube 0.36+)
#   - access_policy syntax change (Cube has evolved this — check current docs)
#   - New cube added to the engagement (extend this pattern per cube)
#   - Engagement-specific dimensional model emerges (joins, hierarchies, etc.)
#
# Companion docs:
#   - data-platform/skills/cube-schema-scaffolding.md
#   - data-platform/knowledge/embedded-analytics-landscape-2026.md (Cube pricing)
#   - data-platform/knowledge/multi-tenant-rls-patterns.md (Cube + DB defense in depth)
