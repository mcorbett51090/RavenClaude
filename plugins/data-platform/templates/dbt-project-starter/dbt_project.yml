# dbt project configuration starter
# ---------------------------------------------------------------------------
# Generated by data-platform/templates/dbt-project-starter/dbt_project.yml
# Last reviewed: 2026-05-21
#
# Replace {{client_slug}} with your engagement's client identifier (slug-cased).
# Replace the materialization defaults if the engagement's warehouse calls for it
# (e.g., Snowflake/Databricks may prefer ephemeral for staging models).
#
# Conventions baked in:
#   - 3-layer modeling: staging → intermediate → marts
#   - Naming: stg_<source>__<entity>, int_<entity>__<action>, mart_<domain>
#   - Materializations: views for staging, ephemeral for intermediate, tables for marts
#   - Each layer has tests + docs blocks expected (see schema.yml in each models/ subdir)
#
# Used together with:
#   - templates/airbyte-source-config.yaml — feeds the raw_<source> schemas
#   - templates/database-schema-starter.sql — the destination Postgres schema
#   - skills/connector-configuration.md — source-system specifics
# ---------------------------------------------------------------------------

name: "{{client_slug}}_analytics"
version: "0.1.0"
config-version: 2

profile: "{{client_slug}}" # references profiles.yml.example or your CI secrets

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Layer-default materializations
# ---------------------------------------------------------------------------
# staging:    views — thin renaming + casting; cheap
# intermediate: ephemeral — composed logic that's inlined; reduces table count
# marts:      tables — final analytics surfaces; materialized for dashboard reads
models:
  "{{client_slug}}_analytics":
    +materialized: view
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: ephemeral
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
      finance:
        +tags: ["finance"]
      sales:
        +tags: ["sales"]
      marketing:
        +tags: ["marketing"]

# Snapshots default to merge strategy
snapshots:
  "{{client_slug}}_analytics":
    +target_schema: snapshots
    +strategy: timestamp
    +updated_at: updated_at

# Tests default to warn-but-not-fail in dev; flip to error in CI
tests:
  +severity: warn
  +store_failures: true

# Variables — override per environment via profiles.yml or dbt run --vars
vars:
  # Engagement-start date — most marts filter to this or later
  engagement_start_date: "2026-01-01"

  # Tenant ID for multi-tenant engagements (NULL for single-tenant)
  current_tenant_id: null

# ---------------------------------------------------------------------------
# Refresh triggers for this template:
#   - dbt-core major version bump (we're targeting 1.7+; verify before using)
#   - New layer convention adopted by the team (currently 3-layer is standard)
#   - Engagement-specific materialization needs (Snowflake/Databricks tuning)
# ---------------------------------------------------------------------------
