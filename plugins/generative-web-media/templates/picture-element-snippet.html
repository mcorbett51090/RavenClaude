<!--
  picture-element-snippet.html — the production image contract for generative-web-media.
  AVIF primary -> WebP fallback -> JPEG safety net (use PNG for alpha), 3-5 responsive
  widths, explicit width/height (CLS-safe). Generated by scripts/web-optimize/optimize-image.mjs.
  Replace the sample paths/dims/sizes and ALWAYS set a real alt (run the accessibility gate).
-->

<!-- LCP HERO: eager + fetchpriority="high" (cap 1-2 per page). Do NOT lazy-load the hero. -->
<picture>
  <source
    type="image/avif"
    srcset="hero-480.avif 480w, hero-768.avif 768w, hero-1200.avif 1200w, hero-1600.avif 1600w"
    sizes="(max-width: 768px) 100vw, 1200px"
  />
  <source
    type="image/webp"
    srcset="hero-480.webp 480w, hero-768.webp 768w, hero-1200.webp 1200w, hero-1600.webp 1600w"
    sizes="(max-width: 768px) 100vw, 1200px"
  />
  <img
    src="hero-1600.jpg"
    srcset="hero-480.jpg 480w, hero-768.jpg 768w, hero-1200.jpg 1200w, hero-1600.jpg 1600w"
    sizes="(max-width: 768px) 100vw, 1200px"
    width="1600"
    height="900"
    fetchpriority="high"
    decoding="async"
    alt='REPLACE: describe the image, or alt="" if purely decorative (WCAG 2.2 SC 1.1.1)'
  />
</picture>
