# Backstage software catalog entry — catalog-as-code.
# One per repo, in the repo it describes, validated in CI, discovered via the VCS processor.
# Every entity MUST have an owner. Replace every <placeholder>. Docs: backstage.io/docs/features/software-catalog
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: <component-name> # unique, kebab-case
  description: <one-line what this is>
  annotations:
    github.com/project-slug: <org>/<repo>
    backstage.io/techdocs-ref: dir:. # docs-as-code rendered in the portal
  tags:
    - <language>
    - <domain>
  links:
    - url: https://<runbook-or-dashboard>
      title: Runbook
      icon: dashboard
spec:
  type: service # service | website | library
  lifecycle: production # experimental | production | deprecated
  owner: group:<team> # REQUIRED — no unowned entities
  system: <system-name> # the larger system this is part of
  providesApis:
    - <api-name> # see the API kind below
  dependsOn:
    - resource:<db-or-queue-name>
    - component:<other-service>
---
# The API this component provides (kind: API) — model APIs as first-class catalog entities.
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: <api-name>
  description: <one-line>
spec:
  type: openapi # openapi | grpc | asyncapi | graphql
  lifecycle: production
  owner: group:<team>
  definition:
    $text: ./openapi.yaml # contract as code; route quality to api-engineering
---
# A backing resource (kind: Resource) — e.g. a database the component dependsOn.
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: <db-or-queue-name>
  description: <one-line>
spec:
  type: database # database | queue | bucket | ...
  owner: group:<team>
  system: <system-name>
