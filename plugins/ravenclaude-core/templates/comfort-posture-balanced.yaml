# Balanced comfort-posture seed for a NEW repo (schema v5 — per-layer).
# `ravenclaude setup` drops this into .ravenclaude/comfort-posture.yaml when a
# repo doesn't already have one; apply-comfort-posture.py then translates it into
# .claude/settings.json permission rules.
#
# "Balanced" = local development runs without prompts; anything that reaches
# OUTSIDE the repo (remote git / PRs, network writes, edits to files outside the
# project) prompts first; a hard security floor is always denied. Re-tune any of
# this point-and-click in the comfort-posture dashboard (/dashboard).
#
# Levels are authored at the PROJECT layer so they commit with the repo as the
# shared baseline (and survive Codespace rebuilds). Personal relaxations belong
# in the local layer — add them via the dashboard, not here.
#
# Block style (not { } flow style) is intentional: it parses under both PyYAML
# and apply-comfort-posture.py's built-in fallback parser.
schema_version: 5

# Pause for design / architectural decisions before implementing them?
design_checkins: true

# Definition-of-done gate (the ONE confident claim that IS machine-checkable).
# The dod-gate.sh Stop hook runs this command and blocks "done" until it passes —
# turning the agent's "it's done / tests pass" claim from an assertion into a fact.
# This catches that single confident-error class; it does NOT verify general claim
# honesty (that's the behavioral Claim Grounding & Source Honesty protocol).
# Commented OFF by default: uncommenting makes the gate active for THIS repo, so
# set it to your real check. MIGRATION: shipping it uncommented in a consumer's
# posture would start blocking their Stop on /plugin marketplace update — leave it
# commented in the seed; consumers opt in per-repo via the dashboard.
#
# First-run trust check (added 2026-06-03 — closes Codex desktop trust review
# Finding 1): when `cmd` is set, dod-gate.sh refuses to execute it on first run
# until the agent runs `touch <confirm-path>` to authorize. The cmd hash is the
# sentinel — rotating the cmd value re-triggers the confirm. Set `trusted: true`
# to skip the first-run confirm for this repo (you've reviewed the YAML and
# accept silent execution). Blast radius: trusted=true means any future YAML
# edit to `cmd` runs silently on the next Stop.
# definition_of_done:
#   cmd: "npm test && npm run lint"   # your repo's real test/build/lint command
#   max_blocks: 8                     # consecutive Stop-blocks before force-allow
#   trusted: false                    # default — first run requires `touch <path>` confirm

# Web-access first-use trust (added 2026-06-03 — closes Codex desktop trust
# review Finding 5): when a domain in `.ravenclaude/web-access.yaml` `allow:` is
# hit for the first time this session, guard-web-access.sh emits
# permissionDecision: ask (instead of silently allowing) so a hostile YAML edit
# can't silently exfiltrate. Subsequent hits to the same domain auto-allow as
# before. Set `trusted: true` to skip the first-use ask for this repo (you've
# reviewed `web-access.yaml` and accept silent allow). Blast radius: trusted=true
# means any future allowlist edit takes effect on the next WebFetch with no
# confirmation. Defaults to false — first-use ask is the new default.
web_access:
  trusted: false

# Always-on deny rules — layer-independent floor. Category levels never relax these.
security_deny:
  - "Bash(rm -rf:*)"
  - "Bash(git push --force:*)"
  - "Bash(git push -f:*)"
  - "Bash(git reset --hard:*)"
  - "Bash(git clean -fd:*)"
  - "Bash(npm publish:*)"
  - "Bash(pnpm publish:*)"
  - "Bash(yarn publish:*)"
  - "Bash(cargo publish:*)"
  - "Bash(curl * | sh)"
  - "Bash(curl * | bash)"
  - "Bash(wget * | sh)"
  - "Bash(wget * | bash)"
  - "Bash(sudo:*)"
  # Whole-disk / filesystem destruction + branch force-delete (two-panel audit
  # 2026-05-31). These are prefix-glob rules — the variant-catcher is the
  # guard-destructive.sh hook (normalized matching). These add the canonical
  # forms to the permission-engine layer for `ravenclaude setup` consumers, who
  # otherwise have only the hook.
  - "Bash(mkfs:*)"
  - "Bash(shred:*)"
  - "Bash(wipefs:*)"
  - "Bash(git branch -D:*)"
  - "Bash(git branch -D *)"
  - "Read(.env)"
  - "Read(.env.*)"
  - "Read(**/*.pem)"
  - "Read(**/*.key)"
  - "Read(**/credentials*)"
  - "Read(**/secrets*)"
  # Containment depth (Gap 5) — deny reads of host credential stores that live
  # OUTSIDE the repo. This is a TOOL-LAYER deny (Claude Code's Read tool + the
  # Thing's file_read_global both honor it), portable to Copilot CLI. It is NOT
  # OS isolation: a subprocess Claude writes can still read these paths — only an
  # OS sandbox or the devcontainer/worktree boundary stops that. See the
  # "Containment posture" note in .ravenclaude/README.md.
  - "Read(~/.ssh/**)"
  - "Read(~/.aws/**)"
  - "Read(~/.config/gcloud/**)"
  - "Read(~/.azure/**)"
  - "Read(~/.kube/config)"
  - "Read(~/.docker/config.json)"
# allow = run without asking · ask = prompt first · deny = block · inherit = defer
categories:
  # ── Reads — allowed ─────────────────────────────────────────────
  file_read_project:
    user: inherit
    local: inherit
    project: allow
  file_read_global:
    user: inherit
    local: inherit
    project: allow
  network_read:
    user: inherit
    local: inherit
    project: allow
  shell_readonly:
    user: inherit
    local: inherit
    project: allow
  # ── Local development — allowed ─────────────────────────────────
  file_edit_project:
    user: inherit
    local: inherit
    project: allow
  shell_local_mutate:
    user: inherit
    local: inherit
    project: allow
  shell_code_exec:
    user: inherit
    local: inherit
    project: allow
  # shell_package_install defaults to `ask` (changed in v0.101.0) — a malicious
  # dependency in a tarball, post-install script, or registry-confused name
  # would otherwise execute silently. One prompt per `npm install` / `pip install`
  # is acceptable friction; flip to `allow` here if you've vetted the supply chain.
  shell_package_install:
    user: inherit
    local: inherit
    project: ask
  mcp_tools:
    user: inherit
    local: inherit
    project: allow
  # ── Reaches outside the repo — prompt first ─────────────────────
  file_edit_global:
    user: inherit
    local: inherit
    project: ask
  shell_remote_mutate:
    user: inherit
    local: inherit
    project: ask
  network_write:
    user: inherit
    local: inherit
    project: ask
