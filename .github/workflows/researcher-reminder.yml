name: Researcher Reminder

on:
  schedule:
    # Weekly deep research every Monday at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      research_type:
        description: 'Type of research trigger'
        required: true
        default: 'weekly-deep'
        type: choice
        options:
          - weekly-deep
          - daily-quick-check

jobs:
  create-research-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Create Researcher Issue
        uses: actions/github-script@v7
        with:
          script: |
            const researchType = context.payload.inputs?.research_type || 'weekly-deep';
            
            let title = '';
            let body = '';
            
            if (researchType === 'weekly-deep') {
              title = 'Researcher Weekly Deep Research Sweep';
              body = `## Weekly Deep Research

**Trigger**: Scheduled weekly deep research
**Date**: ${new Date().toISOString().split('T')[0]}

### Instructions for Team Lead

1. **Spawn the deep-researcher agent** (defined in `plugins/ravenclaude-core/agents/deep-researcher.md`).
2. For each agent, review its skills, knowledge files, and tiered knowledge base.
3. Update Tier 1–5 knowledge with fresh official + high-signal community sources.
4. Explicitly seek credible divergent/contrarian expert views.
5. Use the research-report-template.md when proposing updates.
6. Update the agent definition files with new categorized knowledge.

### Scope
- All core agents (including deep-researcher)
- All power-platform agents
- Any newly added domain plugins
- Cross-cutting skills (grounding-protocol, maintainability-review, etc.)

**Goal**: Keep every agent's knowledge current and categorized so agents default to consensus but have principled fallbacks.

**Research Agent to use**: `deep-researcher` from `plugins/ravenclaude-core/agents/deep-researcher.md`
`;
            } else {
              title = 'Researcher Daily Quick Research Check';
              body = `## Daily Quick Research Check

**Trigger**: First open of the repo today or manual trigger
**Date**: ${new Date().toISOString().split('T')[0]}

### Quick Freshness Scan
- Check for any major Microsoft/Power Platform release notes or breaking changes since last check.
- Spot-check 2-3 high-traffic agents for obvious staleness.
- If anything significant found, escalate to Team Lead for full weekly sweep using the deep-researcher agent.
`;
            }

            try {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['researcher', 'maintenance', 'deep-research']
              });
              console.log(`Created researcher reminder issue #${issue.data.number}`);
            } catch (error) {
              console.error('Failed to create issue:', error);
              core.setFailed(`Failed to create researcher reminder issue: ${error.message}`);
            }
