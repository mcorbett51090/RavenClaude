name: Regenerate generated artifacts (post-merge self-heal)

# Why this exists
# ---------------
# repo-guide.html is a large, repo-wide *generated* artifact: every plugin add or
# version bump changes its roster/counts. When several plugin PRs are open at once,
# each one regenerating the guide into its own branch guarantees (a) merge conflicts
# on the big file and (b) a "freshness gate" failure on whichever branch goes stale
# as siblings merge — the exact cross-PR contagion that turned "working on multiple
# things at once" into "tons of CI failing".
#
# The fix: take repo-guide.html OFF the PR critical path. PR branches no longer
# regenerate it (the regen-on-manifest-change.sh hook skips it when this workflow is
# present), and the PR freshness gate is removed. Instead `main` OWNS the guide:
# after each merge, this workflow regenerates it once, in serial, and commits the
# result back. The guide is therefore always fresh on `main` (which is what GitHub
# Pages serves) within ~a minute of a merge, and is never a source of PR conflicts.
#
# Scope note: this self-heals repo-guide.html and the marketplace-claims DERIVABLE
# counts (per-plugin "<N> skills/agents" prose + README "ships **N plugins**").
# dashboard.html and the concept/decision-tree SVGs are deliberately NOT included —
# several render-test gates extract functions from the committed dashboard.html and
# the SVGs are inlined into it, so decoupling those needs more care (a later phase).

on:
  push:
    branches: [main]
    paths:
      - ".claude-plugin/marketplace.json"
      - "plugins/**"
      - "README.md"
      - "scripts/generate-repo-guide.py"
      - "scripts/check-marketplace-claims.py"
      - ".github/workflows/regenerate-artifacts.yml"
  workflow_dispatch:

# The job pushes the regenerated guide back to main.
permissions:
  contents: write

# Serialize runs so two quick merges can't race on the push.
concurrency:
  group: regenerate-artifacts
  cancel-in-progress: false

jobs:
  regenerate:
    name: Regenerate repo-guide.html on main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for accurate per-plugin "Last updated" dates)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Self-heal generated artifacts (marketplace counts + repo-guide), commit if changed
        run: |
          set -euo pipefail

          # 1. Marketplace-claims DERIVABLE counts (per-plugin "<N> skills/agents"
          #    prose + README "ships **N plugins**"). --fix rewrites only the
          #    derivable digits in place (formatting-preserving, so prettier stays
          #    happy). It exits nonzero only if a STRUCTURAL problem remains — which
          #    the PR gate (--structural-only) should already have blocked, so a
          #    failure here is a loud signal, not silent drift.
          python3 scripts/check-marketplace-claims.py --fix

          # 2. repo-guide.html. check-guide-fresh.sh strips the volatile "Generated …"
          #    + per-plugin "Last updated" lines before diffing, so a pure-timestamp
          #    delta reports FRESH and we regenerate nothing. Run AFTER the count fix
          #    so the guide reflects any rewritten descriptions. The post-regen check
          #    is the "clean tree must_pass" relocated off PRs (audit-gates Gate 11).
          if ! scripts/check-guide-fresh.sh; then
            echo "repo-guide.html is stale — regenerating."
            python3 scripts/generate-repo-guide.py
            scripts/check-guide-fresh.sh
          fi

          # 3. Commit only if something actually changed.
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "Artifacts already in sync — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(artifacts): self-heal marketplace counts + repo-guide after merge [skip ci]"

          # A merge may have landed since checkout; rebase our artifact-only commit
          # before pushing. Branches no longer touch these files, so a rebase
          # conflict is not expected (and would fail loudly). [skip ci] keeps this
          # push from re-triggering the workflow.
          git pull --rebase origin main
          git push origin HEAD:main
