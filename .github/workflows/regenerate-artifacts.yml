name: Regenerate generated artifacts (post-merge self-heal)

# Why this exists
# ---------------
# Several repo-wide *generated* artifacts change on almost every plugin add/bump:
# the marketplace-claims derivable counts, the
# concept/decision-tree SVGs, and dashboard.html (which inlines those SVGs). When
# multiple plugin PRs are open at once, each one regenerating these into its own
# branch guarantees (a) merge conflicts on the big files and (b) "freshness gate"
# failures on whichever branch goes stale as siblings merge — the cross-PR
# contagion that turned "working on multiple things at once" into "tons of CI
# failing". Rendering the SVGs additionally needs mermaid-cli + Chromium, which
# most authors don't have locally (the "author forgot to render" failure class).
#
# The fix: take all of these OFF the PR critical path and let `main` OWN them.
# PR branches no longer regenerate them (the regen-on-manifest-change.sh hook skips
# dashboard when this workflow is present; the SVG/dashboard/count PR
# gates are removed), and after each merge this workflow regenerates everything once
# and commits the result back. So `main` (what GitHub Pages serves) is always fresh
# within ~a minute of a merge, and none of these is ever a source of PR conflicts.
# The render-test gates that consume dashboard.html stay honest because audit-gates.sh
# regenerates dashboard.html in place before running them (generate-then-test).
#
# Scope: marketplace-claims counts, concepts.json (the Learn-tab registry), concept
# + decision-tree SVGs, dashboard.html (full plugin artifact), index.html (the
# unified portal — folds the dashboard + catalog in natively), the per-plugin BI
# report.html, and the Copilot package. Each step is staleness-gated (--check), so a
# merge that changed none of them is a fast no-op (and never even loads mermaid-cli).
#
# concepts.json + report.html were ADDED to this self-heal on 2026-06-08: their
# freshness gates were still running at PR time in audit-gates (unlike dashboard/
# SVG/count, which had been relocated here), so a sibling merge that staled them
# failed every unrelated open PR — the exact cross-PR contagion this workflow exists
# to kill. Their PR-time "clean tree" gates were removed in the same change.

on:
  push:
    branches: [main]
    paths:
      - ".claude-plugin/marketplace.json"
      - "plugins/**"
      - "README.md"
      - "scripts/generate-dashboards.py"
      - "scripts/generate-index-dashboard.py"
      - "scripts/_index_dashboard_template.py"
      - "scripts/_html_merge.py"
      - "scripts/concepts.py"
      - "scripts/render-concepts.py"
      - "scripts/render-trees.py"
      - "scripts/generate-bi-report.py"
      - "scripts/generate-copilot-plugin.py"
      - "scripts/check-marketplace-claims.py"
      - ".github/workflows/regenerate-artifacts.yml"
  workflow_dispatch:

# The job pushes the regenerated artifacts back to main.
permissions:
  contents: write

# Serialize runs so two quick merges can't race on the push.
concurrency:
  group: regenerate-artifacts
  cancel-in-progress: false

jobs:
  regenerate:
    name: Regenerate generated artifacts on main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for accurate per-plugin "Last updated" dates)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # setup-python installs a clean hostedtoolcache Python WITHOUT PyYAML
      # (unlike the runner's system python3, which ships with it — which is why
      # validate-marketplace.yml never hit this). scripts/concepts.py imports
      # yaml since the Learn-tab concepts work; without this install the
      # self-heal crashed on ModuleNotFoundError (4 consecutive runs, first
      # seen 2026-06-04).
      - name: Install Python deps for the generators
        run: python3 -m pip install --quiet pyyaml

      - name: Set up Node.js (mermaid-cli is fetched on demand by npx when an SVG is stale)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Self-heal generated artifacts (counts, SVGs, dashboard, index portal), commit if changed
        run: |
          set -euo pipefail

          # 1. Marketplace-claims DERIVABLE counts (per-plugin "<N> skills/agents"
          #    prose + README "ships **N plugins**"). --fix rewrites only the
          #    derivable digits in place (formatting-preserving, so prettier stays
          #    happy). It exits nonzero only if a STRUCTURAL problem remains — which
          #    the PR gate (--structural-only) should already have blocked, so a
          #    failure here is a loud signal, not silent drift.
          python3 scripts/check-marketplace-claims.py --fix

          # 1b. concepts.json — the Learn-tab concept REGISTRY parsed from the concept
          #     markdown source. Must be fresh BEFORE the SVGs + dashboard below (which
          #     embed concept data). Pure Python (no browser). This is audit-gates'
          #     "concepts.py freshness (clean tree)" gate relocated off the PR path.
          if ! python3 scripts/concepts.py --check >/dev/null 2>&1; then
            echo "concepts.json stale — regenerating from concept source."
            python3 scripts/concepts.py
            python3 scripts/concepts.py --check
          fi

          # 2. Concept + decision-tree SVGs. --check reads a source-hash manifest
          #    (no browser), so it is cheap; only when it reports STALE do we render,
          #    which DOES need mermaid-cli + Chromium (fetched on demand by npx via
          #    the render scripts). Staleness-gating means a merge that touched no
          #    diagram never loads mermaid at all.
          #
          #    A render failure is NON-FATAL (fixed 2026-06-08): one malformed diagram
          #    (or a flaky Chromium evaluate) must NOT abort the whole self-heal. That
          #    exact bug left main UN-HEALED across many merges — the job died here on
          #    a render-trees mermaid error before it ever reached the commit below, so
          #    concepts.json / report.html / dashboard / counts silently drifted and
          #    every open PR failed its freshness gate. On a render failure we keep the
          #    committed SVGs, emit a ::warning::, and CONTINUE the self-heal; a stale
          #    diagram surfaces as a warning instead of blocking everything else.
          # On a render FAILURE we `git checkout` the visuals dir: render-trees.py
          # wipes-then-renders (old.unlink()), so a mid-render failure leaves a
          # PARTIAL set — committing that would DELETE valid SVGs. Reverting the dir
          # restores the committed SVGs, so a failed render is a true no-op (stale
          # diagrams kept) rather than destructive.
          if ! python3 scripts/render-concepts.py --check >/dev/null 2>&1; then
            echo "concept SVGs stale — rendering with mermaid-cli."
            if ! python3 scripts/render-concepts.py; then
              echo "::warning::concept SVG render failed (mermaid) — reverting partial output, continuing self-heal"
              git checkout -- plugins/ravenclaude-core/knowledge/concepts/visuals 2>/dev/null || true
            fi
          fi
          if ! python3 scripts/render-trees.py --check >/dev/null 2>&1; then
            echo "decision-tree SVGs stale — rendering with mermaid-cli."
            if ! python3 scripts/render-trees.py; then
              echo "::warning::decision-tree SVG render failed (mermaid) — reverting partial output, continuing self-heal"
              git checkout -- plugins/ravenclaude-core/knowledge/tree-visuals 2>/dev/null || true
            fi
          fi

          # 3. dashboard.html — inlines the (now fresh) committed SVGs; pure Python,
          #    no mermaid needed here. Exact-byte freshness (the generator embeds no
          #    timestamps), so --check is an exact match. This is the dashboard
          #    "clean tree must_pass" relocated off PRs (audit-gates Gate 13).
          if ! python3 scripts/generate-dashboards.py --check >/dev/null 2>&1; then
            echo "dashboard.html stale — regenerating."
            python3 scripts/generate-dashboards.py
            python3 scripts/generate-dashboards.py --check
          fi

          # 4. index.html — the unified portal. It folds in the dashboard
          #    sub-app natively (via render_fragment) and inlines the per-plugin
          #    catalog data, so it must be regenerated AFTER the SVGs + dashboard
          #    above. --check
          #    strips the volatile generated-timestamp surfaces, so a pure
          #    timestamp delta reports fresh and we regenerate nothing.
          if ! python3 scripts/generate-index-dashboard.py --check >/dev/null 2>&1; then
            echo "index.html stale — regenerating the unified portal."
            python3 scripts/generate-index-dashboard.py
            python3 scripts/generate-index-dashboard.py --check
          fi

          # 4b. report.html — the per-plugin BI reports. Pure Python, independent of
          #     the dashboard. This is audit-gates' "bi-report freshness (clean tree)"
          #     gate relocated off the PR path.
          if ! python3 scripts/generate-bi-report.py --check >/dev/null 2>&1; then
            echo "report.html stale — regenerating BI reports."
            python3 scripts/generate-bi-report.py
            python3 scripts/generate-bi-report.py --check
          fi

          # 4c. Copilot package — mirrors plugin.json versions. Pure Python.
          if ! python3 scripts/generate-copilot-plugin.py --check >/dev/null 2>&1; then
            echo "copilot package stale — regenerating."
            python3 scripts/generate-copilot-plugin.py
          fi

          # 5. Commit only if something actually changed.
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "Artifacts already in sync — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(artifacts): self-heal counts + SVGs + dashboard + index portal after merge [skip ci]"

          # A merge may have landed since checkout; rebase our artifact-only commit
          # before pushing. Branches no longer touch these files, so a rebase
          # conflict is not expected (and would fail loudly). [skip ci] keeps this
          # push from re-triggering the workflow.
          git pull --rebase origin main
          git push origin HEAD:main
