name: Validate Layout

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

# Least-privilege GITHUB_TOKEN: this workflow only reads the repo to validate it.
permissions:
  contents: read

jobs:
  validate-layout:
    name: Validate file paths against .repo-layout.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate .repo-layout.json
        run: |
          set -euo pipefail
          if [[ ! -f .repo-layout.json ]]; then
            echo "::error::.repo-layout.json is missing"
            exit 1
          fi
          python3 -m json.tool .repo-layout.json > /dev/null
          echo "OK .repo-layout.json is valid JSON"

      - name: Determine base ref
        id: base
        # BASE_REF is passed via env (not interpolated into the script) so a branch
        # name can never be treated as shell — the GitHub-documented script-injection
        # hardening for untrusted `github.*` context.
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "ref=origin/${BASE_REF}" >> "$GITHUB_OUTPUT"
          else
            # For push to main and workflow_dispatch, diff against previous commit
            echo "ref=HEAD~1" >> "$GITHUB_OUTPUT"
          fi

      - name: Check added/changed paths against allowed_globs (diff)
        # The match logic lives in scripts/check-layout.py — the SAME script the
        # audit-gates meta-test exercises (two-panel audit 2026-05-31, P1: the
        # prior inline bash matcher had no bidirectional fixture, so it could stop
        # gating while CI stayed green).
        run: python3 scripts/check-layout.py --diff "${{ steps.base.outputs.ref }}"

      - name: Check EVERY tracked file against allowed_globs (full tree)
        # The diff check only sees Added/Copied/Renamed paths, so a pre-existing or
        # merely-modified off-allow-list file is invisible to it (two-panel audit
        # 2026-05-31, P1). This full-tree scan is the backstop. It runs on every PR
        # and push, so a stale violation can't hide behind an unrelated diff.
        run: python3 scripts/check-layout.py --all
