name: Validate Layout

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-layout:
    name: Validate file paths against .repo-layout.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate .repo-layout.json
        run: |
          set -euo pipefail
          if [[ ! -f .repo-layout.json ]]; then
            echo "::error::.repo-layout.json is missing"
            exit 1
          fi
          python3 -m json.tool .repo-layout.json > /dev/null
          echo "OK .repo-layout.json is valid JSON"

      - name: Determine base ref
        id: base
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            # For push to main and workflow_dispatch, diff against previous commit
            echo "ref=HEAD~1" >> "$GITHUB_OUTPUT"
          fi

      - name: List changed files
        id: changed
        run: |
          set -euo pipefail
          base="${{ steps.base.outputs.ref }}"
          # Added (A), Copied (C), Renamed (R) — we only care about new file paths
          changed=$(git diff --name-only --diff-filter=ACR "$base"...HEAD || true)
          echo "Changed files vs $base:"
          echo "$changed"
          # Write to a file so the next step reads it cleanly (env vars don't handle newlines well)
          echo "$changed" > /tmp/changed-files.txt

      - name: Check each changed path against allowed_globs
        run: |
          set -euo pipefail
          shopt -s extglob globstar nullglob

          mapfile -t allowed < <(jq -r '.allowed_globs[]' .repo-layout.json)
          mapfile -t forbidden < <(jq -r '.forbidden_globs[]?' .repo-layout.json 2>/dev/null || true)

          status=0
          while IFS= read -r path; do
            [[ -z "$path" ]] && continue

            # Check forbidden first
            for pat in "${forbidden[@]:-}"; do
              [[ -z "$pat" ]] && continue
              # shellcheck disable=SC2053 # intentional: unquoted $pat enables glob matching
              if [[ "$path" == $pat ]]; then
                suggestion=$(jq -r --arg p "$pat" '.suggestions[$p] // empty' .repo-layout.json)
                echo "::error file=$path::Layout violation — path matches forbidden pattern '$pat'.${suggestion:+ $suggestion}"
                status=1
                continue 2
              fi
            done

            # Then check allowed
            matched=0
            for pat in "${allowed[@]}"; do
              # shellcheck disable=SC2053 # intentional: unquoted $pat enables glob matching
              if [[ "$path" == $pat ]]; then
                matched=1
                break
              fi
            done

            if [[ "$matched" -eq 0 ]]; then
              echo "::error file=$path::Layout violation — path does not match any allowed_globs in .repo-layout.json. If this is a legitimate new location, add the glob to .repo-layout.json first."
              status=1
            else
              echo "OK $path"
            fi
          done < /tmp/changed-files.txt

          exit $status
