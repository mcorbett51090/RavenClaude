      /* ── Shared tokens from plugins/ravenclaude-core/dashboard-assets/shared-tokens.css
         (substituted at generate-time by generate-index-dashboard.py). */
      /*
 * RavenClaude — Shared Design Tokens
 * ----------------------------------------------------------------------------
 * Single source of truth for color, typography, spacing, radii, and shadow
 * tokens consumed by all three web surfaces:
 *
 *   - index.html             (landing)
 *   - repo-guide.html        (marketplace catalog)
 *   - dashboard.html         (comfort-posture editor + Norse panels)
 *
 * Each surface's generator reads this file at generate-time and inlines the
 * tokens into the surface's <style> block. NO RUNTIME LOAD — every HTML
 * artifact stays self-contained.
 *
 * Aesthetic: Intercom-inspired calm monochromatic light beige with two
 * accents — gold (dashboard, Norse-thematic) and teal (index + repo-guide).
 *
 * a11y discipline:
 *   - --gold on --bg is ~3.6:1 (AA-LARGE only). Never use --gold as body
 *     text. Use --gold for borders, headings, icons, accent rules.
 *   - --teal on --bg passes AA for body text at ~4.5:1.
 *   - --warn on --bg passes AA for badge labels (12-13px) at ~4.6:1.
 *
 * Class-naming discipline:
 *   - All shared classes use the .rc-* prefix to avoid collision with
 *     per-surface classes (repo-guide and dashboard each define their own
 *     .tab-btn with different geometry; prefixing prevents the conflict).
 *   - Per-surface classes keep their existing names.
 *
 * See plugins/ravenclaude-core/dashboard-assets/README.md for the full
 * design-system reference.
 */

:root {
  /* ── Neutrals — light beige base ─────────────────────────────────── */
  --rc-bg: #faf7f0;
  --rc-surface: #ffffff;
  --rc-surface-2: #f4f0e8;
  --rc-border: #e8e0d0;
  --rc-border-strong: #d6cab2;

  /* ── Text ────────────────────────────────────────────────────────── */
  --rc-text: #1a1614;
  --rc-muted: #6b6259;
  --rc-faint: #a8a098;

  /* ── Accent: gold (dashboard primary, Norse identity) ────────────── */
  /* CONTRAST NOTE: --rc-gold is ~3.6:1 on --rc-bg — AA-LARGE only.
     Never use --rc-gold as body text. Use for borders / headings / icons
     / accent rules / decorative dividers exclusively. */
  --rc-gold: #a8882e;
  --rc-gold-soft: #c9aa55;

  /* ── Accent: teal (index + repo-guide primary) ───────────────────── */
  /* CONTRAST NOTE: --rc-teal passes AA on --rc-bg at ~4.5:1 — safe for
     body text and inline links. */
  --rc-teal: #1f7f78;
  --rc-teal-soft: #4a9590;

  /* ── Status ──────────────────────────────────────────────────────── */
  --rc-ok: #1f7a3f;
  --rc-warn: #9a7010;
  --rc-danger: #b03f3f;

  /* Status-on-surface pairs (Norse pipeline badges, alert chips). The
     -bg variants are intentionally light tints so the -fg variants stay
     readable. Replaces the previously-hardcoded badge color literals. */
  --rc-ok-bg: #e6f3ea;
  --rc-ok-fg: #14532d;
  --rc-warn-bg: #f6ecd6;
  --rc-warn-fg: #6b4c0a;
  --rc-danger-bg: #fbe5e5;
  --rc-danger-fg: #6b1414;
  --rc-neutral-bg: #ece8e0;
  --rc-neutral-fg: #4a4640;

  /* ── Typography ──────────────────────────────────────────────────── */
  --rc-font-sans:
    "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --rc-font-mono:
    "JetBrains Mono", ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;

  /* Letter-spacing scale: tighter on display, looser on small caps */
  --rc-tracking-tight: -0.02em;
  --rc-tracking-snug: -0.01em;
  --rc-tracking-normal: 0;
  --rc-tracking-wide: 0.04em;

  /* ── Spacing scale (4px base, Intercom-generous) ─────────────────── */
  --rc-space-1: 4px;
  --rc-space-2: 8px;
  --rc-space-3: 12px;
  --rc-space-4: 16px;
  --rc-space-5: 24px;
  --rc-space-6: 32px;
  --rc-space-7: 48px;
  --rc-space-8: 64px;

  /* ── Radii ───────────────────────────────────────────────────────── */
  --rc-radius-sm: 6px;
  --rc-radius: 10px;
  --rc-radius-lg: 16px;
  --rc-radius-pill: 999px;

  /* ── Shadows — Intercom-soft, 5-tier scale, warm-tinted ─────────────
     Warm tint (rgba(120, 90, 40, X)) reads as natural elevation on beige.
     Cool/neutral shadows on warm bg look like dust. */
  --rc-shadow-xs: 0 1px 2px rgba(120, 90, 40, 0.04);
  --rc-shadow-sm: 0 1px 3px rgba(120, 90, 40, 0.06), 0 1px 2px rgba(120, 90, 40, 0.04);
  --rc-shadow: 0 4px 12px rgba(120, 90, 40, 0.08), 0 1px 3px rgba(120, 90, 40, 0.05);
  --rc-shadow-md: 0 8px 20px rgba(120, 90, 40, 0.1), 0 2px 4px rgba(120, 90, 40, 0.06);
  --rc-shadow-lg: 0 16px 32px rgba(120, 90, 40, 0.12), 0 4px 8px rgba(120, 90, 40, 0.06);
  --rc-shadow-xl: 0 24px 48px rgba(120, 90, 40, 0.14), 0 8px 16px rgba(120, 90, 40, 0.08);

  /* ── Refined typography scale (Intercom rhythm) ──────────────────────
     Inter throughout. Display-weight contrast via 700 weight + tight
     tracking. Sizes paired with line-heights so the rhythm reads at
     every viewport. */
  --rc-text-xs: 0.75rem; /* 12px — small captions, kbd hints */
  --rc-text-sm: 0.8125rem; /* 13px — eyebrow, chips, labels */
  --rc-text-base: 0.9375rem; /* 15px — body */
  --rc-text-md: 1rem; /* 16px — emphasized body */
  --rc-text-lg: 1.125rem; /* 18px — large body, lead */
  --rc-text-xl: 1.5rem; /* 24px — H2 */
  --rc-text-2xl: 1.875rem; /* 30px — H1 secondary */
  --rc-text-hero: clamp(2rem, 4.5vw, 3rem); /* H1 hero */
  --rc-line-tight: 1.1;
  --rc-line-snug: 1.3;
  --rc-line-normal: 1.5;
  --rc-line-relaxed: 1.65;

  /* ── Focus ring (a11y) ───────────────────────────────────────────── */
  --rc-focus-ring: 0 0 0 3px rgba(31, 127, 120, 0.32); /* teal at .32 */
  --rc-focus-ring-gold: 0 0 0 3px rgba(168, 136, 46, 0.32); /* gold at .32 */
}

/* ──────────────────────────────────────────────────────────────────────
   Dark mode — every neutral + status token gets a paired override.
   Activated by `data-theme="dark"` on <html>. Gold/teal accents get a
   chroma lift so they don't read as muddy on the dark warm-near-black
   base (designer-panel: light-mode #a8882e on dark surface looks brown).
   WCAG AA targets: text on bg ≥ 7:1, accent on bg ≥ 4.5:1.
   ────────────────────────────────────────────────────────────────────── */
[data-theme="dark"] {
  /* Neutrals — warm near-black base, not blue-black */
  --rc-bg: #14110d;
  --rc-surface: #1c1814;
  --rc-surface-2: #25201a;
  --rc-border: #3a342b;
  --rc-border-strong: #4a4238;

  /* Text */
  --rc-text: #faf7f0;
  --rc-muted: #b8aea0;
  --rc-faint: #7a7263;

  /* Accents — chroma lift to compensate for dark bg */
  --rc-gold: #c9a84c;
  --rc-gold-soft: #e0c478;
  --rc-teal: #3aa391;
  --rc-teal-soft: #5fbfae;

  /* Status — recalibrated for dark */
  --rc-ok: #4ade80;
  --rc-warn: #d4a017;
  --rc-danger: #f87171;

  /* Status-on-surface pairs — darker bg variants, brighter fg */
  --rc-ok-bg: #1a2e1f;
  --rc-ok-fg: #86efac;
  --rc-warn-bg: #2e2618;
  --rc-warn-fg: #f0c060;
  --rc-danger-bg: #2e1a1a;
  --rc-danger-fg: #fca5a5;
  --rc-neutral-bg: #2a2620;
  --rc-neutral-fg: #c0b8a8;

  /* Shadows — chroma-lifted for elevation above the constellation-textured bg
     (designer-panel v0.104.0: cards on the textured ravenpower bg need
     rgba(0,0,0,0.55-0.70) to maintain perceived elevation; the lighter
     v0.103.0 values blended into the noise of the constellation overlay). */
  --rc-shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.35);
  --rc-shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.45), 0 1px 2px rgba(0, 0, 0, 0.3);
  --rc-shadow: 0 4px 14px rgba(0, 0, 0, 0.55), 0 2px 4px rgba(0, 0, 0, 0.35);
  --rc-shadow-md: 0 8px 22px rgba(0, 0, 0, 0.6), 0 3px 6px rgba(0, 0, 0, 0.4);
  --rc-shadow-lg: 0 16px 34px rgba(0, 0, 0, 0.65), 0 5px 10px rgba(0, 0, 0, 0.45);
  --rc-shadow-xl: 0 24px 50px rgba(0, 0, 0, 0.7), 0 8px 16px rgba(0, 0, 0, 0.5);

  /* Focus rings — brighter accent colors on dark */
  --rc-focus-ring: 0 0 0 3px rgba(58, 163, 145, 0.45);
  --rc-focus-ring-gold: 0 0 0 3px rgba(201, 168, 76, 0.45);
}

/* ── Shared component classes (prefixed .rc-* to avoid collision) ──── */

.rc-card {
  background: var(--rc-surface);
  border: 1px solid var(--rc-border);
  border-radius: var(--rc-radius);
  padding: var(--rc-space-5);
  box-shadow: var(--rc-shadow-sm);
  transition:
    box-shadow 0.15s ease,
    border-color 0.15s ease;
}
.rc-card:hover {
  box-shadow: var(--rc-shadow);
  border-color: var(--rc-border-strong);
}

.rc-pill {
  display: inline-flex;
  align-items: center;
  gap: var(--rc-space-2);
  padding: var(--rc-space-1) var(--rc-space-3);
  border: 1px solid var(--rc-border);
  border-radius: var(--rc-radius-pill);
  background: var(--rc-surface);
  color: var(--rc-muted);
  font-size: 0.8125rem;
  font-weight: 500;
  letter-spacing: var(--rc-tracking-snug);
}

.rc-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: var(--rc-radius-sm);
  font-family: var(--rc-font-mono);
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: var(--rc-tracking-wide);
  text-transform: uppercase;
}
.rc-badge--ok {
  background: var(--rc-ok-bg);
  color: var(--rc-ok-fg);
}
.rc-badge--warn {
  background: var(--rc-warn-bg);
  color: var(--rc-warn-fg);
}
.rc-badge--danger {
  background: var(--rc-danger-bg);
  color: var(--rc-danger-fg);
}
.rc-badge--neutral {
  background: var(--rc-neutral-bg);
  color: var(--rc-neutral-fg);
}

.rc-tab {
  background: transparent;
  color: var(--rc-muted);
  border: none;
  border-bottom: 2px solid transparent;
  padding: var(--rc-space-3) var(--rc-space-4);
  cursor: pointer;
  font-family: var(--rc-font-sans);
  font-size: 0.9375rem;
  font-weight: 500;
  letter-spacing: var(--rc-tracking-snug);
  transition:
    color 0.15s ease,
    border-color 0.15s ease;
}
.rc-tab:hover {
  color: var(--rc-text);
}
.rc-tab.is-active {
  color: var(--rc-text);
  border-bottom-color: var(--rc-teal);
}
/* Gold variant for the dashboard's Norse tab strip */
.rc-tab.is-active.rc-tab--gold {
  border-bottom-color: var(--rc-gold);
}

.rc-button {
  display: inline-flex;
  align-items: center;
  gap: var(--rc-space-2);
  padding: var(--rc-space-2) var(--rc-space-4);
  border: 1px solid var(--rc-border-strong);
  border-radius: var(--rc-radius-sm);
  background: var(--rc-surface);
  color: var(--rc-text);
  font-family: var(--rc-font-sans);
  font-size: 0.875rem;
  font-weight: 500;
  letter-spacing: var(--rc-tracking-snug);
  cursor: pointer;
  transition:
    background 0.15s ease,
    border-color 0.15s ease,
    box-shadow 0.15s ease;
}
.rc-button:hover {
  background: var(--rc-surface-2);
  border-color: var(--rc-muted);
}
.rc-button:focus-visible {
  outline: none;
  box-shadow: var(--rc-focus-ring);
}
.rc-button--primary {
  background: var(--rc-teal);
  color: var(--rc-surface);
  border-color: var(--rc-teal);
}
.rc-button--primary:hover {
  background: var(--rc-teal-soft);
  border-color: var(--rc-teal-soft);
}
.rc-button--gold {
  background: var(--rc-gold);
  color: var(--rc-surface);
  border-color: var(--rc-gold);
}
.rc-button--gold:hover {
  background: var(--rc-gold-soft);
  border-color: var(--rc-gold-soft);
}
.rc-button--gold:focus-visible {
  box-shadow: var(--rc-focus-ring-gold);
}

.rc-input {
  padding: var(--rc-space-2) var(--rc-space-3);
  border: 1px solid var(--rc-border-strong);
  border-radius: var(--rc-radius-sm);
  background: var(--rc-surface);
  color: var(--rc-text);
  font-family: var(--rc-font-sans);
  font-size: 0.9375rem;
  line-height: 1.4;
  transition:
    border-color 0.15s ease,
    box-shadow 0.15s ease;
}
.rc-input:focus {
  outline: none;
  border-color: var(--rc-teal);
  box-shadow: var(--rc-focus-ring);
}

.rc-code {
  font-family: var(--rc-font-mono);
  background: var(--rc-surface-2);
  border: 1px solid var(--rc-border);
  border-radius: var(--rc-radius-sm);
  padding: 1px 6px;
  font-size: 0.875em;
  color: var(--rc-text);
}

/* ──────────────────────────────────────────────────────────────────────
   Animation keyframes — shared across surfaces.
   - rcFadeUp: view-enter stagger (cards fade up sequentially)
   - rcShimmer: skeleton-loading sweep
   - rcShimmerOnce: hero-accent shine, fires ONCE on first paint
   All wrapped in prefers-reduced-motion negation at the surface level
   (the existing global `* { animation: none }` block covers them).
   ────────────────────────────────────────────────────────────────────── */
@keyframes rcFadeUp {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: none;
  }
}
@keyframes rcShimmer {
  0% {
    background-position: -120% 0;
  }
  100% {
    background-position: 120% 0;
  }
}
@keyframes rcShimmerOnce {
  0% {
    background-position: -120% 0;
    opacity: 0;
  }
  20% {
    opacity: 1;
  }
  100% {
    background-position: 120% 0;
    opacity: 1;
  }
}

/* Skeleton-loading utility. Use as a placeholder block while content is
   debouncing/loading. Respects reduced-motion via the global * negation. */
.rc-shimmer {
  background: linear-gradient(
    90deg,
    var(--rc-surface-2) 0%,
    var(--rc-border) 50%,
    var(--rc-surface-2) 100%
  );
  background-size: 200% 100%;
  animation: rcShimmer 1.6s linear infinite;
  border-radius: var(--rc-radius-sm);
  color: transparent;
}
.rc-shimmer--text {
  height: 0.9375rem;
  width: 70%;
}
.rc-shimmer--block {
  height: 120px;
  width: 100%;
}


      /* ── Local aliases — map the existing index.html variables onto the
         shared tokens so the cascade lights this surface as light-beige +
         teal (the index/landing accent). Per-surface overrides live below. */
      :root {
        --bg: var(--rc-bg);
        --bg-2: var(--rc-surface-2);
        --surface: var(--rc-surface);
        --surface-2: var(--rc-surface-2);
        --surface-3: var(--rc-border);
        --border: var(--rc-border);
        --border-strong: var(--rc-border-strong);
        --text: var(--rc-text);
        --muted: var(--rc-muted);
        --faint: var(--rc-faint);
        --teal: var(--rc-teal);
        --teal-2: var(--rc-teal);
        --teal-dim: var(--rc-teal-soft);
        --teal-soft: rgba(31, 127, 120, 0.10);
        --teal-glow: rgba(31, 127, 120, 0.28);
        --ok: var(--rc-ok);
        --warn: var(--rc-warn);
        --danger: var(--rc-danger);
        --deny: var(--rc-danger);
        --ask: var(--rc-warn);
        --allow: var(--rc-ok);
        --font-sans: var(--rc-font-sans);
        --font-mono: var(--rc-font-mono);
        --radius: var(--rc-radius-lg);
        --radius-sm: var(--rc-radius-sm);
        --sidebar-w: 264px;
        --sidebar-collapsed: 72px;
        --topbar-h: 64px;
        --shadow: var(--rc-shadow-lg);
        --ring: var(--rc-focus-ring);
      }
      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        font-family: var(--font-sans);
        color: var(--text);
        background:
          radial-gradient(1100px 700px at 100% -10%, rgba(45, 212, 191, 0.10), transparent 60%),
          radial-gradient(900px 600px at -10% 10%, rgba(56, 189, 248, 0.08), transparent 55%),
          var(--bg);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        min-height: 100vh;
      }
      a { color: var(--teal-2); text-decoration: none; }
      a:hover { color: var(--teal); }
      h1, h2, h3, h4 { letter-spacing: -0.02em; line-height: 1.15; margin: 0; }
      h1 { font-size: clamp(1.9rem, 4vw, 2.8rem); }
      p { line-height: 1.6; }
      ::selection { background: var(--teal); color: #04121a; }
      :focus-visible { outline: none; box-shadow: var(--ring); border-radius: 8px; }
      button { font-family: inherit; cursor: pointer; }

      /* ---------- Layout shell ---------- */
      .app { display: grid; grid-template-columns: var(--sidebar-w) 1fr; min-height: 100vh; transition: grid-template-columns 0.25s ease; }
      body.sidebar-collapsed .app { grid-template-columns: var(--sidebar-collapsed) 1fr; }

      /* ---------- Sidebar ---------- */
      .sidebar {
        position: sticky; top: 0; height: 100vh;
        background: linear-gradient(180deg, var(--bg-2), var(--bg));
        border-right: 1px solid var(--border);
        display: flex; flex-direction: column;
        overflow: hidden; z-index: 40;
      }
      .brand { display: flex; align-items: center; gap: 12px; padding: 16px 18px; height: var(--topbar-h); border-bottom: 1px solid var(--border); white-space: nowrap; }
      .brand .mark { flex: 0 0 auto; width: 34px; height: 34px; display: grid; place-items: center; border-radius: 10px; background: var(--teal-soft); border: 1px solid var(--border-strong); color: var(--teal-2); box-shadow: 0 0 18px -4px var(--teal-glow); }
      .brand .mark svg { width: 20px; height: 20px; }
      .brand .name { font-weight: 700; font-size: 1.05rem; }
      .brand .name b { color: var(--teal-2); }
      .brand .tag { display: block; font-size: 0.66rem; color: var(--faint); font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
      body.sidebar-collapsed .brand .meta { display: none; }

      .nav { padding: 14px 12px; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; flex: 1; }
      .nav .group-label { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--faint); padding: 14px 12px 6px; }
      body.sidebar-collapsed .nav .group-label { opacity: 0; }
      .nav a.nav-item {
        display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: var(--radius-sm);
        color: var(--muted); font-weight: 500; font-size: 0.92rem; white-space: nowrap;
        transition: background 0.15s, color 0.15s; position: relative;
      }
      .nav a.nav-item svg { width: 19px; height: 19px; flex: 0 0 auto; }
      .nav a.nav-item:hover { background: var(--surface); color: var(--text); }
      .nav a.nav-item.active { background: var(--teal-soft); color: var(--teal-2); }
      .nav a.nav-item.active::before { content: ""; position: absolute; left: 0; top: 8px; bottom: 8px; width: 3px; border-radius: 3px; background: var(--teal); }
      body.sidebar-collapsed .nav a.nav-item .label { display: none; }
      body.sidebar-collapsed .nav a.nav-item { justify-content: center; }

      .sidebar-foot { padding: 12px; border-top: 1px solid var(--border); font-size: 0.72rem; color: var(--faint); white-space: nowrap; }
      body.sidebar-collapsed .sidebar-foot .detail { display: none; }

      /* ---------- Main ---------- */
      .main { min-width: 0; display: flex; flex-direction: column; }
      .topbar {
        position: sticky; top: 0; z-index: 30; height: var(--topbar-h);
        display: flex; align-items: center; gap: 14px; padding: 0 20px;
        background: rgba(11, 17, 32, 0.82); backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
      }
      .icon-btn { width: 38px; height: 38px; display: grid; place-items: center; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); color: var(--muted); transition: 0.15s; }
      .icon-btn:hover { color: var(--text); border-color: var(--border-strong); background: var(--surface-2); }
      .icon-btn svg { width: 18px; height: 18px; }

      .search { position: relative; flex: 1; max-width: 520px; }
      .search input {
        width: 100%; height: 40px; padding: 0 14px 0 40px; border-radius: 10px;
        background: var(--surface); border: 1px solid var(--border); color: var(--text);
        font-size: 0.9rem; font-family: inherit; transition: 0.15s;
      }
      .search input::placeholder { color: var(--faint); }
      .search input:focus { border-color: var(--teal-dim); background: var(--surface-2); }
      .search .s-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--faint); width: 18px; height: 18px; pointer-events: none; }
      .search kbd { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 0.68rem; color: var(--faint); border: 1px solid var(--border); border-radius: 6px; padding: 2px 6px; font-family: var(--font-mono); }
      .search-results {
        position: absolute; top: 48px; left: 0; right: 0; max-height: 60vh; overflow-y: auto;
        background: var(--surface); border: 1px solid var(--border-strong); border-radius: 12px;
        box-shadow: var(--shadow); padding: 6px; display: none;
      }
      .search-results.open { display: block; }
      .search-results .res {
        display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; color: var(--text); cursor: pointer;
      }
      .search-results .res:hover, .search-results .res.cursor { background: var(--surface-2); }
      .search-results .res .kind { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--teal-2); border: 1px solid var(--border); border-radius: 999px; padding: 2px 8px; flex: 0 0 auto; }
      .search-results .res .meta { color: var(--faint); font-size: 0.78rem; margin-left: auto; }
      .search-results .empty { padding: 16px; color: var(--faint); text-align: center; font-size: 0.85rem; }

      .topbar .actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
      .btn {
        display: inline-flex; align-items: center; gap: 8px; padding: 9px 14px; border-radius: 10px;
        font-size: 0.85rem; font-weight: 600; border: 1px solid var(--border); background: var(--surface); color: var(--text);
        transition: 0.15s; white-space: nowrap;
      }
      .btn svg { width: 16px; height: 16px; }
      .btn:hover { border-color: var(--border-strong); background: var(--surface-2); }
      .btn.primary { background: linear-gradient(180deg, var(--teal), var(--teal-dim)); color: #04121a; border-color: transparent; box-shadow: 0 8px 22px -10px var(--teal-glow); }
      .btn.primary:hover { filter: brightness(1.06); }
      .btn.ghost { background: transparent; }
      .hide-sm { }

      /* ---------- Content ---------- */
      .content { padding: 28px clamp(16px, 4vw, 40px) 64px; max-width: 1320px; width: 100%; margin: 0 auto; animation: fade 0.35s ease; }
      @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
      .page-head { margin-bottom: 24px; }
      .page-head .eyebrow { color: var(--teal-2); font-size: 0.74rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
      .page-head p.lede { color: var(--muted); margin-top: 8px; max-width: 70ch; }

      .card { background: linear-gradient(180deg, var(--surface), var(--bg-2)); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; transition: 0.18s; }
      .card:hover { border-color: var(--border-strong); transform: translateY(-2px); box-shadow: var(--shadow); }
      .grid { display: grid; gap: 16px; }
      .cols-2 { grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); }
      .cols-3 { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
      .cols-4 { grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); }

      /* Hero */
      .hero { position: relative; overflow: hidden; border-radius: 20px; padding: clamp(28px, 5vw, 52px); margin-bottom: 28px;
        background: radial-gradient(700px 360px at 88% -20%, rgba(45,212,191,0.18), transparent 60%), linear-gradient(180deg, var(--surface), var(--bg-2));
        border: 1px solid var(--border); }
      .hero .pill { display: inline-flex; align-items: center; gap: 8px; font-size: 0.74rem; font-weight: 600; color: var(--teal-2); background: var(--teal-soft); border: 1px solid var(--border-strong); padding: 6px 12px; border-radius: 999px; }
      .hero h1 { margin: 18px 0 10px; }
      .hero h1 .accent { background: linear-gradient(90deg, var(--rc-gold, #c9a84c), var(--rc-gold-soft, #e0c478)); -webkit-background-clip: text; background-clip: text; color: transparent; }
      .hero p { color: var(--muted); max-width: 64ch; font-size: 1.05rem; }
      .hero .hero-cta { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 22px; }

      /* Stat cards */
      .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
      .stat { display: flex; flex-direction: column; gap: 4px; }
      .stat .v { font-size: 2.1rem; font-weight: 700; color: var(--teal-2); line-height: 1; }
      .stat .k { color: var(--muted); font-size: 0.86rem; }
      .stat .sub { color: var(--faint); font-size: 0.74rem; }

      /* Action tiles */
      .action-tile { display: flex; gap: 14px; align-items: flex-start; text-align: left; width: 100%; }
      .action-tile .ico { width: 44px; height: 44px; flex: 0 0 auto; border-radius: 12px; display: grid; place-items: center; background: var(--teal-soft); color: var(--teal-2); border: 1px solid var(--border-strong); }
      .action-tile .ico svg { width: 22px; height: 22px; }
      .action-tile .t { font-weight: 600; font-size: 1rem; }
      .action-tile .d { color: var(--muted); font-size: 0.84rem; margin-top: 2px; }

      .section-title { display: flex; align-items: baseline; gap: 12px; margin: 34px 0 14px; }
      .section-title h2 { font-size: 1.3rem; }
      .section-title .hint { color: var(--faint); font-size: 0.82rem; }

      .chip { display: inline-flex; align-items: center; gap: 5px; font-size: 0.72rem; font-weight: 600; padding: 3px 9px; border-radius: 999px; background: var(--surface-2); border: 1px solid var(--border); color: var(--muted); }
      .chip.teal { color: var(--teal-2); border-color: var(--border-strong); background: var(--teal-soft); }
      .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }

      /* Plugin card */
      .plugin-card { display: flex; flex-direction: column; height: 100%; }
      .plugin-card .pc-head { display: flex; align-items: center; gap: 10px; }
      .plugin-card .pc-head .nm { font-weight: 700; font-size: 1.02rem; }
      .plugin-card .ver { margin-left: auto; font-family: var(--font-mono); font-size: 0.72rem; color: var(--faint); }
      .plugin-card .desc { color: var(--muted); font-size: 0.86rem; margin: 10px 0 0; flex: 1; }
      .plugin-card .metrics { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; font-size: 0.76rem; color: var(--faint); }
      .plugin-card .metrics b { color: var(--teal-2); }
      .plugin-card .pc-foot { display: flex; gap: 8px; margin-top: 14px; }

      /* Marketplace layout */
      .mkt { display: grid; grid-template-columns: 240px 1fr; gap: 22px; align-items: start; }
      .mkt-nav { position: sticky; top: calc(var(--topbar-h) + 20px); display: flex; flex-direction: column; gap: 4px; }
      .mkt-nav button { display: flex; align-items: center; gap: 10px; text-align: left; padding: 10px 12px; border-radius: 10px; background: transparent; border: 1px solid transparent; color: var(--muted); font-size: 0.88rem; font-weight: 500; }
      .mkt-nav button svg { width: 17px; height: 17px; }
      .mkt-nav button:hover { background: var(--surface); color: var(--text); }
      .mkt-nav button.active { background: var(--teal-soft); color: var(--teal-2); border-color: var(--border-strong); }
      .mkt-nav button .count { margin-left: auto; font-size: 0.72rem; color: var(--faint); }
      .mkt-filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; align-items: center; }
      .mkt-filters input { flex: 1; min-width: 200px; height: 40px; padding: 0 14px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: inherit; }
      .mkt-filters input:focus { border-color: var(--teal-dim); }

      /* Roster table */
      .roster-controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
      .roster-controls select, .roster-controls input { height: 40px; padding: 0 12px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: inherit; font-size: 0.88rem; }
      .roster-controls input { flex: 1; min-width: 200px; }
      .agent-card .ac-head { display: flex; align-items: center; gap: 10px; }
      .agent-card .ac-head .nm { font-weight: 600; }
      .agent-card .role { margin-left: auto; }
      .agent-card .desc { color: var(--muted); font-size: 0.84rem; margin-top: 8px; }
      .agent-card .trig { margin-top: 10px; font-size: 0.78rem; color: var(--faint); }
      .agent-card .trig code { color: var(--teal-2); background: var(--surface-2); padding: 1px 6px; border-radius: 6px; font-family: var(--font-mono); }

      details.lib { border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; background: var(--surface); overflow: hidden; }
      details.lib > summary { list-style: none; cursor: pointer; padding: 14px 16px; display: flex; align-items: center; gap: 10px; font-weight: 600; }
      details.lib > summary::-webkit-details-marker { display: none; }
      details.lib > summary .caret { margin-left: auto; transition: transform 0.2s; color: var(--faint); }
      details.lib[open] > summary .caret { transform: rotate(90deg); }
      details.lib .lib-body { padding: 0 16px 16px; color: var(--muted); font-size: 0.86rem; }
      details.lib .lib-body .pill-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }

      /* Configuration / posture */
      .config-grid { display: grid; grid-template-columns: 1fr 380px; gap: 22px; align-items: start; }
      .preset-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
      .preset-btn { padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-weight: 600; font-size: 0.86rem; display: flex; flex-direction: column; align-items: flex-start; gap: 2px; max-width: 230px; text-align: left; }
      .preset-btn small { font-weight: 400; color: var(--faint); font-size: 0.72rem; }
      .preset-btn:hover { border-color: var(--teal-dim); }
      .preset-btn.active { border-color: var(--teal); background: var(--teal-soft); }

      .pcat-group { margin-top: 20px; }
      .pcat-group h4 { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--faint); margin-bottom: 10px; }
      .pcat { display: flex; align-items: center; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--border); }
      .pcat .pc-info { min-width: 0; flex: 1; }
      .pcat .pc-info .t { font-weight: 600; font-size: 0.92rem; }
      .pcat .pc-info .d { color: var(--muted); font-size: 0.8rem; margin-top: 2px; }
      .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; flex: 0 0 auto; background: var(--bg-2); }
      .seg button { padding: 7px 14px; background: transparent; border: none; color: var(--muted); font-size: 0.8rem; font-weight: 600; transition: 0.12s; }
      .seg button + button { border-left: 1px solid var(--border); }
      .seg button[data-level="deny"].on { background: rgba(251,113,133,0.18); color: var(--deny); }
      .seg button[data-level="ask"].on { background: rgba(251,191,36,0.18); color: var(--ask); }
      .seg button[data-level="allow"].on { background: rgba(52,211,153,0.18); color: var(--allow); }

      .yaml-panel { position: sticky; top: calc(var(--topbar-h) + 20px); }
      .yaml-panel pre { background: #060c16; border: 1px solid var(--border); border-radius: 12px; padding: 14px; overflow: auto; max-height: 460px; font-family: var(--font-mono); font-size: 0.76rem; color: #cfe7e2; line-height: 1.5; }
      .yaml-panel .yp-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
      .toggle-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
      .switch { position: relative; width: 46px; height: 26px; flex: 0 0 auto; }
      .switch input { opacity: 0; width: 0; height: 0; }
      .switch .track { position: absolute; inset: 0; background: var(--surface-3); border-radius: 999px; transition: 0.2s; border: 1px solid var(--border); }
      .switch .track::before { content: ""; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: var(--muted); border-radius: 50%; transition: 0.2s; }
      .switch input:checked + .track { background: var(--teal-soft); border-color: var(--teal); }
      .switch input:checked + .track::before { transform: translateX(20px); background: var(--teal-2); }

      .floor-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
      .floor-list code { font-family: var(--font-mono); font-size: 0.72rem; color: var(--danger); background: rgba(251,113,133,0.10); border: 1px solid rgba(251,113,133,0.25); padding: 2px 8px; border-radius: 6px; }

      .callout { border: 1px solid var(--border-strong); border-radius: 12px; padding: 14px 16px; background: var(--teal-soft); color: var(--text); font-size: 0.86rem; display: flex; gap: 12px; }
      .callout svg { width: 20px; height: 20px; color: var(--teal-2); flex: 0 0 auto; margin-top: 2px; }

      .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface-3); border: 1px solid var(--teal); color: var(--text); padding: 12px 18px; border-radius: 10px; font-size: 0.86rem; box-shadow: var(--shadow); opacity: 0; pointer-events: none; transition: 0.25s; z-index: 90; }
      .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

      .empty-state { text-align: center; padding: 60px 20px; color: var(--faint); }
      .activity-item { display: flex; gap: 12px; align-items: flex-start; padding: 12px 0; border-bottom: 1px solid var(--border); }
      .activity-item .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--teal); margin-top: 6px; flex: 0 0 auto; box-shadow: 0 0 10px var(--teal-glow); }
      .activity-item .when { color: var(--faint); font-size: 0.76rem; margin-left: auto; white-space: nowrap; }

      .scrim { position: fixed; inset: 0; background: rgba(4,8,16,0.6); backdrop-filter: blur(2px); z-index: 35; opacity: 0; pointer-events: none; transition: 0.2s; }
      body.mobile-nav-open .scrim { opacity: 1; pointer-events: auto; }

      /* ---------- Responsive ---------- */
      @media (max-width: 1020px) {
        .config-grid { grid-template-columns: 1fr; }
        .yaml-panel { position: static; }
        .mkt { grid-template-columns: 1fr; }
        .mkt-nav { position: static; flex-direction: row; flex-wrap: wrap; }
      }
      @media (max-width: 820px) {
        .app { grid-template-columns: 1fr !important; }
        .sidebar { position: fixed; left: 0; top: 0; width: var(--sidebar-w); transform: translateX(-100%); transition: transform 0.25s ease; box-shadow: var(--shadow); }
        body.mobile-nav-open .sidebar { transform: translateX(0); }
        body.sidebar-collapsed .nav a.nav-item .label,
        body.sidebar-collapsed .brand .meta { display: revert; }
        .desktop-collapse { display: none; }
        .hide-sm { display: none; }
        .search kbd { display: none; }
      }
      @media (min-width: 821px) { .mobile-only { display: none; } }
      @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; scroll-behavior: auto; } }

      /* ──────────────────────────────────────────────────────────────────
         v0.103.0 — Intercom polish: ⌘K palette, dark mode wire, scenario
         picker upgrades, refined hover/focus states, micro-interactions.
         ────────────────────────────────────────────────────────────────── */

      /* Refined card hover — soft lift + warm shadow growth */
      .card { transition: transform 0.18s cubic-bezier(.4,0,.2,1), box-shadow 0.18s ease, border-color 0.18s ease; }
      .card:hover { transform: translateY(-1px); box-shadow: var(--rc-shadow-md, var(--shadow)); }

      /* Refined button states */
      .btn { transition: transform 0.12s ease, background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease; }
      .btn:active { transform: scale(0.98); }
      .btn:focus-visible { box-shadow: var(--rc-focus-ring); outline: none; }

      /* Sidebar active-state rule animation */
      .nav a.nav-item.active::before { transition: width 0.18s ease, background 0.18s ease; }
      .nav a.nav-item.active:hover::before { width: 4px; }

      /* ── Raven sigil (replaces the v0.103.0 theme toggle in v0.104.0) ── */
      .raven-sigil {
        width: 38px; height: 38px; display: grid; place-items: center;
        color: var(--rc-gold, var(--accent));
        flex: 0 0 auto;
      }
      .raven-sigil svg { width: 22px; height: 22px; }

      /* ── ⌘K Command Palette ─────────────────────────────────────────── */
      .palette-backdrop {
        position: fixed; inset: 0; background: rgba(20, 17, 13, 0.55);
        backdrop-filter: blur(8px); z-index: 90; opacity: 0; pointer-events: none;
        transition: opacity 0.18s ease;
      }
      .palette-backdrop.open { opacity: 1; pointer-events: auto; }
      .palette {
        position: fixed; top: 15vh; left: 50%; transform: translateX(-50%) translateY(-12px);
        width: min(560px, calc(100vw - 32px));
        background: var(--surface); border: 1px solid var(--border-strong);
        border-radius: 14px; box-shadow: var(--rc-shadow-xl, var(--shadow));
        z-index: 91; opacity: 0; pointer-events: none;
        transition: opacity 0.18s ease, transform 0.18s cubic-bezier(.4,0,.2,1);
        display: flex; flex-direction: column; max-height: 70vh; overflow: hidden;
      }
      .palette.open { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
      .palette-input-row { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
      .palette-input-row svg { width: 18px; height: 18px; color: var(--faint); flex: 0 0 auto; }
      .palette-input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: inherit; font-size: 0.95rem; }
      .palette-input::placeholder { color: var(--faint); }
      .palette-input-row kbd { font-size: 0.68rem; color: var(--faint); border: 1px solid var(--border); border-radius: 6px; padding: 2px 6px; font-family: var(--font-mono); }
      .palette-results { overflow-y: auto; padding: 8px 0; }
      .palette-section { padding: 4px 8px; }
      .palette-section-label { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--faint); padding: 8px 10px 6px; }
      .palette-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 9px; cursor: pointer; color: var(--text); }
      .palette-item:hover, .palette-item.cursor { background: var(--surface-2); }
      .palette-item .pi-ico { width: 18px; height: 18px; flex: 0 0 auto; color: var(--muted); }
      .palette-item .pi-label { font-size: 0.92rem; font-weight: 500; }
      .palette-item .pi-meta { margin-left: auto; font-size: 0.74rem; color: var(--faint); }
      .palette-item.cursor .pi-ico { color: var(--teal-2); }
      .palette-empty { padding: 24px 16px; text-align: center; color: var(--faint); font-size: 0.88rem; }
      .palette-empty .palette-hint { display: block; margin-top: 6px; font-size: 0.78rem; }
      .palette-foot { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-top: 1px solid var(--border); font-size: 0.72rem; color: var(--faint); flex: 0 0 auto; }
      .palette-foot kbd { font-size: 0.68rem; color: var(--muted); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; font-family: var(--font-mono); }
      .palette-opener {
        flex: 1; max-width: 520px; height: 40px;
        display: flex; align-items: center; gap: 10px; padding: 0 12px;
        border-radius: 10px; background: var(--surface); border: 1px solid var(--border);
        color: var(--faint); cursor: pointer; transition: 0.15s;
        font-family: inherit; font-size: 0.88rem;
      }
      .palette-opener:hover { color: var(--text); border-color: var(--border-strong); background: var(--surface-2); }
      .palette-opener svg { width: 18px; height: 18px; flex: 0 0 auto; }
      .palette-opener .label { flex: 1; text-align: left; }
      .palette-opener kbd { font-size: 0.68rem; color: var(--faint); border: 1px solid var(--border); border-radius: 6px; padding: 2px 6px; font-family: var(--font-mono); }

      /* ── Scenario picker (Configuration view) ──────────────────────── */
      .scenario-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; margin-bottom: 24px; }
      .scenario-card {
        position: relative; padding: 18px;
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 14px; cursor: pointer;
        transition: transform 0.18s cubic-bezier(.4,0,.2,1), box-shadow 0.18s ease, border-color 0.18s ease;
        text-align: left;
      }
      .scenario-card:hover { transform: translateY(-2px); box-shadow: var(--rc-shadow-md, var(--shadow)); border-color: var(--border-strong); }
      .scenario-card.active { box-shadow: var(--rc-shadow-md, var(--shadow)); }
      .scenario-card[data-profile="strict"].active { border-color: var(--rc-gold, #b8923a); }
      .scenario-card[data-profile="balanced"].active { border-color: var(--rc-teal, var(--teal)); }
      .scenario-card[data-profile="exploratory"].active { border-color: var(--rc-border-strong, var(--border-strong)); }
      .scenario-card[data-profile="autonomous"].active { border-color: #b5630a; }
      .scenario-card .sc-tag {
        position: absolute; top: 12px; right: 12px;
        font-size: 0.66rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
        color: var(--teal-2); padding: 3px 8px; background: var(--teal-soft);
        border: 1px solid var(--border-strong); border-radius: 999px;
      }
      .scenario-card .sc-name { font-weight: 700; font-size: 1.05rem; margin-bottom: 6px; letter-spacing: -0.01em; }
      .scenario-card .sc-blurb { color: var(--muted); font-size: 0.84rem; line-height: 1.5; margin-bottom: 14px; }
      .scenario-card .sc-means { display: flex; flex-direction: column; gap: 6px; font-size: 0.78rem; color: var(--muted); }
      .scenario-card .sc-means .sm-line { display: flex; gap: 8px; align-items: baseline; }
      .scenario-card .sc-means .sm-bullet { color: var(--faint); }

      .pcat-row { display: flex; flex-direction: column; padding: 14px 0; border-bottom: 1px solid var(--border); }
      .pcat-row-head { display: flex; align-items: center; gap: 14px; }

         (substituted from dashboard-assets/constellation.js via /*
 * RavenClaude — Constellation Background (shared partial)
 * ----------------------------------------------------------------------------
 * Renders an SVG constellation overlay as a fixed background layer behind
 * the page content. Used by `index.html` and `dashboard.html` (ravenpower
 * aesthetic). Read at generate-time and inlined via the
 * `/*__CONSTELLATION_JS__*\/` marker substitution.
 *
 * Design (per designer-panel, v0.104.0):
 *   - 140 stars, mixed radii r=0.8..3.5, opacity 0.25..0.85
 *   - 90% white #ffffff + 10% gold-tinted #f5e8c0 ("warm Norse sky")
 *   - Deterministic seeded LCG (NOT Math.random) — same sky every load
 *   - Static (no animation v1; drift/parallax is v2)
 *   - position: fixed, inset: 0, z-index: 0, pointer-events: none
 *   - aria-hidden="true" (pure decoration)
 *   - Respects prefers-reduced-motion (no effect v1; defensive for v2)
 *
 * Insertion: the page sets up a placeholder element <svg id="rc-constellation"
 * style="position:fixed;inset:0;z-index:0;pointer-events:none" aria-hidden="true">
 * at the very top of <body>. This script populates it with <circle> children
 * sized to the viewport. Page body content sits at z-index >= 1.
 *
 * Recomputed on resize (debounced) so the constellation stays viewport-fit.
 */

(function renderConstellation() {
  "use strict";
  var svg = document.getElementById("rc-constellation");
  if (!svg) return;

  // Linear Congruential Generator — deterministic across loads.
  // Fixed seed = 0xDEADBEEF. We never call Math.random.
  function lcg(seed) {
    var s = seed >>> 0;
    return function next() {
      s = (Math.imul(s, 1664525) + 1013904223) >>> 0;
      return s / 4294967296;
    };
  }

  function draw() {
    var w = window.innerWidth || document.documentElement.clientWidth || 1440;
    var h = window.innerHeight || document.documentElement.clientHeight || 900;
    // Density: ~140 stars at 1440x900 viewport-equivalent. Scale linearly with area.
    var density = (w * h) / (1440 * 900);
    var STAR_COUNT = Math.max(40, Math.min(220, Math.round(140 * density)));

    svg.setAttribute("viewBox", "0 0 " + w + " " + h);
    svg.setAttribute("preserveAspectRatio", "xMidYMid slice");
    // Wipe + redraw
    while (svg.firstChild) svg.removeChild(svg.firstChild);

    var rng = lcg(0xdeadbeef ^ STAR_COUNT);
    var NS = "http://www.w3.org/2000/svg";
    for (var i = 0; i < STAR_COUNT; i++) {
      var x = rng() * w;
      var y = rng() * h;
      // Size distribution: 80% small (0.8-1.2), 15% mid (1.5-2), 5% large (2.5-3.5)
      var rRoll = rng();
      var r;
      if (rRoll < 0.8) r = 0.8 + rng() * 0.4;
      else if (rRoll < 0.95) r = 1.5 + rng() * 0.5;
      else r = 2.5 + rng() * 1.0;
      // Opacity: 0.25..0.85, brighter for larger stars
      var opacity = 0.25 + rng() * 0.6;
      if (r > 2) opacity = Math.max(opacity, 0.7);
      // Color: 90% white + 10% gold-tinted
      var fill = rng() < 0.9 ? "#ffffff" : "#f5e8c0";
      var c = document.createElementNS(NS, "circle");
      c.setAttribute("cx", x.toFixed(2));
      c.setAttribute("cy", y.toFixed(2));
      c.setAttribute("r", r.toFixed(2));
      c.setAttribute("fill", fill);
      c.setAttribute("opacity", opacity.toFixed(2));
      svg.appendChild(c);
    }
  }

  // Debounced resize handler — constellation re-fits viewport
  var resizeT;
  function onResize() {
    clearTimeout(resizeT);
    resizeT = setTimeout(draw, 150);
  }
  window.addEventListener("resize", onResize);

  draw();
})();

"categories":[{"id":"file_read_project","title":"Read files in this project","group":"Files","description":"Reading source files inside the current project directory.","guidance":"Reading source files is essentially free — Claude can't break anything by looking. Most users keep this on 'Allow'. Tighten to 'Ask' or 'Deny' only if your project has files Claude shouldn't routinely scan (a checked-in keystore, a vendored secret, a generated SBOM with binary blobs).","recommended":"allow","controls":"Anything Claude does to LOOK at files inside your current project directory — opening, scanning, reading. No changes to disk, no shell side effects, no network calls. This is the cheapest category.","rec_individual":"Allow — solo work benefits from Claude moving through your codebase freely; reads are essentially free.","rec_team":"Allow — same as solo; reading shared code doesn't affect teammates and is cheap regardless.","examples":["ls src/","cat README.md","grep -r TODO src/","Opening a file in the IDE","Walking the directory tree to understand the project layout"]},{"id":"file_edit_project","title":"Edit files in this project","group":"Files","description":"Creating or modifying files inside the current project.","guidance":"If you want to review every change before it lands, set this to 'Ask'. If you trust Claude to refactor or generate freely and rely on git for review, 'Allow' works — the diff is visible after the fact. Pair with 'Ask' on shell_remote_mutate so Claude can edit freely but still pauses before pushing.","recommended":"allow","controls":"Write, Edit, MultiEdit — anything Claude does to CHANGE a file inside your current project. The change is recoverable via git as long as you commit regularly, but it does affect your working tree immediately.","rec_individual":"Allow — solo work can rely on git for review; let Claude refactor and generate freely, then look at the diff.","rec_team":"Ask — teammates will be reviewing or blocked-on the changes; pausing on each edit preserves the review handoff and keeps surprises small.","examples":["Write('src/new-feature.py', ...) — creating a new file","Edit('package.json', ...) — modifying an existing file","MultiEdit refactoring across several files","Generating a new test file from a spec","Adding documentation to an existing module"]},{"id":"file_read_global","title":"Read files outside this project","group":"Files","description":"Reading anything outside the current project directory.","guidance":"Almost always set to 'Ask' or 'Deny'. Files outside your project often contain secrets — SSH keys, AWS creds, browser cookies, ~/.netrc. Only relax this if you have a specific reason (e.g., a single global config the agent legitimately needs to consult).","recommended":"ask","controls":"Anything Claude does to READ files that live OUTSIDE your current project — your home directory, system paths, other projects. These paths frequently contain secrets or configuration Claude has no business with.","rec_individual":"Ask — even solo, you don't want Claude reading ~/.ssh or ~/.aws without a deliberate prompt.","rec_team":"Ask — same as solo; secrets outside the project are always a deliberate decision regardless of who you work with.","examples":["cat ~/.ssh/config — SSH keys and known hosts","cat ~/.aws/credentials — AWS access keys","head /etc/hosts — system DNS overrides","Reading from another project's directory tree","Inspecting browser cookie stores"]},{"id":"file_edit_global","title":"Edit files outside this project","group":"Files","description":"Writing to your home directory or system paths.","guidance":"Keep this on 'Ask' or 'Deny' unless you have a specific reason. CVE-2026-39861 is the canonical example of what goes wrong when sandboxed code escapes the workspace and writes outside. The few cases where you DO want global edits (e.g., updating ~/.gitconfig) are infrequent enough that asking is fine.","recommended":"ask","controls":"Anything Claude does to CHANGE files outside your current project — home directory, system config, other projects. These changes are often unrecoverable (no git tracking) and can affect every other workflow on your machine.","rec_individual":"Ask — solo work that wants to touch ~/.gitconfig or a global setting is the exception, not the rule. Force the pause.","rec_team":"Ask — same as solo; global writes are infrequent enough that always asking is the safe default.","examples":["Write('~/.profile', ...) — adding to your shell init","Editing ~/.gitconfig","Writing into /etc/ (usually requires sudo, separate concern)","Modifying configs in ~/Library/ or ~/.config/","Touching another project's files from this session"]},{"id":"shell_readonly","title":"Read-only shell commands","group":"Shell","description":"ls, cat, git status, grep, find. Cheap shell with no side effects.","guidance":"Claude Code already auto-allows many of these via its built-in READONLY_COMMANDS list, so the prompt rate is already low. 'Allow' is usually right — 'never ask for cheap shell' is the most common preference. Tighten only if you want every command logged into the prompt history.","recommended":"allow","controls":"Shell commands that DON'T change anything on disk and DON'T talk to a server. The 'cheap' shell — running them and not running them produces the same world afterward.","rec_individual":"Allow — cheap shell is cheap regardless of context; let it run freely.","rec_team":"Allow — same as solo; read-only commands can't affect teammates' state.","examples":["ls","cat file.txt","git status, git log, git diff","grep -r foo .","find . -name '*.md'","wc -l, head, tail, file"]},{"id":"shell_local_mutate","title":"Local shell mutations","group":"Shell","description":"mkdir, mv, cp, git commit. Changes filesystem locally.","guidance":"Local mutations are usually recoverable — git history catches deletes, files can be restored. 'Ask' or 'Allow' is the typical choice. Tighten if you're working in a directory where moves/deletes would be hard to recover (e.g., a folder Claude shouldn't restructure without confirmation).","recommended":"allow","controls":"Shell commands that CHANGE your local filesystem but DON'T talk to a server. Effects stay on your machine and are usually recoverable (git reflog exists, files can be restored from snapshots).","rec_individual":"Allow — solo work benefits from Claude restructuring and committing locally; git history catches anything that goes wrong.","rec_team":"Ask — even local mutations (git checkout switching branches, mkdir reorganizing things) can affect what teammates see if they touch the wrong file later. Pausing on local mutations is cheap insurance.","examples":["mkdir src/new-feature","mv old-name.py new-name.py","cp src/template.py src/instance.py","git commit -m '...'","git checkout -b feature/x","rm temp/scratch.txt (recoverable from trash on most OSes)"]},{"id":"shell_remote_mutate","title":"Remote shell mutations","group":"Shell","description":"git push, gh pr create, npm publish — anything that touches a shared system.","guidance":"Most users keep this on 'Ask' to preserve the review step. The cost of a wrong push isn't just the bad commit — it's the explanation to teammates, the revert PR, the audit trail. Even when Claude is 'usually right,' the asymmetric cost makes confirming each push worth it.","recommended":"ask","controls":"Shell commands that PUBLISH to a system other people can see — git remotes, GitHub Issues/PRs, package registries, cloud buckets. Once these complete, you can't simply 'undo' them; reversal usually requires a counter-action that's also visible.","rec_individual":"Ask — even solo, the audit-trail value of confirming each push is worth the friction.","rec_team":"Ask — pushes notify teammates, trigger CI, may break their working state. Every one deserves an explicit click.","examples":["git push origin main","gh pr create","gh pr comment (visible to everyone in the repo)","npm publish (uploads to the registry)","aws s3 sync ... s3://bucket/ (changes remote state)"]},{"id":"shell_code_exec","title":"Arbitrary code execution","group":"Shell","description":"python -c, node -e, bash -c, eval.","guidance":"This is the category most often abused in security incidents — Cursor's settings.json injection (GHSA-ff64-7w26-62rf) ended in arbitrary `python -c` execution via SessionStart hooks. 'Ask' is the safe default. Don't relax this unless you have a specific reason (e.g., a sandboxed REPL where exec is the whole point).","recommended":"ask","controls":"Any command that lets Claude run code that WASN'T pre-written. These bypass per-tool gating because the inner code can do anything the shell can do.","rec_individual":"Ask — arbitrary code exec is the shortest path to RCE if a prompt goes sideways. Worth pausing on every one.","rec_team":"Ask — same as solo; the risk doesn't change with team size.","examples":["python -c 'import os; os.system(...)'","node -e 'process.exit(0)'","bash -c 'curl ... | sh'","eval $UNTRUSTED_STRING","ruby -e '...', perl -e '...', awk 'BEGIN { system(...) }'"]},{"id":"shell_package_install","title":"Package installs","group":"Shell","description":"npm install, pip install, apt install, brew install.","guidance":"Most users keep this on 'Ask' so you can review the package name and source before it lands. Supply-chain attacks (typosquats, malicious updates of legitimate packages) are real — the request to install something is the right place to pause.","recommended":"ask","controls":"Commands that download and install packages from a registry. Package installs are higher-risk than they appear: many run post-install scripts with full shell access on your machine.","rec_individual":"Ask — supply-chain typosquats are the most common attack vector; verify the package name once per install.","rec_team":"Ask — same as solo; package installs are usually rare enough that asking is cheap.","examples":["npm install foo-bar","pip install some-package","apt install -y baz","brew install qux","cargo install ...","go install github.com/.../..."]},{"id":"network_read","title":"Web reads","group":"Network","description":"WebFetch on known documentation domains; HTTP GETs.","guidance":"'Allow' is usually right — Claude needs to look things up to give grounded answers. Tighten to 'Ask' only if you're worried about data exfiltration via URL parameters (e.g., Claude embedding sensitive strings in a GET) — rare but possible.","recommended":"allow","controls":"GET-style requests that READ from the web. No mutation, no side effects on the remote system. Risk is limited to what Claude does with the response (which it has to read carefully anyway).","rec_individual":"Allow — Claude needs to look things up to give grounded answers; reads are low-risk.","rec_team":"Allow — same as solo; reading public docs doesn't affect teammates.","examples":["WebFetch('https://docs.anthropic.com/...')","curl https://api.github.com/repos/...","Looking up an MDN article","Fetching a public RFC","Querying a CDN for a library's docs"]},{"id":"network_write","title":"Web writes","group":"Network","description":"POST, PUT, DELETE — anything that mutates remote state.","guidance":"Keep this on 'Ask' unless you're operating in a sandbox where remote writes are explicitly part of the workflow (e.g., a test environment with disposable resources). The 'I clicked the wrong button' cost is asymmetric — confirming each one is cheap.","recommended":"ask","controls":"HTTP methods that CHANGE state on the remote system. These have side effects ranging from 'charged my API account' to 'posted a message to a Slack channel' to 'triggered a production deployment.'","rec_individual":"Ask — POSTs have side effects (charged API calls, posted messages, triggered workflows). Even solo, the asymmetric cost makes pausing worth it.","rec_team":"Ask — webhooks may notify teammates or trigger their workflows; pausing is doubly important.","examples":["curl -X POST https://api.example.com/webhook","gh api PATCH /repos/.../issues/123","Posting to a Slack incoming webhook","Submitting a Stripe charge","Calling a deployment trigger"]},{"id":"mcp_tools","title":"MCP server tools","group":"Other","description":"Tools provided by connected MCP servers.","guidance":"MCP trust is best done server-by-server, not globally. Keep this on 'Ask' as a safety net and configure trusted servers individually in your Claude Code config. A blanket 'Allow' here means any MCP server you add automatically gets full autonomy — usually not what you want.","recommended":"ask","controls":"The DEFAULT autonomy level applied to any MCP (Model Context Protocol) server you've connected. Each server can also be configured individually in your Claude Code config; this is the fallback for servers without specific trust settings.","rec_individual":"Ask — MCP tool trust is best done server-by-server; the global default should ask, then you pin trusted servers individually in your Claude Code config.","rec_team":"Ask — same as solo; the global default is conservative; per-server trust is where the team-vs-solo distinction actually matters.","examples":["microsoft_learn.docs_search(...) — read-only docs, usually safe","google_drive.list_files(...) — reads your private files","uber.get_estimates(...) — third-party API, makes external calls","github_mcp.create_issue(...) — mutates a shared system","filesystem_mcp.read_file(...) — depends on what path it can see"]}],"security_floor":["Bash(rm -rf:*)","Bash(git push --force:*)","Bash(git push -f:*)","Bash(git reset --hard:*)","Bash(git clean -fd:*)","Bash(npm publish:*)","Bash(curl * | sh)","Bash(curl * | bash)","Bash(sudo:*)","Bash(mkfs:*)","Bash(shred:*)","Bash(git branch -D:*)","Read(.env)","Read(.env.*)","Read(**/*.pem)","Read(**/*.key)","Read(**/credentials*)","Read(**/secrets*)","Read(~/.ssh/**)","Read(~/.aws/**)","Read(~/.azure/**)","Read(~/.kube/config)"],"levels":["deny","ask","allow"]},"collab_rules":[{"title":"Core stays domain-neutral","body":"The ravenclaude-core plugin never absorbs domain specifics. Power Platform, finance, Salesforce, web, and data each live in their own plugin and extend core via skills + knowledge, not parallel agents."},{"title":"Team Lead dispatches, specialists execute","body":"Requests route through the Team Lead, which selects the smaller-blast-radius specialist using the dispatch playbooks rather than keyword-matching the task to a method."},{"title":"Structured Output Protocol on every handoff","body":"Agents hand off with a structured envelope so the next agent — or the human — gets a predictable summary, decisions, and open questions."},{"title":"Capability Grounding before 'I can't'","body":"A command-not-found, a 401/403, or an unloaded MCP tool is evidence about one route — never proof a capability is absent. Load the sanctioned route and try ≥2 alternatives before reporting blocked."},{"title":"Claim grounding & source honesty","body":"Consequential claims cite the this-session check that backs them or are marked unverified. Confident reasoning errors are treated as as dangerous as hallucinations."},{"title":"Gates are the source of truth","body":"Format, lint, test, layout, and frontmatter gates enforce the rules. Agents don't restate what CI / hooks already guarantee."}],"quick_actions":[{"id":"init-team","label":"Initialize Team","desc":"Scaffold AGENTS.md, CLAUDE.md & layout via /init-agent-ready","icon":"rocket","command":"/init-agent-ready"},{"id":"posture","label":"Comfort Posture Editor","desc":"Tune per-category deny / ask / allow permissions","icon":"sliders","route":"#/configuration"},{"id":"repo-guide","label":"Generate Repo Guide","desc":"Open the full per-agent reference & use-case lookup","icon":"book","href":"repo-guide.html"},{"id":"staging","label":"Contribution Staging Loop","desc":"Stage a finding into the marketplace via /wrap","icon":"git","command":"/wrap"}]};

      /* ---------------- Toast ----------------
         Backward-compatible overload: existing callers pass a string and
         get the same banner. New callers can pass {msg, action:{label,fn}}
         to attach a follow-up action button; dismiss timer extends to 5s
         when an action is present (WCAG 2.2.1 timing). */
      let toastT;
      function toast(msgOrObj) {
        const t = $("#toast");
        const opts = (typeof msgOrObj === "string") ? { msg: msgOrObj } : (msgOrObj || {});
        const dismissMs = opts.action ? 5000 : 2400;
        t.innerHTML = `<span class="toast-msg"></span>`;
        t.querySelector(".toast-msg").textContent = opts.msg || "";
        if (opts.action && typeof opts.action.fn === "function") {
          const btn = document.createElement("button");
          btn.className = "toast-action";
          btn.textContent = opts.action.label || "Action";
          btn.addEventListener("click", () => { opts.action.fn(); t.classList.remove("show"); });
          t.appendChild(btn);
        }
        t.classList.add("show");
        clearTimeout(toastT);
        toastT = setTimeout(() => t.classList.remove("show"), dismissMs);
      }
      function copyText(text, label) {
        navigator.clipboard?.writeText(text).then(

        { id: 2, title: "Read GETTING_STARTED.md", desc: "10-minute canonical walkthrough", cta: "Open", action: "href", href: "GETTING_STARTED.md" },

        { id: 4, title: "Open the deep posture dashboard", desc: "Save & apply writes .ravenclaude/comfort-posture.yaml", cta: "Copy", action: "copyCmd", cmd: "bash scripts/open-dashboard.sh" },
      ];
      function onboardingProgress() {
        return parseInt(localStorage.getItem("rc-onboarding-progress") || "0", 10);
      }
      function onboardingMark(id) {
        const cur = onboardingProgress();
        const next = cur | (1 << id);
        localStorage.setItem("rc-onboarding-progress", String(next));
      }
      function onboardingDone(id) { return (onboardingProgress() & (1 << id)) !== 0; }
      function onboardingDismissed() { return localStorage.getItem("rc-onboarding-dismissed") === "1"; }
      function onboardingComplete() {
        return ONBOARDING_STEPS.every((s) => onboardingDone(s.id));
      }
      function onboardingHtml() {
        if (onboardingDismissed() || onboardingComplete()) return "";
        const doneCount = ONBOARDING_STEPS.filter((s) => onboardingDone(s.id)).length;
        const stepsHtml = ONBOARDING_STEPS.map((s) => {
          const done = onboardingDone(s.id);
          const checkSvg = done ? svg("check") : "";
          return `<div class="onboarding-step${done ? " done" : ""}" data-step="${s.id}" data-action="${esc(s.action)}" data-cmd="${esc(s.cmd || "")}" data-href="${esc(s.href || "")}" data-route="${esc(s.route || "")}">
            <span class="step-check">${checkSvg}</span>
            <div class="step-body"><div class="step-title">${esc(s.title)}</div><div class="step-action">${esc(s.desc)}</div></div>
            <button class="step-cta" type="button">${esc(s.cta)}</button>
          </div>`;
        }).join("");
        return `<div class="onboarding-card" id="onboarding-card">
          <div class="onboarding-head">
            ${svg("rocket")}
            <h2>Welcome — get started in 10 minutes</h2>
            <span class="ob-progress">${doneCount} of ${ONBOARDING_STEPS.length}</span>
            <button class="ob-dismiss" id="ob-dismiss" type="button" aria-label="Dismiss onboarding">×</button>
          </div>
          <div class="onboarding-steps">${stepsHtml}</div>
        </div>`;
      }
      function spawnLogHtml() {
        let entry = null;
        try { entry = JSON.parse(localStorage.getItem("rc-spawn-log") || "null"); } catch (e) { entry = null; }
        if (!entry || !entry.playbook) return "";
        const roster = (entry.agents || []).map((a) => `<span class="chip teal">${esc(a)}</span>`).join("");
        return `<div class="card spawn-card">
          <div class="sp-head">${svg("team")}<span>Last team spawned</span></div>
          <div class="sp-team">${esc(entry.playbook)} playbook</div>

          <div class="grid cols-3">
            ${[

              { t: "Hand off structured", d: "Every hand-off carries the Structured Output Protocol envelope — summary, decisions, artifacts, open questions — so the next agent has full context." },
            ].map((x) => `<div class="card"><div style="display:flex;gap:10px;align-items:center"><span class="ico" style="width:36px;height:36px;border-radius:10px;display:grid;place-items:center;background:var(--teal-soft);color:var(--teal-2);border:1px solid var(--border-strong)">${svg("tree")}</span><b>${esc(x.t)}</b></div><p style="color:var(--muted);font-size:.85rem;margin:10px 0 0">${esc(x.d)}</p></div>`).join("")}

            <div class="lib-body">${esc(p.short)}<div class="pill-row">${p.keywords.map((k) => `<span class="chip">${esc(k)}</span>`).join("")}</div></div></details>`).join("");

          grid.innerHTML = list.length ? list.map((a) => `

      /* ---------------- MARKETPLACE ---------------- */
      let mktState = { cat: "all", q: "" };
      function viewMarketplace(catId) {
        mktState.cat = catId || "all";
        const cats = D.categories;
        const counts = {};
        D.plugins.forEach((p) => { counts[p.category] = (counts[p.category] || 0) + 1; });
        const navBtns = `<button data-cat="all" class="${mktState.cat === "all" ? "active" : ""}">${svg("market")} All plugins <span class="count">${D.plugins.length}</span></button>` +
          cats.map((c) => `<button data-cat="${c.id}" class="${mktState.cat === c.id ? "active" : ""}">${svg(c.icon)} ${esc(c.label)} <span class="count">${counts[c.id] || 0}</span></button>`).join("");

          <div class="page-head"><span class="eyebrow">Marketplace</span><h1>Browse the plugin catalog</h1>

          $("#mkt-grid").innerHTML = head + (list.length ? `<div class="grid cols-2">${list.map(pluginCard).join("")}</div>` : `<div class="empty-state">No plugins match “${esc(mktState.q)}”.</div>`);

      window.__openPlugin = function (name) {

            <p class="lede">${esc(p.description)}</p>

      /* ---------------- CONFIGURATION ---------------- */
      const posture = { levels: {}, design_checkins: true, global_default: "ask", activePreset: "client_delivery" };
      function applyPreset(id) {
        const pr = D.posture.presets.find((p) => p.id === id);
        if (!pr) return;
        posture.levels = { ...pr.levels };
        posture.design_checkins = pr.design_checkins;
        posture.global_default = pr.global_default;
        posture.activePreset = id;
      }
      function postureYaml() {
        const lines = ["# Generated by the RavenClaude comfort-posture editor", "# Drop into .ravenclaude/comfort-posture.yaml, then run apply-comfort-posture.py", "schema_version: 5", "", `design_checkins: ${posture.design_checkins}`, `global_default: ${posture.global_default}`, "", "security_deny:"];
        D.posture.security_floor.forEach((r) => lines.push(`  - ${JSON.stringify(r)}`));
        lines.push("", "categories:");
        D.posture.categories.forEach((c) => {
          const lvl = posture.levels[c.id] || posture.global_default;
          lines.push(`  ${c.id}:`, "    user: inherit", "    local: inherit", `    project: ${lvl}`);
        });
        return lines.join("\n");
      }
      function viewConfiguration() {
        if (!Object.keys(posture.levels).length) applyPreset(posture.activePreset);
        // ⌘K palette can pre-stage a preset; apply if pending
        if (window.__pendingPreset) {
          const pid = window.__pendingPreset;
          window.__pendingPreset = null;
          if (D.posture.presets.some((p) => p.id === pid)) {
            applyPreset(pid);
            setTimeout(() => toast({ msg: `Applied "${(D.posture.presets.find((p) => p.id === pid) || {}).label || pid}"`, action: { label: "Save YAML", fn: () => copyText(postureYaml(), "comfort-posture.yaml") } }), 100);
          }
        }
        const groups = {};
        D.posture.categories.forEach((c) => { (groups[c.group] = groups[c.group] || []).push(c); });
        // Scenario picker — visual cards with auto-generated "what this means" prose
        const PROFILE_MAP = { strict_production: "strict", client_delivery: "balanced", exploratory: "exploratory", maximum_autonomy: "autonomous" };
        const LEVEL_PHRASE = { deny: "always stops you", ask: "asks before acting", allow: "proceeds silently" };
        function meansFor(preset) {
          // Pick 3 highest-stakes categories (deny > ask > auto) and render via template.
          // BUG #3 fix (v0.104.0): when all levels collapse to a single value
          // (e.g., maximum_autonomy where everything inherits allow), the sort
          // produces arbitrary first-three rather than meaningful ones —
          // emit one summary line instead.
          const ranks = { deny: 3, ask: 2, allow: 1 };
          const entries = D.posture.categories
            .map((c) => ({ c, lv: (preset.levels && preset.levels[c.id]) || preset.global_default || "ask" }))
            .sort((a, b) => (ranks[b.lv] || 0) - (ranks[a.lv] || 0));
          const uniqueLevels = new Set(entries.map((e) => e.lv));
          if (uniqueLevels.size === 1 && entries.length > 0) {
            const lv = entries[0].lv;
            return [`All categories: ${LEVEL_PHRASE[lv] || lv}`];
          }
          return entries.slice(0, 3).map((e) => `${e.c.title}: ${LEVEL_PHRASE[e.lv] || e.lv}`);
        }
        const scenarioGrid = D.posture.presets.map((p) => {
          const profile = PROFILE_MAP[p.id] || "balanced";
          const tag = p.id === "client_delivery" ? `<span class="sc-tag">Recommended</span>` : "";
          const means = meansFor(p);
          const lines = means.map((m) => `<div class="sm-line"><span class="sm-bullet">•</span><span>${esc(m)}</span></div>`).join("");
          return `<button type="button" class="scenario-card${p.id === posture.activePreset ? " active" : ""}" data-preset="${esc(p.id)}" data-profile="${profile}" aria-pressed="${p.id === posture.activePreset}">
            ${tag}
            <div class="sc-name">${esc(p.label)}</div>
            <div class="sc-blurb">${esc(p.blurb)}</div>
            <div class="sc-means">${lines}</div>
          </button>`;
        }).join("");
        const presetRow = D.posture.presets.map((p) => `<button class="preset-btn${p.id === posture.activePreset ? " active" : ""}" data-preset="${p.id}"><span>${esc(p.label)}</span><small>${esc(p.blurb)}</small></button>`).join("");

      /* ---------------- ⌘K Command Palette ----------------
         Categorized search across plugins, specialists, skills, hooks,

      function buildPaletteIndex() {
        const idx = [];
        // Quick actions — top-priority category, always present
        const QA = [
          { kind: "action", label: "Apply Strict Production posture", meta: "Configuration", hay: "apply strict production posture", route: "#/configuration", preset: "strict_production" },
          { kind: "action", label: "Apply Client Delivery posture (recommended)", meta: "Configuration", hay: "apply client delivery posture recommended", route: "#/configuration", preset: "client_delivery" },
          { kind: "action", label: "Apply Exploratory posture", meta: "Configuration", hay: "apply exploratory posture", route: "#/configuration", preset: "exploratory" },
          { kind: "action", label: "Apply Maximum Autonomy posture", meta: "Configuration", hay: "apply maximum autonomy posture", route: "#/configuration", preset: "maximum_autonomy" },
          { kind: "action", label: "Open posture editor", meta: "Configuration", hay: "open posture editor configuration", route: "#/configuration" },
          { kind: "action", label: "Open deep dashboard", meta: "External", hay: "open deep dashboard server", action: "copyCmd", cmd: "bash scripts/open-dashboard.sh" },
          { kind: "action", label: "Show onboarding checklist", meta: "Onboarding", hay: "show onboarding checklist setup", action: "showOnboarding" },
          { kind: "action", label: "Open repo guide", meta: "External", hay: "open repo guide reference", href: "repo-guide.html" },
        ];
        QA.forEach((q) => idx.push(q));
        // Plugins
        D.plugins.forEach((p) => {
          idx.push({ kind: "plugin", label: p.label, meta: p.category_label, hay: (p.label + " " + p.description + " " + p.keywords.join(" ")).toLowerCase(), route: "#/marketplace/" + p.category, open: p.name });
          // Copy-install action per plugin
          idx.push({ kind: "action", label: `Copy install command for ${p.label}`, meta: "Install", hay: `copy install ${p.name} ${p.label}`.toLowerCase(), action: "copyCmd", cmd: `/plugin install ${p.name}@ravenclaude` });
        });
        // Specialists
        D.plugins.forEach((p) => p.agents.forEach((a) => idx.push({ kind: "specialist", label: a.label, meta: p.label, hay: (a.label + " " + (a.description || "") + " " + p.label).toLowerCase(), route: "#/team" })));
        // Skills (new — from §G scanner)
        D.plugins.forEach((p) => (p.skills_index || []).forEach((s) => idx.push({ kind: "skill", label: s.label, meta: p.label, hay: (s.label + " " + (s.description || "") + " " + p.label).toLowerCase(), route: "#/marketplace/" + p.category, open: p.name })));
        // Hooks (new — from §G scanner)
        D.plugins.forEach((p) => (p.hooks_index || []).forEach((h) => idx.push({ kind: "hook", label: h.name, meta: p.label + " · " + h.event, hay: (h.name + " " + (h.description || "") + " " + p.label).toLowerCase(), route: "#/marketplace/" + p.category, open: p.name })));
        return idx;
      }
      const PALETTE_IDX = buildPaletteIndex();
      const PALETTE_SECTIONS = [
        { key: "action", label: "Quick actions" },
        { key: "plugin", label: "Plugins" },
        { key: "specialist", label: "Specialists" },
        { key: "skill", label: "Skills" },
        { key: "hook", label: "Hooks" },
      ];
      const PALETTE_ICONS = { action: "rocket", plugin: "market", specialist: "team", skill: "spark", hook: "shield" };
      let paletteCursor = -1, paletteFlat = [];

      function renderPalette(q) {
        const box = $("#palette-results");
        q = (q || "").toLowerCase().trim();
        const matches = q ? PALETTE_IDX.filter((x) => x.hay.includes(q)) : PALETTE_IDX.filter((x) => x.kind === "action").slice(0, 6);
        paletteFlat = [];
        paletteCursor = -1;
        if (!matches.length) {
          box.innerHTML = `<div class="palette-empty">No matches.<span class="palette-hint">Try <code>/dashboard</code>, <code>power-platform</code>, or <code>strict posture</code>.</span></div>`;

        let html = "";
        // Render the "Recent" section first when input is empty
        if (!q) {
          let recent = [];
          try { recent = JSON.parse(localStorage.getItem("rc-palette-recent") || "[]"); } catch (e) { recent = []; }
          const recentItems = recent.map((label) => PALETTE_IDX.find((x) => x.label === label)).filter(Boolean).slice(0, 5);
          if (recentItems.length) {
            html += `<div class="palette-section"><div class="palette-section-label">Recent</div>`;
            recentItems.forEach((m) => {
              const i = paletteFlat.length;
              paletteFlat.push(m);
              const ico = svg(PALETTE_ICONS[m.kind] || "sparkle");
              html += `<div class="palette-item" data-i="${i}" role="option"><span class="pi-ico">${ico}</span><span class="pi-label">${esc(m.label)}</span><span class="pi-meta">${esc(m.meta || "")}</span></div>`;
            });
            html += `</div>`;
          }
        }
        PALETTE_SECTIONS.forEach((sec) => {
          const inSec = matches.filter((m) => m.kind === sec.key).slice(0, 5);
          if (!inSec.length) return;
          html += `<div class="palette-section"><div class="palette-section-label">${sec.label}</div>`;
          inSec.forEach((m) => {
            const i = paletteFlat.length;
            paletteFlat.push(m);
            const ico = svg(PALETTE_ICONS[sec.key] || "sparkle");
            html += `<div class="palette-item" data-i="${i}" role="option"><span class="pi-ico">${ico}</span><span class="pi-label">${esc(m.label)}</span><span class="pi-meta">${esc(m.meta || "")}</span></div>`;
          });
          html += `</div>`;
        });
        box.innerHTML = html;
        $$("#palette-results .palette-item").forEach((el) => {
          el.addEventListener("click", () => paletteAction(paletteFlat[+el.dataset.i]));

      function updatePaletteCursor() {
        $$("#palette-results .palette-item").forEach((el, i) => el.classList.toggle("cursor", i === paletteCursor));
        const cur = $$("#palette-results .palette-item")[paletteCursor];
        if (cur) cur.scrollIntoView({ block: "nearest" });

      function paletteAction(m) {
        if (!m) return;
        closePalette();
        // Remember this action for the palette "Recent" section
        try {
          const recent = JSON.parse(localStorage.getItem("rc-palette-recent") || "[]");
          const newRecent = [m.label, ...recent.filter((x) => x !== m.label)].slice(0, 5);

        } catch (e) { /* localStorage may be unavailable in sandboxed previews */ }

        if (m.preset) {

            location.hash = m.route;
          }
        } else if (m.action === "copyCmd" && m.cmd) {
          window.__copy(m.cmd, `Command ${m.cmd}`);
