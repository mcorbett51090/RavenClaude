# Comfort-posture for Claude Code agents (v5 — per-layer).
# Save to .ravenclaude/comfort-posture.yaml in your project root.
# The /set-posture skill translates this into user/local/project settings files.
#
# Dev-repo note: `command_review.dev_repo_exempt: true` below is fork-safe — it
# only activates when 3 signals AND-match (gh-authenticated repo owner is
# mcorbett51090/RavenClaude AND .claude-plugin/marketplace.json parses with
# name "ravenclaude"), and is inert with `command_review.enabled: false`. Full
# contract: plugins/ravenclaude-core/CLAUDE.md → "Dev-repo lockout fix".
schema_version: 5

# Pause for design / architectural decisions? Behavioral flag, separate from permissions.
design_checkins: true

# Command-review tribunal panel (the Thing). Overrides .ravenclaude/thing.yaml.
command_review:
  enabled: false
  panel:
    forseti:
      model: claude-opus-4-7
    mimir:
      model: claude-haiku-4-5
    heimdall:
      model: claude-haiku-4-5
    thor:
      model: claude-opus-4-7
  confidence_threshold: 0.6
  gate_floor: high
  dev_repo_exempt: true
  tiers:
    medium:
      seats: [mimir, heimdall]
      mandatory_seats: [heimdall]
      confidence_threshold: 0.6
    high:
      seats: [forseti, mimir, heimdall]
      mandatory_seats: [heimdall]
      confidence_threshold: 0.7
    extreme:
      seats: [forseti, mimir, heimdall]
      mandatory_seats: [forseti, heimdall]
      confidence_threshold: 0.8

# Runaway brake — disabled for this repo.
runaway: off

# Yes/no decision routing through the tribunal (off | advisory | binding).
decision_review: binding

# Always-on deny rules — layer-independent floor.
security_deny:
  - "Bash(rm -rf:*)"
  - "Bash(git push --force:*)"
  - "Bash(git push -f:*)"
  - "Bash(git reset --hard:*)"
  - "Bash(git clean -fd:*)"
  - "Bash(npm publish:*)"
  - "Bash(pnpm publish:*)"
  - "Bash(yarn publish:*)"
  - "Bash(cargo publish:*)"
  - "Bash(curl * | sh)"
  - "Bash(curl * | bash)"
  - "Bash(wget * | sh)"
  - "Bash(wget * | bash)"
  - "Bash(sudo:*)"
  - "Read(.env)"
  - "Read(.env.*)"
  - "Read(**/*.pem)"
  - "Read(**/*.key)"
  - "Read(**/credentials*)"
  - "Read(**/secrets*)"

categories:
  file_edit_global:
    user: allow
    local: allow
    project: inherit
  file_edit_project:
    user: allow
    local: allow
    project: inherit
  file_read_global:
    user: allow
    local: allow
    project: inherit
  file_read_project:
    user: allow
    local: allow
    project: inherit
  mcp_tools:
    user: allow
    local: allow
    project: inherit
  network_read:
    user: allow
    local: allow
    project: inherit
  network_write:
    user: allow
    local: allow
    project: inherit
  shell_code_exec:
    user: allow
    local: allow
    project: inherit
  shell_local_mutate:
    user: allow
    local: allow
    project: inherit
  shell_package_install:
    user: allow
    local: allow
    project: inherit
  shell_readonly:
    user: allow
    local: allow
    project: inherit
  shell_remote_mutate:
    user: allow
    local: allow
    project: inherit
