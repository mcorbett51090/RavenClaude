                                        - generic [ref=e10455]: tree
                                        - generic [ref=e10456]: Where does inference run? — edge/on-device vs cloud/batch
                                    - paragraph [ref=e10457]: "a CV model is chosen and the team is deciding *where it runs at inference*. CV inference is heavier than tabular (images/video are large, models are GPU-hungry), so placement drives latency, cost, privacy, and connectivity in ways tabular serving doesn't. This is the CV-specific refinement of the online-vs-batch serving tree in [`ml-engineering-decision-trees.md`](ml-engineering-decision-trees.md) — that tree picks online/batch; this one picks **edge vs cloud** within an online choice and folds in CV's bandwidth/privacy/power constraints."
