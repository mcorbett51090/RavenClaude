                                        - /url: ../../plugins/regulatory-compliance/best-practices/bma-classify-the-sector-and-licence-before-you-advise.md
                                        - generic [ref=e13917]: Absolute rule — every BMA non-insurance answer (capital, net assets, Code obligation, reporting) is computed against a *sector + licence class*; fixing those is the first decision, not an input discovered mid-analysis.
                                        - generic [ref=e13918]: BMA — classify the sector and licence class before you advise
