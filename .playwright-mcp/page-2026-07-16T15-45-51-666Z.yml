                                        - generic [ref=e10444]: tree
                                        - generic [ref=e10445]: What CV task is this? — task -> architecture family
                                    - paragraph [ref=e10446]: "a vision capability is needed and the team is choosing the *model family* from the task shape. Picking the wrong family is the most common CV over/under-build: reaching for object detection when whole-image classification answers the question, or hand-rolling a detector when a hosted/pretrained model ships in a day. This is the CV-specific refinement of the build-vs-fine-tune-vs-prompt sourcing tree in [`model-sourcing-and-feature-serving-decision-trees.md`](model-sourcing-and-feature-serving-decision-trees.md) — decide the *task family* here, then take it through that"
                                - listitem [ref=e10447]:
