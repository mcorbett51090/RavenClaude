                                    - paragraph [ref=e11840]: 'the model is built and the question is how it reaches production and stays fresh — "how do I promote dev→test→prod?", "the 6 a.m. refresh keeps failing", "do I need a gateway?", "the full refresh times out". Observable inputs: storage mode (resolve the storage-mode tree above first), whether any source is on-prem/VNet-bound, fact-table size, and whether multiple stages exist. This is the operational complement to the modeling trees; it does **not** re-decide storage mode.'
