                                        - generic [ref=e15981]: The bullwhip is real — dampen it
                                    - button "preview" [ref=e15982] [cursor=pointer]
                    - group [ref=e15983]:
                        - generic "tableau 20 trees · 38 practices" [ref=e15984] [cursor=pointer]:
                            - text: tableau
                            - generic [ref=e15985]: 20 trees · 38 practices
                        - generic [ref=e15986]:
                            - heading "Decision trees 20" [level=4] [ref=e15987]:
                                - text: Decision trees
                                - generic [ref=e15988]: "20"
                            - list [ref=e15989]:
                                - listitem [ref=e15990]:
                                    - link "tree A dashboard shows stale data — where is the break?" [ref=e15991] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/knowledge/data-freshness-pipeline-decision-trees.md
                                        - generic [ref=e15992]: tree
                                        - generic [ref=e15993]: A dashboard shows stale data — where is the break?
                                    - paragraph [ref=e15994]: Users report old numbers but the workbook "looks fine." Observable
                                    - group [ref=e15995]:
                                        - generic "▸ Diagram" [ref=e15996] [cursor=pointer]
                                - listitem [ref=e15997]:
                                    - link "tree Calculations — Basic aggregate vs LOD vs table calc" [ref=e15998] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/knowledge/viz-calc-decision-trees.md
                                        - generic [ref=e15999]: tree
                                        - generic [ref=e16000]: Calculations — Basic aggregate vs LOD vs table calc
                                    - paragraph [ref=e16001]: 'A number must be computed and you must choose the calc *layer*. Observable trigger: a "wrong total / double-counting" bug, or a new measure whose required grain you can state relative to the view. This is the most consequential calc decision and the source of most wrong-number bugs.'
                                    - group [ref=e16002]:
                                        - generic "▸ Diagram" [ref=e16003] [cursor=pointer]
                                - listitem [ref=e16004]:
                                    - link "tree Connection mode — extract vs live" [ref=e16005] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/knowledge/data-performance-decision-trees.md
                                        - generic [ref=e16006]: tree
                                        - generic [ref=e16007]: Connection mode — extract vs live
                                    - paragraph [ref=e16008]: 'A data source is modeled and you must choose extract (Hyper) or live. Observable triggers: "extract or live?"; a dashboard slow on every interaction against a transactional DB; a stakeholder asking "how fresh is this?"'
                                    - group [ref=e16009]:
                                        - generic "▸ Diagram" [ref=e16010] [cursor=pointer]
                                - listitem [ref=e16011]:
                                    - link "tree Connection model — relationship vs join vs blend" [ref=e16012] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/knowledge/data-performance-decision-trees.md
                                        - generic [ref=e16013]: tree
                                        - generic [ref=e16014]: Connection model — relationship vs join vs blend
                                    - paragraph [ref=e16015]: 'You have two or more tables/datasets to combine in a single data source, and you must choose *how* they connect. Observable triggers: "should this be a relationship, a join, or a blend?"; a `SUM` that double-counts after combining tables; a number that won''t filter by a field from the second dataset.'
                                    - group [ref=e16016]:
                                        - generic "▸ Diagram" [ref=e16017] [cursor=pointer]
                                - listitem [ref=e16018]:
                                    - link "tree Content promotion — CMT vs REST API vs tabcmd vs manual" [ref=e16019] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/knowledge/governance-embedding-decision-trees.md
                                        - generic [ref=e16020]: tree
                                        - generic [ref=e16021]: Content promotion — CMT vs REST API vs tabcmd vs manual
                                    - paragraph [ref=e16022]: 'Content must move between environments — dev→test→prod — and you''re choosing *how*. Observable trigger: "promote this dashboard to prod," "set up our release pipeline," or a connection-string/permission drift discovered after a hand-republish.'
                                    - group [ref=e16023]:
                                        - generic "▸ Diagram" [ref=e16024] [cursor=pointer]
                                - listitem [ref=e16025]:
                                    - link "tree Diagnosing a slow workbook (the Performance Recorder ladder)" [ref=e16026] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/knowledge/data-performance-decision-trees.md
                                        - generic [ref=e16027]: tree
                                        - generic [ref=e16028]: Diagnosing a slow workbook (the Performance Recorder ladder)
                                    - paragraph [ref=e16029]: 'A workbook is slow and you need the *cause*, not a guess. Observable triggers: "this dashboard takes 40 seconds to load"; a sheet that hangs on filter change. Always turn on the **Performance Recorder**, reproduce the slow action, and read the **longest events first** before touching anything.'
                                    - group [ref=e16030]:
                                        - generic "▸ Diagram" [ref=e16031] [cursor=pointer]
                                - listitem [ref=e16032]:
                                    - link "tree Embedding auth — Connected Apps/JWT vs SAML SSO vs public" [ref=e16033] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/knowledge/governance-embedding-decision-trees.md
                                        - generic [ref=e16034]: tree
                                        - generic [ref=e16035]: Embedding auth — Connected Apps/JWT vs SAML SSO vs public
                                    - paragraph [ref=e16036]: 'A viz is being embedded in an external/portal/customer-facing app and you''re choosing how the embedded session authenticates. Observable trigger: "embed this dashboard in our portal," "embed with per-tenant isolation," or a legacy embed still using trusted tickets. This is a **security control**: the chosen leaf escalates to `ravenclaude-core/security-reviewer`.'
                                    - group [ref=e16037]:
                                        - generic "▸ Diagram" [ref=e16038] [cursor=pointer]
                                - listitem [ref=e16039]:
                                    - link "tree Extract refresh strategy — full, incremental, or Hyper API?" [ref=e16040] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/knowledge/data-performance-decision-trees.md
                                        - generic [ref=e16041]: tree
                                        - generic [ref=e16042]: Extract refresh strategy — full, incremental, or Hyper API?
                                    - paragraph [ref=e16043]: 'An extract needs a refresh schedule and you must choose the refresh method. Observable triggers: "our extract takes 4 hours to refresh"; "we only need yesterday''s new rows"; "can we refresh programmatically?"'
                                    - group [ref=e16044]:
                                        - generic "▸ Diagram" [ref=e16045] [cursor=pointer]
                                - listitem [ref=e16046]:
                                    - link "tree Interactivity — Which mechanism (filter / highlight / parameter / set action)" [ref=e16047] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/knowledge/viz-calc-decision-trees.md
                                        - generic [ref=e16048]: tree
                                        - generic [ref=e16049]: Interactivity — Which mechanism (filter / highlight / parameter / set action)
                                    - paragraph [ref=e16050]: 'The user wants the dashboard to respond to interaction ("make these views talk", "let me drill", "let the user choose"). Observable trigger: a stated interaction goal you can phrase as "when the user does X, the dashboard should Y."'
                                    - group [ref=e16051]:
                                        - generic "▸ Diagram" [ref=e16052] [cursor=pointer]
                                - listitem [ref=e16053]:
                                    - link "tree LOD — FIXED vs INCLUDE vs EXCLUDE" [ref=e16054] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/knowledge/viz-calc-decision-trees.md
                                        - generic [ref=e16055]: tree
                                        - generic [ref=e16056]: LOD — FIXED vs INCLUDE vs EXCLUDE
                                    - paragraph [ref=e16057]: "You have already decided the answer needs an **LOD** (from the tree above) and must pick the keyword. Observable trigger: you can name the grain the number must compute at and whether it is absolute or relative to the current view."
                                    - group [ref=e16058]:
                                        - generic "▸ Diagram" [ref=e16059] [cursor=pointer]
                                - listitem [ref=e16060]:
                                    - link "tree Next-gen surface — Tableau Pulse vs Tableau Next vs classic dashboard" [ref=e16061] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/knowledge/governance-embedding-decision-trees.md
                                        - generic [ref=e16062]: tree
                                        - generic [ref=e16063]: Next-gen surface — Tableau Pulse vs Tableau Next vs classic dashboard
                                    - paragraph [ref=e16064]: 'A stakeholder wants to "track a metric" and you''re choosing the surface. Observable trigger: "should this be Pulse or a dashboard?", "automate this KPI with insights," or a request to build agentic/semantic-layer analytics on Data Cloud. **This whole tree is volatile** — the next-gen surface moves every quarter; mark every leaf `[verify-at-build]` before quoting.'
                                    - group [ref=e16065]:
                                        - generic "▸ Diagram" [ref=e16066] [cursor=pointer]
                                - listitem [ref=e16067]:
                                    - link "tree Permission model — locked project vs per-content grants" [ref=e16068] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/knowledge/governance-embedding-decision-trees.md
                                        - generic [ref=e16069]: tree
                                        - generic [ref=e16070]: Permission model — locked project vs per-content grants
                                    - paragraph [ref=e16071]: 'You are setting up (or auditing) who can see and do what with content on a Tableau Server/Cloud site. The observable trigger: a request like "Finance and Sales must not see each other''s workbooks," a request to grant a new group access, or an audit finding that the same user has different effective permissions on two workbooks in the same project. Not for *row*-level visibility (that is the RLS tree).'
                                    - group [ref=e16072]:
                                        - generic "▸ Diagram" [ref=e16073] [cursor=pointer]
                                - listitem [ref=e16074]:
                                    - link "tree Refresh path — Bridge vs Cloud-native vs no-refresh" [ref=e16075] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/knowledge/data-freshness-pipeline-decision-trees.md
                                        - generic [ref=e16076]: tree
                                        - generic [ref=e16077]: Refresh path — Bridge vs Cloud-native vs no-refresh
                                    - paragraph [ref=e16078]: A published **extract** data source on Tableau Cloud (or migrated to it)
                                    - group [ref=e16079]:
                                        - generic "▸ Diagram" [ref=e16080] [cursor=pointer]
                                - listitem [ref=e16081]:
                                    - link "tree Refresh scope — full vs incremental (and the hybrid)" [ref=e16082] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/knowledge/data-freshness-pipeline-decision-trees.md
                                        - generic [ref=e16083]: tree
                                        - generic [ref=e16084]: Refresh scope — full vs incremental (and the hybrid)
                                    - paragraph [ref=e16085]: A published extract's refresh is **too slow / too costly** or its window
                                    - group [ref=e16086]:
                                        - generic "▸ Diagram" [ref=e16087] [cursor=pointer]
                                - listitem [ref=e16088]:
                                    - link "tree RLS mechanism — user filter vs entitlements + data policy vs separate content" [ref=e16089] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/knowledge/governance-embedding-decision-trees.md
                                        - generic [ref=e16090]: tree
                                        - generic [ref=e16091]: RLS mechanism — user filter vs entitlements + data policy vs separate content
                                    - paragraph [ref=e16092]: 'Different viewers of the *same* content must see *different rows* — "each regional manager sees only their region," "each customer sees only their own tenant''s data." The observable trigger is a per-viewer row-visibility requirement on shared content. This is a **security control**: every leaf here ends in escalation to `ravenclaude-core/security-reviewer`.'
                                    - group [ref=e16093]:
                                        - generic "▸ Diagram" [ref=e16094] [cursor=pointer]
                                - listitem [ref=e16095]:
                                    - link "tree RLS mechanism — user filter, FIXED LOD mapping, or data policy?" [ref=e16096] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/knowledge/data-performance-decision-trees.md
                                        - generic [ref=e16097]: tree
                                        - generic [ref=e16098]: RLS mechanism — user filter, FIXED LOD mapping, or data policy?
                                    - paragraph [ref=e16099]: 'A workbook or data source needs row-level security and you must choose the enforcement mechanism. Observable triggers: "how do we show each user only their own data?"; "should we use user filters, an LOD calculation, or a data policy?"'
                                    - group [ref=e16100]:
                                        - generic "▸ Diagram" [ref=e16101] [cursor=pointer]
                                - listitem [ref=e16102]:
                                    - link "tree Viz design — Chart type by question class" [ref=e16103] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/knowledge/viz-calc-decision-trees.md
                                        - generic [ref=e16104]: tree
                                        - generic [ref=e16105]: Viz design — Chart type by question class
                                    - paragraph [ref=e16106]: The user asks "which chart should I use?" or hands you a measure/dimension set with a business question, and you must pick a mark/encoding. The observable trigger is a stated business question whose *class* (comparison, trend, distribution, correlation, part-to-whole, geographic) can be named.
                                    - group [ref=e16107]:
                                        - generic "▸ Diagram" [ref=e16108] [cursor=pointer]
                                - listitem [ref=e16109]:
                                    - link "tree Where to do the work — Prep vs calculated fields vs reshape at source" [ref=e16110] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/knowledge/data-performance-decision-trees.md
                                        - generic [ref=e16111]: tree
                                        - generic [ref=e16112]: Where to do the work — Prep vs calculated fields vs reshape at source
                                    - paragraph [ref=e16113]: "A transformation is needed (pivot, union, dedup, cleanup, derived column, aggregation) and you must decide *where* it lives. Observable triggers: the same calc copy-pasted across many workbooks; a row-level calc that recomputes on every query; a pivot/union that won't model cleanly in the data source."
                                    - group [ref=e16114]:
                                        - generic "▸ Diagram" [ref=e16115] [cursor=pointer]
                                - listitem [ref=e16116]:
                                    - link "tree Where to filter — source vs data-source vs context vs dimension" [ref=e16117] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/knowledge/data-performance-decision-trees.md
                                        - generic [ref=e16118]: tree
                                        - generic [ref=e16119]: Where to filter — source vs data-source vs context vs dimension
                                    - paragraph [ref=e16120]: "You're adding a filter (or a slow workbook over-fetches rows it then filters away in the view). Observable triggers: a region/date-scoped dashboard scanning the full table; a `FIXED` LOD or top-N that must operate on a filtered subset; a quick filter slow to populate."
                                    - group [ref=e16121]:
                                        - generic "▸ Diagram" [ref=e16122] [cursor=pointer]
                                - listitem [ref=e16123]:
                                    - link "tree Which Tableau Prep output — published data source, extract file, or database write?" [ref=e16124] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/knowledge/data-performance-decision-trees.md
                                        - generic [ref=e16125]: tree
                                        - generic [ref=e16126]: Which Tableau Prep output — published data source, extract file, or database write?
                                    - paragraph [ref=e16127]: 'A Tableau Prep flow is complete and you must choose the output type. Observable triggers: "should the flow publish a data source or write to the database?"; "multiple workbooks use the same Prep output — how should we share it?"'
                                    - group [ref=e16128]:
                                        - generic "▸ Diagram" [ref=e16129] [cursor=pointer]
                            - heading "Best practices 38" [level=4] [ref=e16130]:
                                - text: Best practices
                                - generic [ref=e16131]: "38"
                            - list [ref=e16132]:
                                - listitem [ref=e16133]:
                                    - link "Pattern — blending is the connection method of last resort; a relationship or join is almost always the correct first choice. A data blend is a last resort — relate or join first, blend only across unrelatable sources" [ref=e16134] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/best-practices/data-blend-is-a-last-resort.md
                                        - generic [ref=e16135]: Pattern — blending is the connection method of last resort; a relationship or join is almost always the correct first choice.
                                        - generic [ref=e16136]: A data blend is a last resort — relate or join first, blend only across unrelatable sources
                                    - button "preview" [ref=e16137] [cursor=pointer]
                                - listitem [ref=e16138]:
                                    - link "Primary diagnostic — before dragging a Forecast, Cluster, Trend Line, or reference distribution onto a viz, check that the statistical preconditions hold; an indefensible model on a dashboard is a wrong answer with a confidence band. Analytics-pane stats are real statistics — forecast, cluster, and trend only when they're defensible" [ref=e16139] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/best-practices/viz-analytics-pane-statistics-validity.md
                                        - generic [ref=e16140]: Primary diagnostic — before dragging a Forecast, Cluster, Trend Line, or reference distribution onto a viz, check that the statistical preconditions hold; an indefensible model on a dashboard is a wrong answer with a confidence band.
                                        - generic [ref=e16141]: Analytics-pane stats are real statistics — forecast, cluster, and trend only when they're defensible
                                    - button "preview" [ref=e16142] [cursor=pointer]
                                - listitem [ref=e16143]:
                                    - link "Absolute rule — interactive admin credentials in a promotion/automation script are a secret-leak and a single point of failure. Headless auth uses Connected Apps or Personal Access Tokens. Authenticate automation with Connected Apps / PATs, never an admin password in a script" [ref=e16144] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/best-practices/server-automate-with-connected-apps-and-pats-not-passwords.md
                                        - generic [ref=e16145]: Absolute rule — interactive admin credentials in a promotion/automation script are a secret-leak and a single point of failure. Headless auth uses Connected Apps or Personal Access Tokens.
                                        - generic [ref=e16146]: Authenticate automation with Connected Apps / PATs, never an admin password in a script
                                    - button "preview" [ref=e16147] [cursor=pointer]
                                - listitem [ref=e16148]:
                                    - link "Pattern — a Prep flow that is not idempotent is a data-quality incident waiting to happen; design for safe re-runs from the start. Build Prep flows to be idempotent and incremental — re-running yields the same output, not duplicates" [ref=e16149] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/best-practices/prep-incremental-and-idempotent-flows.md
                                        - generic [ref=e16150]: Pattern — a Prep flow that is not idempotent is a data-quality incident waiting to happen; design for safe re-runs from the start.
                                        - generic [ref=e16151]: Build Prep flows to be idempotent and incremental — re-running yields the same output, not duplicates
                                    - button "preview" [ref=e16152] [cursor=pointer]
                                - listitem [ref=e16153]:
                                    - link "Pattern — a certified, published data source is the strong default governed grain; an embedded per-workbook extract is the deviation you justify. Certify a governed published data source; build workbooks on it, not on private extracts" [ref=e16154] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/best-practices/gov-certified-data-sources-and-governance.md
                                        - generic [ref=e16155]: Pattern — a certified, published data source is the strong default governed grain; an embedded per-workbook extract is the deviation you justify.
                                        - generic [ref=e16156]: Certify a governed published data source; build workbooks on it, not on private extracts
                                    - button "preview" [ref=e16157] [cursor=pointer]
                                - listitem [ref=e16158]:
                                    - link "Pattern Choose between parameter actions and set actions by what the user controls" [ref=e16159] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/best-practices/viz-parameter-vs-set-action.md
                                        - generic [ref=e16160]: Pattern
                                        - generic [ref=e16161]: Choose between parameter actions and set actions by what the user controls
                                    - button "preview" [ref=e16162] [cursor=pointer]
                                - listitem [ref=e16163]:
                                    - link "Pattern Compose nested LOD expressions from the inside out" [ref=e16164] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/best-practices/calc-nested-lod-expressions.md
                                        - generic [ref=e16165]: Pattern
                                        - generic [ref=e16166]: Compose nested LOD expressions from the inside out
                                    - button "preview" [ref=e16167] [cursor=pointer]
                                - listitem [ref=e16168]:
                                    - link "Primary diagnostic — when a viz shows phantom rows, unexpected extra marks, or missing gaps in a sparse series (and the numbers look \"off\" but the grain looks right), suspect densification/domain-padding before re-checking the calc. Control densification — when Tableau invents marks or hides gaps you didn't ask for" [ref=e16169] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/best-practices/viz-densification-and-domain-padding.md
                                        - generic [ref=e16170]: Primary diagnostic — when a viz shows phantom rows, unexpected extra marks, or missing gaps in a sparse series (and the numbers look "off" but the grain looks right), suspect densification/domain-padding before re-checking the calc.
                                        - generic [ref=e16171]: Control densification — when Tableau invents marks or hides gaps you didn't ask for
                                    - button "preview" [ref=e16172] [cursor=pointer]
                                - listitem [ref=e16173]:
                                    - link "Pattern — performance is a design constraint applied while building (filter at source, minimize marks, keep the hot path cheap), not a rescue operation after a dashboard is already slow. Design dashboard performance in — don't tune it later" [ref=e16174] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/best-practices/viz-dashboard-performance-by-design.md
                                        - generic [ref=e16175]: Pattern — performance is a design constraint applied while building (filter at source, minimize marks, keep the hot path cheap), not a rescue operation after a dashboard is already slow.
                                        - generic [ref=e16176]: Design dashboard performance in — don't tune it later
                                    - button "preview" [ref=e16177] [cursor=pointer]
                                - listitem [ref=e16178]:
                                    - 'link "Absolute rule — a token that authenticates the right user against the wrong entitlement key still leaks. The combined design escalates to `ravenclaude-core/security-reviewer`. Design the JWT subject/scope and the RLS entitlement key together" [ref=e16179] [cursor=pointer]':
                                        - /url: ../../plugins/tableau/best-practices/embed-scope-the-jwt-and-rls-together.md
                                        - generic [ref=e16180]: "Absolute rule — a token that authenticates the right user against the wrong entitlement key still leaks. The combined design escalates to `ravenclaude-core/security-reviewer`."
                                        - generic [ref=e16181]: Design the JWT subject/scope and the RLS entitlement key together
                                    - button "preview" [ref=e16182] [cursor=pointer]
                                - listitem [ref=e16183]:
                                    - link "Absolute rule — a truncated quantitative axis, an unsynchronized dual axis, or a two-point \"trend\" misleads the reader, and a misleading chart is a defect regardless of how it looks. Don't let the axis lie — zero-baseline bars, synchronized dual axes, real trends" [ref=e16184] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/best-practices/viz-axis-and-dual-axis-integrity.md
                                        - generic [ref=e16185]: Absolute rule — a truncated quantitative axis, an unsynchronized dual axis, or a two-point "trend" misleads the reader, and a misleading chart is a defect regardless of how it looks.
