                                        - generic [ref=e11640]: tree
                                        - generic [ref=e11641]: App type — canvas vs model-driven vs code app
                                    - paragraph [ref=e11642]: 'you are starting a new Power Apps build (or re-platforming an existing one) and must pick the app *type* before any screen/form work. Observable triggers: "build an app for <process>", "should this be canvas or model-driven", "we need a custom React app on the platform". Not for choosing a UI control *inside* an app (that''s the surface tree below).'
