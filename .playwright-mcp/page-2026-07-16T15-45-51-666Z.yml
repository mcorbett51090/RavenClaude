                                        - generic [ref=e3683]: tree
                                        - generic [ref=e3684]: Retention metric choice — NRR, GRR, or both?
                                    - paragraph [ref=e3685]: "a retention number is being put on a slide, in a QBR, or in a board deck, and the team must decide which retention metric to lead with. Observable inputs: who the audience is, whether expansion is concentrated, and whether a logo-churn problem is suspected."
                                    - group [ref=e3686]:
                                        - generic "▸ Diagram" [ref=e3687] [cursor=pointer]
