                                        - generic [ref=e4216]: tree
                                        - generic [ref=e4217]: Pipeline failure — what broke, and what's the recovery move?
                                    - paragraph [ref=e4218]: 'a scheduled ELT sync failed, alerted, or produced a wrong/stale number, OR a client asks "the dashboard is wrong/empty — what happened?" This tree triages the failure to a class and routes to the recovery move; it does **not** replace the per-source runbook (it tells you which runbook section to open). Observable inputs: the sync''s exit signal (error vs success-but-wrong), the error class (auth / rate-limit / schema / data-quality), and whether the warehouse holds a last-good state to recover from.'
