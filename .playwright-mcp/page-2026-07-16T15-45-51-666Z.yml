                                        - generic [ref=e4548]: tree
                                        - generic [ref=e4549]: A processor is falling behind — backpressure vs. skew vs. under-provisioning?
                                    - paragraph [ref=e4550]: "a stream processor's lag is growing (or its source is buffering), throughput is below target, and you must decide whether the fix is backpressure handling, re-keying, scaling, or bounding state. Observable inputs: whether lag is on *one* partition/task or *all*, whether an external sink/call is in the hot path, and whether state size is growing unbounded."
                                    - group [ref=e4551]:
                                        - generic "▸ Diagram" [ref=e4552] [cursor=pointer]
                                - listitem [ref=e4553]:
