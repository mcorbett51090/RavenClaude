                                - listitem [ref=e16188]:
                                    - 'link "Absolute rule — trusted tickets and embedded service-account credentials are deprecated/insecure. The embedding-auth *verdict* escalates to `ravenclaude-core/security-reviewer`. Embed with Connected Apps + a signed JWT, not trusted tickets or embedded credentials" [ref=e16189] [cursor=pointer]':
                                        - /url: ../../plugins/tableau/best-practices/embed-connected-apps-jwt-not-trusted-tickets.md
                                        - generic [ref=e16190]: "Absolute rule — trusted tickets and embedded service-account credentials are deprecated/insecure. The embedding-auth *verdict* escalates to `ravenclaude-core/security-reviewer`."
                                        - generic [ref=e16191]: Embed with Connected Apps + a signed JWT, not trusted tickets or embedded credentials
                                    - button "preview" [ref=e16192] [cursor=pointer]
                                - listitem [ref=e16193]:
                                    - link "Pattern — a Hyper extract is the strong default; a live connection is the deviation you justify with a written freshness need. Extract by default; choose live only against a named freshness requirement" [ref=e16194] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/best-practices/data-extract-vs-live-by-freshness.md
                                        - generic [ref=e16195]: Pattern — a Hyper extract is the strong default; a live connection is the deviation you justify with a written freshness need.
                                        - generic [ref=e16196]: Extract by default; choose live only against a named freshness requirement
                                    - button "preview" [ref=e16197] [cursor=pointer]
                                - listitem [ref=e16198]:
                                    - link "Pattern — push every filter as close to the source as the requirement allows; a workbook-level dimension filter is the *last* place to remove rows, not the first. Filter at the cheapest layer — the fastest query is the row that never enters the workbook" [ref=e16199] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/best-practices/perf-filter-at-the-source.md
                                        - generic [ref=e16200]: Pattern — push every filter as close to the source as the requirement allows; a workbook-level dimension filter is the *last* place to remove rows, not the first.
