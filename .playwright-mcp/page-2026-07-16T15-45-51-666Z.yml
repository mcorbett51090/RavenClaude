                                    - paragraph [ref=e11861]: "you're deciding *where* a value lives in a canvas app — a derived value, a value to mutate, a one-shot scoped intermediate, or a set of independent data loads. Observable triggers: a monolithic `App.OnStart` delaying first paint, `Set()` scattered across control events, a delegation-breaking aggregate inside a row predicate, or sequential `ClearCollect` chains."
