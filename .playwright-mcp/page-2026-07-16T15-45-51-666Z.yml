                                    - paragraph [ref=e15779]: 'the engagement team is evaluating whether the staffing firm needs more recruiters, or whether an existing team is under-utilized or mis-deployed. Volume targets are in view, and headcount is the lever being considered. Observable entry signal: fill rate is down, or quota attainment is low, and someone has said "we need more recruiters."'
