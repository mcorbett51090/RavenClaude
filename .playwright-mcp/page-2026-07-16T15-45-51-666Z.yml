                                        - generic [ref=e3690]: tree
                                        - generic [ref=e3691]: Risk-tier escalation — which motion fires?
                                    - paragraph [ref=e3692]: 'an account is Red, or an independent red-flag signal (champion departure, active-user collapse, an explicit "we''re evaluating alternatives") has fired. Observable inputs: whether the signal is fresh, whether it is an independent fast-trigger vs. a composite-tier Red, days to renewal, ACV, and whether the decision-maker is confirmed.'
                                    - group [ref=e3693]:
