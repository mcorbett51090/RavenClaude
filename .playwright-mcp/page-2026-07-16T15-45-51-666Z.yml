                                        - generic [ref=e9829]: tree
                                        - generic [ref=e9830]: Capacity is throttled — what do I do right now?
                                    - paragraph [ref=e9831]: "a capacity is showing throttling/rejection **now** — observable via the Fabric Capacity Metrics app: interactive delay, interactive rejection, or background rejection above limits; users report slow or failed reports; a state event shows `Overloaded / AllRejected` or `…SurgeProtectionActive`. You must choose an immediate response and a durable fix."
                                    - group [ref=e9832]:
                                        - generic "▸ Diagram" [ref=e9833] [cursor=pointer]
                                - listitem [ref=e9834]:
                                    - link "tree Data security — which plane (and engine) enforces this restriction?" [ref=e9835] [cursor=pointer]:
                                        - /url: ../../plugins/microsoft-fabric/knowledge/fabric-decision-trees.md
                                        - generic [ref=e9836]: tree
                                        - generic [ref=e9837]: Data security — which plane (and engine) enforces this restriction?
                                    - paragraph [ref=e9838]: 'sensitive data lives in Fabric and you must decide **where** the access restriction is enforced — not _whether_ (assume it''s required), but on _which plane and engine_. Observable inputs: is the restriction "can they open the item at all" vs "which rows/columns inside it", and **how the consumer reads the data** (direct SQL on the Warehouse/SQL endpoint · a Power BI semantic model · raw OneLake files via Spark/notebooks/shortcuts). The failure this prevents: enforcing row security in two engines and silently double-filtering — or worse, assuming a workspace role _is_ da'
                                    - group [ref=e9839]:
                                        - generic "▸ Diagram" [ref=e9840] [cursor=pointer]
                                - listitem [ref=e9841]:
                                    - link "tree Direct Lake misbehaving — fell back to DirectQuery, errored, or returned empty?" [ref=e9842] [cursor=pointer]:
                                        - /url: ../../plugins/microsoft-fabric/knowledge/direct-lake-fallback-triage-decision-tree.md
                                        - generic [ref=e9843]: tree
                                        - generic [ref=e9844]: Direct Lake misbehaving — fell back to DirectQuery, errored, or returned empty?
                                    - paragraph [ref=e9845]: 'an existing Direct Lake semantic model has regressed — visuals are suddenly slow (a DirectQuery-fallback signature), throw an error, or return **empty/blank** with no error — and you must find the root cause before "fixing" it (the wrong fix, e.g. "rebuild as Import," trades one problem for two). Observable entry terms: the report worked, nobody changed the *report*, and the regression often correlates with a **security change**, a **schema/load change**, or **data growth**. **First name the mode** — on-OneLake and on-SQL fail *oppositely*.'
                                    - group [ref=e9846]:
                                        - generic "▸ Diagram" [ref=e9847] [cursor=pointer]
