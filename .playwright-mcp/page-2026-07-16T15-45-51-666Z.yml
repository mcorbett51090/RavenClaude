                        - generic "regulatory-compliance 13 trees · 37 practices" [ref=e13800] [cursor=pointer]:
                            - text: regulatory-compliance
                            - generic [ref=e13801]: 13 trees · 37 practices
                        - generic [ref=e13802]:
                            - heading "Decision trees 13" [level=4] [ref=e13803]:
                                - text: Decision trees
                                - generic [ref=e13804]: "13"
                            - list [ref=e13805]:
                                - listitem [ref=e13806]:
                                    - link "tree AML / KYC — PEP or non-PEP CDD route" [ref=e13807] [cursor=pointer]:
                                        - /url: ../../plugins/regulatory-compliance/knowledge/compliance-decision-trees.md
                                        - generic [ref=e13808]: tree
                                        - generic [ref=e13809]: AML / KYC — PEP or non-PEP CDD route
                                    - paragraph [ref=e13810]: A new customer is being onboarded or an existing customer's status has changed, and the analyst must determine whether PEP-tier CDD and approval gates apply. The question is triggered by a name hit in a PEP screening database, a client disclosure of a government role, or an adverse-media hit linking the customer to public office.
                                    - group [ref=e13811]:
                                        - generic "▸ Diagram" [ref=e13812] [cursor=pointer]
                                - listitem [ref=e13813]:
                                    - link "tree Bermuda — fix the insurance class and capital regime before you model" [ref=e13814] [cursor=pointer]:
                                        - /url: ../../plugins/regulatory-compliance/knowledge/compliance-decision-trees.md
                                        - generic [ref=e13815]: tree
                                        - generic [ref=e13816]: Bermuda — fix the insurance class and capital regime before you model
                                    - paragraph [ref=e13817]: 'a Bermuda (re)insurer''s capital, solvency, or a capital return is in scope and the next decision is *which capital framework* — which depends on the *registration class*. Observable trigger: any Bermuda-domiciled insurance entity touching solvency, the ECR/MMS, EBS valuation, or a capital return. This is the tree the regime-selection tree''s `BMASPEC` leaf and the which-return tree''s `SUP` leaf route *into*. The failure it prevents: modeling capital on a generic "insurer" basis before the class fixes the yardstick.'
                                    - group [ref=e13818]:
                                        - generic "▸ Diagram" [ref=e13819] [cursor=pointer]
                                - listitem [ref=e13820]:
                                    - link "tree CDD vs EDD vs SDD by customer risk" [ref=e13821] [cursor=pointer]:
                                        - /url: ../../plugins/regulatory-compliance/knowledge/compliance-decision-trees.md
                                        - generic [ref=e13822]: tree
                                        - generic [ref=e13823]: CDD vs EDD vs SDD by customer risk
                                    - paragraph [ref=e13824]: "a customer is being onboarded or periodically refreshed, and the next decision is *how deep the due diligence goes*. Observable trigger: a new relationship, a periodic-review date, or an existing customer crossing into a higher-risk product. Do NOT use this to decide *whether* to report activity (that is the reportability tree) — this is about due-diligence depth only."
                                    - group [ref=e13825]:
                                        - generic "▸ Diagram" [ref=e13826] [cursor=pointer]
                                - listitem [ref=e13827]:
                                    - link "tree Control type — preventive vs detective vs corrective" [ref=e13828] [cursor=pointer]:
                                        - /url: ../../plugins/regulatory-compliance/knowledge/compliance-decision-trees.md
                                        - generic [ref=e13829]: tree
                                        - generic [ref=e13830]: Control type — preventive vs detective vs corrective
                                    - paragraph [ref=e13831]: 'a control is being designed, mapped, or tested and the next decision is *what type it is* — because the type dictates the evidence that proves it works and how its failure shows up. Observable trigger: building a control matrix, mapping a control to an obligation, scoping a control test. Rating "effective" without classifying type first is the failure this prevents.'
                                    - group [ref=e13832]:
                                        - generic "▸ Diagram" [ref=e13833] [cursor=pointer]
                                - listitem [ref=e13834]:
                                    - link "tree Is this entity AML/ATF-regulated — and does an exemption help?" [ref=e13835] [cursor=pointer]:
                                        - /url: ../../plugins/regulatory-compliance/knowledge/bma/decision-trees.md
                                        - generic [ref=e13836]: tree
                                        - generic [ref=e13837]: Is this entity AML/ATF-regulated — and does an exemption help?
                                    - paragraph [ref=e13838]: 'a Bermuda entity''s AML/ATF position is in question — typically right after the sector/licence determination, or when someone asserts "we''re exempt, so no AML." The next decision is *whether the entity is an AML/ATF-regulated financial institution and what a licensing exemption actually buys.* The dominant failure: treating a **licensing** exemption (e.g. a private trust company) as an **AML** exemption. It is not.'
                                    - group [ref=e13839]:
                                        - generic "▸ Diagram" [ref=e13840] [cursor=pointer]
                                - listitem [ref=e13841]:
                                    - link "tree Is this reportable — SAR/STR, threshold report, or none" [ref=e13842] [cursor=pointer]:
                                        - /url: ../../plugins/regulatory-compliance/knowledge/compliance-decision-trees.md
                                        - generic [ref=e13843]: tree
                                        - generic [ref=e13844]: Is this reportable — SAR/STR, threshold report, or none
                                    - paragraph [ref=e13845]: "a transaction, alert, or pattern has surfaced and the next decision is *what reporting obligation (if any) fires*. Observable trigger: a monitoring alert, a referral, an unusual instruction. Decide the **category** before drafting anything — reaching for the wrong instrument is the failure this prevents."
                                    - group [ref=e13846]:
                                        - generic "▸ Diagram" [ref=e13847] [cursor=pointer]
                                - listitem [ref=e13848]:
                                    - link "tree Policy vs procedure vs standard vs guideline" [ref=e13849] [cursor=pointer]:
                                        - /url: ../../plugins/regulatory-compliance/knowledge/compliance-decision-trees.md
                                        - generic [ref=e13850]: tree
                                        - generic [ref=e13851]: Policy vs procedure vs standard vs guideline
                                    - paragraph [ref=e13852]: 'something needs to be written down and the next decision is *which document layer it belongs in*. Observable trigger: a new regulation to implement, a process change, a gap analysis output, a request to "document this." Picking the wrong layer is what guarantees drift — procedure buried in policy, or a mandatory rule written as a guideline.'
                                    - group [ref=e13853]:
                                        - generic "▸ Diagram" [ref=e13854] [cursor=pointer]
                                - listitem [ref=e13855]:
                                    - link "tree Regulator finding — severity triage" [ref=e13856] [cursor=pointer]:
                                        - /url: ../../plugins/regulatory-compliance/knowledge/regulator-finding-severity-triage.md
                                        - generic [ref=e13857]: tree
                                        - generic [ref=e13858]: Regulator finding — severity triage
                                    - paragraph [ref=e13859]: a regulator has issued a written finding, communication, or enforcement-related document to the firm (or a subsidiary), and the next decision is _what severity tier this is_ and _which response playbook fires_. Do NOT use this tree for internal audit findings, second-line control-test findings, or self-identified issues raised by the firm itself — those use separate workflows.
                                    - group [ref=e13860]:
                                        - generic "▸ Diagram" [ref=e13861] [cursor=pointer]
                                - listitem [ref=e13862]:
                                    - link "tree Regulatory reporting — Which return for this entity and period" [ref=e13863] [cursor=pointer]:
                                        - /url: ../../plugins/regulatory-compliance/knowledge/compliance-decision-trees.md
                                        - generic [ref=e13864]: tree
                                        - generic [ref=e13865]: Regulatory reporting — Which return for this entity and period
                                    - paragraph [ref=e13866]: A regulated entity (or its advisor) must determine which supervisory or tax-transparency return(s) it owes for a given period. The entity type, jurisdiction, regulatory status, and product set all affect which return families apply. Triggered when a new entity is classified, when a product set changes, or at the start of each filing cycle.
                                    - group [ref=e13867]:
                                        - generic "▸ Diagram" [ref=e13868] [cursor=pointer]
                                - listitem [ref=e13869]:
                                    - link "tree Risk register — Where does a new risk event go" [ref=e13870] [cursor=pointer]:
                                        - /url: ../../plugins/regulatory-compliance/knowledge/compliance-decision-trees.md
                                        - generic [ref=e13871]: tree
                                        - generic [ref=e13872]: Risk register — Where does a new risk event go
                                    - paragraph [ref=e13873]: A risk event occurs — a failed control test, an audit finding, a near-miss, an external regulatory action in the sector, or a new product launch creating a risk gap — and the risk-and-controls-specialist must determine how to process it in the risk register and governance framework.
                                    - group [ref=e13874]:
                                        - generic "▸ Diagram" [ref=e13875] [cursor=pointer]
                                - listitem [ref=e13876]:
                                    - link "tree Which BMA sector + licence applies" [ref=e13877] [cursor=pointer]:
                                        - /url: ../../plugins/regulatory-compliance/knowledge/bma/decision-trees.md
                                        - generic [ref=e13878]: tree
                                        - generic [ref=e13879]: Which BMA sector + licence applies
                                    - paragraph [ref=e13880]: 'a Bermuda entity (or a person operating "in or from within Bermuda") needs its BMA licensing position determined, and the next decision is *which sector Act governs and which licence class within it*. Observable trigger: a new entity, a new business line, a "do we need a BMA licence" question. Do NOT use this for Bermuda **insurance** — that routes to `bermuda-insurance-specialist` and its own class/capital tree. This is the non-insurance perimeter only.'
                                    - group [ref=e13881]:
                                        - generic "▸ Diagram" [ref=e13882] [cursor=pointer]
                                - listitem [ref=e13883]:
                                    - link "tree Which regulator / regime applies (scope before you map)" [ref=e13884] [cursor=pointer]:
                                        - /url: ../../plugins/regulatory-compliance/knowledge/compliance-decision-trees.md
                                        - generic [ref=e13885]: tree
                                        - generic [ref=e13886]: Which regulator / regime applies (scope before you map)
                                    - paragraph [ref=e13887]: 'before mapping a control, classifying a finding, or using a threshold word ("material", "significant", "reportable"), the next decision is *which regulator and regime govern* — because the same word and the same control answer differently across regimes. Observable trigger: any cross-border entity, a Bermuda-domiciled entity, or a term/threshold about to be applied. Carrying a definition or timeline across a jurisdiction boundary is the silent failure this prevents.'
                                    - group [ref=e13888]:
                                        - generic "▸ Diagram" [ref=e13889] [cursor=pointer]
                                - listitem [ref=e13890]:
                                    - link "tree Which return — classify the entity before you pick the filing" [ref=e13891] [cursor=pointer]:
                                        - /url: ../../plugins/regulatory-compliance/knowledge/compliance-decision-trees.md
                                        - generic [ref=e13892]: tree
                                        - generic [ref=e13893]: Which return — classify the entity before you pick the filing
                                    - paragraph [ref=e13894]: 'a filing is owed (or assumed owed) and the next decision is *which return*, which depends on *how the entity is classified*. Observable trigger: a new reporting obligation, a period-end approaching, a new business line / licence change, or a "we filed X last year" assumption about to be reused. Do NOT use this to decide *filing hygiene* (variance, maker-checker, source-trace) — those rules apply *after* this tree picks the return. The dominant failure this prevents is selecting the return from last year''s filing instead of from a current classification.'
                                    - group [ref=e13895]:
                                        - generic "▸ Diagram" [ref=e13896] [cursor=pointer]
