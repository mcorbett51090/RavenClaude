                                        - generic [ref=e10404]: tree
                                        - generic [ref=e10405]: Build, fine-tune, or prompt? — how to source the model
                                    - paragraph [ref=e10406]: "a new ML capability is needed and the team is deciding *where the model comes from* — train a custom model on your own data, fine-tune/adapt an existing pretrained model, or call a hosted general model with prompting/retrieval. This is the most common over-engineering decision in 2026: teams train a bespoke model when a prompt would have shipped in a day, or call an expensive API per-request when a tiny custom classifier would have been cheaper and faster."
                                    - group [ref=e10407]:
                                        - generic "▸ Diagram" [ref=e10408] [cursor=pointer]
                                - listitem [ref=e10409]:
                                    - link "tree Compute this feature online or precompute it? — feature serving" [ref=e10410] [cursor=pointer]:
                                        - /url: ../../plugins/ml-engineering/knowledge/model-sourcing-and-feature-serving-decision-trees.md
                                        - generic [ref=e10411]: tree
                                        - generic [ref=e10412]: Compute this feature online or precompute it? — feature serving
                                    - paragraph [ref=e10413]: 'a model needs a feature at serving time and you''re deciding *how it''s computed* — precomputed and stored for low-latency lookup, computed on-demand from raw inputs in the request, or streamed/incrementally maintained. This is downstream of the "online vs batch *serving*" choice in [`ml-engineering-decision-trees.md`](ml-engineering-decision-trees.md) (that picks how *predictions* are served; this picks how a *feature* reaches the model) and it is the most common source of training-serving skew and serving-latency blowups.'
                                    - group [ref=e10414]:
                                        - generic "▸ Diagram" [ref=e10415] [cursor=pointer]
