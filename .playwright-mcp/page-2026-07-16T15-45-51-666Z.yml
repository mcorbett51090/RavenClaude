                                        - /url: ../../plugins/team-portfolio/knowledge/team-portfolio-decision-trees.md
                                        - generic [ref=e16395]: tree
                                        - generic [ref=e16396]: What to track — per-repo activity vs per-project rollup vs per-person view
                                    - paragraph [ref=e16397]: "A supervisor is standing up the portfolio (or reviewing what it surfaces) and must decide which **rollup axis** answers their actual question. The same collected `portfolio-activity.json` can be sliced three ways; choosing the wrong primary view buries the signal the supervisor came for. Observable input: the question the supervisor is actually trying to answer at their standing meeting."
