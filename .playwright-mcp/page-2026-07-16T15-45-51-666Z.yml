                                        - generic [ref=e4160]: tree
                                        - generic [ref=e4161]: Dashboard engagement — which Case?
                                    - paragraph [ref=e4162]: any new dashboard engagement OR mid-engagement scope shift that might change the Case. **Traverse this tree top-to-bottom before recommending a stack** — do NOT pattern-match on keywords in the user's situation description.
