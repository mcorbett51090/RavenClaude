                                    - paragraph [ref=e12609]: "Building the COPQ (Cost of Poor Quality) case in the Define phase and categorizing each identified cost. Observable trigger: a list of cost items associated with a process problem, and the need to map each to the internal failure / external failure / appraisal / prevention framework."
