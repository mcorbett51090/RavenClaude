                            - list [ref=e16329]:
                                - listitem [ref=e16330]:
                                    - link "tree Auth scope at scale — fine-grained PAT vs GitHub App" [ref=e16331] [cursor=pointer]:
                                        - /url: ../../plugins/team-portfolio/knowledge/team-portfolio-decision-trees.md
                                        - generic [ref=e16332]: tree
                                        - generic [ref=e16333]: Auth scope at scale — fine-grained PAT vs GitHub App
                                    - paragraph [ref=e16334]: 'The "Token provisioning" tree above has already established that the collection needs *more* than the built-in `GITHUB_TOKEN` (private repos, or running outside Actions). This tree decides the next fork: a **fine-grained PAT** (tied to one person''s account) versus a **GitHub App installation** (an org-owned identity). The wrong choice shows up later as a rotation fire-drill when the PAT owner leaves, or as a rate-limit ceiling the portfolio outgrows.'
                                    - group [ref=e16335]:
                                        - generic "▸ Diagram" [ref=e16336] [cursor=pointer]
                                - listitem [ref=e16337]:
                                    - link "tree Cadence review — is the current schedule still right for this team?" [ref=e16338] [cursor=pointer]:
                                        - /url: ../../plugins/team-portfolio/knowledge/team-portfolio-decision-trees.md
                                        - generic [ref=e16339]: tree
                                        - generic [ref=e16340]: Cadence review — is the current schedule still right for this team?
                                    - paragraph [ref=e16341]: A supervisor wants to review whether the portfolio's current collection schedule and report format are still serving the team's needs, or when the team's rhythm has changed (new sprint cadence, team growth, different review meeting).
                                    - group [ref=e16342]:
                                        - generic "▸ Diagram" [ref=e16343] [cursor=pointer]
                                - listitem [ref=e16344]:
                                    - link "tree Collection Problem — Diagnose Why Counts Are Wrong" [ref=e16345] [cursor=pointer]:
                                        - /url: ../../plugins/team-portfolio/knowledge/team-portfolio-decision-trees.md
                                        - generic [ref=e16346]: tree
                                        - generic [ref=e16347]: Collection Problem — Diagnose Why Counts Are Wrong
                                    - paragraph [ref=e16348]: The portfolio output is missing repos, showing zero counts for known activity, or showing different counts on consecutive runs with the same time window. The agent needs to identify the root cause before recommending a fix.
                                    - group [ref=e16349]:
                                        - generic "▸ Diagram" [ref=e16350] [cursor=pointer]
                                - listitem [ref=e16351]:
                                    - link "tree Contributor analysis — pattern worth a conversation or a config gap?" [ref=e16352] [cursor=pointer]:
                                        - /url: ../../plugins/team-portfolio/knowledge/team-portfolio-decision-trees.md
                                        - generic [ref=e16353]: tree
                                        - generic [ref=e16354]: Contributor analysis — pattern worth a conversation or a config gap?
                                    - paragraph [ref=e16355]: The portfolio report shows an unexpected contributor pattern — zero activity, unusually high activity in a single repo, or activity under an unrecognised login — and the supervisor or agent needs to decide whether the pattern reflects real team behaviour or a configuration gap before taking any action. Reaching for a conversation before ruling out a config gap wastes a 1:1 on a false alarm.
                                    - group [ref=e16356]:
                                        - generic "▸ Diagram" [ref=e16357] [cursor=pointer]
                                - listitem [ref=e16358]:
