                                        - generic [ref=e16360]: tree
                                        - generic [ref=e16361]: Hub repo access control — who can see what?
                                    - paragraph [ref=e16362]: A team is setting up the hub repo for the first time, or a security reviewer is auditing who has access to the portfolio reports. The hub repo contains activity data about team members and their work; access should be scoped appropriately.
                                    - group [ref=e16363]:
                                        - generic "▸ Diagram" [ref=e16364] [cursor=pointer]
                                - listitem [ref=e16365]:
