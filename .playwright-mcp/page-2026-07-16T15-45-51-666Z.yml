                                        - generic [ref=e4139]: tree
                                        - generic [ref=e4140]: CLM Extraction Path Selection
                                    - paragraph [ref=e4141]: You are scoping data extraction for contracts that live in a CLM (not just SFDC CPQ). The vendor + the doc-vs-metadata trade-off determine the build path.
                                    - group [ref=e4142]:
                                        - generic "▸ Diagram" [ref=e4143] [cursor=pointer]
