                                    - paragraph [ref=e11798]: 'you have a validation/defaulting/derivation requirement and must decide **where the logic lives**. Observable trigger: "should this be a business rule, a flow, or a plug-in?" The tie-breaker is **enforcement reach** — must it hold for the Web API/imports/every app, or only in one UI?'
