                                    - link "Pattern Govern subscriptions and data-driven alerts as managed content" [ref=e16209] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/best-practices/gov-subscription-and-alert-governance.md
                                        - generic [ref=e16210]: Pattern
                                        - generic [ref=e16211]: Govern subscriptions and data-driven alerts as managed content
                                    - button "preview" [ref=e16212] [cursor=pointer]
                                - listitem [ref=e16213]:
