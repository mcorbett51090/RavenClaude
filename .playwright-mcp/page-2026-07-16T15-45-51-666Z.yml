                                        - generic [ref=e15752]: tree
                                        - generic [ref=e15753]: Fill Strategy by Requisition Type — How to Work This Order
                                    - paragraph [ref=e15754]: 'an order (or a class of orders) is open and the team must choose *how* to fill it — pull from bench/redeployment, source net-new, route to teletherapy/remote, or push it back to intake as un-workable. This is the per-req routing that sits **upstream** of the capacity question: deciding the right fill motion before deciding whether headcount is short. Observable entry signal: a recruiter or coordinator asks "how should I work this req?" or a batch of similar reqs is aging without a deliberate strategy.'
