                                    - paragraph [ref=e4557]: "a Debezium CDC connector fails, lags, or produces wrong/missing events. Observable inputs: the connector's status (RUNNING / PAUSED / FAILED), whether the WAL position is still available, and the type of failure (auth, schema change, WAL rotation)."
                                    - group [ref=e4558]:
