                                        - generic [ref=e16367]: tree
                                        - generic [ref=e16368]: Project Filter Design — How to Define a Cross-Repo Project
                                    - paragraph [ref=e16369]: A user wants to track a named project (e.g., "Website Redesign", "API v2") that spans work across multiple repos. The agent needs to recommend a filter strategy that will capture the right events without over-matching (pulling in unrelated activity) or under-matching (missing project work).
                                    - group [ref=e16370]:
                                        - generic "▸ Diagram" [ref=e16371] [cursor=pointer]
                                - listitem [ref=e16372]:
                                    - link "tree Report output is missing a team member — what went wrong?" [ref=e16373] [cursor=pointer]:
                                        - /url: ../../plugins/team-portfolio/knowledge/team-portfolio-decision-trees.md
                                        - generic [ref=e16374]: tree
                                        - generic [ref=e16375]: Report output is missing a team member — what went wrong?
                                    - paragraph [ref=e16376]: "A specific team member's activity is absent or unusually low in the portfolio report, even though the supervisor believes the person was active in one or more tracked repos during the window. Observable inputs: the team member's GitHub login, the repos they were expected to be active in, and the current `team` config in `team-portfolio.json`."
                                    - group [ref=e16377]:
                                        - generic "▸ Diagram" [ref=e16378] [cursor=pointer]
                                - listitem [ref=e16379]:
                                    - link "tree Routing — This Plugin vs Neighbouring Plugins" [ref=e16380] [cursor=pointer]:
                                        - /url: ../../plugins/team-portfolio/knowledge/team-portfolio-decision-trees.md
                                        - generic [ref=e16381]: tree
                                        - generic [ref=e16382]: Routing — This Plugin vs Neighbouring Plugins
                                    - paragraph [ref=e16383]: "A request arrives that involves tracking, reporting, or managing work across repos or people. The agent needs to decide whether to use the `team-portfolio` plugin's skills, the `cross-repo-project-tracking` skill, the `project-management` plugin, or `ravenclaude-core/project-manager`. The wrong route produces the wrong deliverable."
                                    - group [ref=e16384]:
                                        - generic "▸ Diagram" [ref=e16385] [cursor=pointer]
                                - listitem [ref=e16386]:
                                    - link "tree Token provisioning — which token type for which setup?" [ref=e16387] [cursor=pointer]:
                                        - /url: ../../plugins/team-portfolio/knowledge/team-portfolio-decision-trees.md
                                        - generic [ref=e16388]: tree
                                        - generic [ref=e16389]: Token provisioning — which token type for which setup?
                                    - paragraph [ref=e16390]: "A team is setting up the portfolio hub for the first time or rotating the token, and needs to decide which GitHub token type to provision for the collection scripts. Observable inputs: whether tracked repos are public or private, whether repos are in the same account/org as the hub, and whether a GitHub Actions context is available."
                                    - group [ref=e16391]:
