                                        - generic [ref=e6670]: tree
                                        - generic [ref=e6671]: Valuation — should you add a size premium?
                                    - paragraph [ref=e6672]: you are building a cost of equity and weighing an additive size premium (SP) over CAPM-beta. The SP is the live debate in cost-of-capital practice; the safe default is **don't add one to a large, liquid company**, and **don't stack it** on a beta that already captures small-cap risk.
