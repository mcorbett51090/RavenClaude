                                    - paragraph [ref=e11670]: "a flow (or app) needs to call an external/back-end API and the question is _how to wrap it_ — a raw `HTTP` action inline, an authored **custom connector**, or pursuing **Microsoft certification**. Observable inputs: how many flows/makers will reuse it, whether the API is Entra-protected vs key-based, whether per-user delegated access is needed, and whether you're an ISV publishing for _other_ tenants. **Scope:** this tree is about _how to wrap an HTTP-callable API_; it does **not** decide Power Automate vs Logic Apps vs Azure Function (that's the automation-surface call"
