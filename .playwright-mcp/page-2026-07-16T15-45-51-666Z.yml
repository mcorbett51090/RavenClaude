                                    - paragraph [ref=e11854]: 'You are creating a new semantic model, or an existing model is slow, over-budget on capacity, or showing stale data, and you must choose (or change) how tables are stored. Observable triggers: report falls off a performance cliff at scale, refresh takes too long / can''t fit, or stakeholders ask for "live" data.'
