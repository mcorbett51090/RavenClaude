                                    - paragraph [ref=e11704]: "Deciding, for a specific intent in a Copilot Studio agent, whether to author a deterministic topic or let generative answers handle it. Observable trigger: building a new intent, or a deployed bot is hallucinating / giving inconsistent answers on a class of questions."
