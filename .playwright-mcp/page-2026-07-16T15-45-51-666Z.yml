                                    - paragraph [ref=e7376]: "the seller has a list of prospective accounts to develop and limited prospecting hours. The question is how to allocate pursuit effort across the list. Observable entry: a target list exists, a territory plan is being built, or a pipeline review shows an under-populated early stage."
