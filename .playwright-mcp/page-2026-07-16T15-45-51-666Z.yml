                                - text: Decision trees
                                - generic [ref=e3623]: "11"
                            - list [ref=e3624]:
                                - listitem [ref=e3625]:
                                    - link "tree Churn signal selection — leading vs lagging" [ref=e3626] [cursor=pointer]:
                                        - /url: ../../plugins/customer-success-analytics/knowledge/customer-success-decision-trees.md
                                        - generic [ref=e3627]: tree
                                        - generic [ref=e3628]: Churn signal selection — leading vs lagging
                                    - paragraph [ref=e3629]: "the team is selecting which signals to include in the health tier, OR a signal is under review because it is not predicting churn with the expected lead time. Observable inputs: the signal's description, when in the customer lifecycle it typically fires, and whether it has been back-tested against historical churn events."
                                    - group [ref=e3630]:
                                        - generic "▸ Diagram" [ref=e3631] [cursor=pointer]
                                - listitem [ref=e3632]:
                                    - link "tree CS metric discrepancy — when numbers don't match" [ref=e3633] [cursor=pointer]:
                                        - /url: ../../plugins/customer-success-analytics/knowledge/customer-success-decision-trees.md
                                        - generic [ref=e3634]: tree
                                        - generic [ref=e3635]: CS metric discrepancy — when numbers don't match
                                    - paragraph [ref=e3636]: "a CS leader or stakeholder reports that a metric on the dashboard doesn't match their expectation, a prior report, or what they see in the source system. Observable inputs: the metric name, whether it is computed in the mart or the BI tool, and when the discrepancy was first observed."
                                    - group [ref=e3637]:
                                        - generic "▸ Diagram" [ref=e3638] [cursor=pointer]
                                - listitem [ref=e3639]:
                                    - link "tree Expansion signal — is this account ready for a grow motion?" [ref=e3640] [cursor=pointer]:
                                        - /url: ../../plugins/customer-success-analytics/knowledge/customer-success-decision-trees.md
                                        - generic [ref=e3641]: tree
                                        - generic [ref=e3642]: Expansion signal — is this account ready for a grow motion?
                                    - paragraph [ref=e3643]: "the CS leader has a Yellow or Green account and wants to know whether to initiate an expansion (upsell / cross-sell / seat expansion) motion, or the `account-expansion-signal-design` skill is being applied. Observable inputs: usage trend direction, champion depth, NPS in the last 180 days, and days to renewal."
                                    - group [ref=e3644]:
                                        - generic "▸ Diagram" [ref=e3645] [cursor=pointer]
                                - listitem [ref=e3646]:
                                    - link "tree Health tier accuracy problem — retune or rebuild" [ref=e3647] [cursor=pointer]:
                                        - /url: ../../plugins/customer-success-analytics/knowledge/customer-success-decision-trees.md
                                        - generic [ref=e3648]: tree
                                        - generic [ref=e3649]: Health tier accuracy problem — retune or rebuild
                                    - paragraph [ref=e3650]: "the CS team reports that the health tier is misfiring — yellow accounts are renewing fine while green accounts are churning, or the Red list is too long to triage. Observable inputs: number of false Reds, known churn events that were Green before churning, and whether the signals themselves have changed since the tier was tuned."
                                    - group [ref=e3651]:
                                        - generic "▸ Diagram" [ref=e3652] [cursor=pointer]
                                - listitem [ref=e3653]:
                                    - link "tree New signal proposal — should this signal enter the tier, sub-indicators, or be excluded?" [ref=e3654] [cursor=pointer]:
                                        - /url: ../../plugins/customer-success-analytics/knowledge/customer-success-decision-trees.md
                                        - generic [ref=e3655]: tree
                                        - generic [ref=e3656]: New signal proposal — should this signal enter the tier, sub-indicators, or be excluded?
                                    - paragraph [ref=e3657]: "a new signal is proposed for the CS health tier (by a stakeholder, a CS leader, or discovered during a tier retune) and the team needs to decide how to treat it. Observable inputs: whether the signal fires before or after the churn decision, whether a back-test exists, and the back-test precision/recall results."
                                    - group [ref=e3658]:
                                        - generic "▸ Diagram" [ref=e3659] [cursor=pointer]
                                - listitem [ref=e3660]:
                                    - link "tree PII signal classification — what can land in the CS mart?" [ref=e3661] [cursor=pointer]:
                                        - /url: ../../plugins/customer-success-analytics/knowledge/customer-success-decision-trees.md
                                        - generic [ref=e3662]: tree
                                        - generic [ref=e3663]: PII signal classification — what can land in the CS mart?
                                    - paragraph [ref=e3664]: "a new data source is being added to the CS health mart collection spec and the team needs to determine what form of the data is permitted to land in the warehouse. Observable inputs: the source system type (CRM, CS platform, support tool, collaboration tool) and the data elements in the export payload."
                                    - group [ref=e3665]:
                                        - generic "▸ Diagram" [ref=e3666] [cursor=pointer]
                                - listitem [ref=e3667]:
                                    - link "tree Renewal-forecast confidence — can I commit this number?" [ref=e3668] [cursor=pointer]:
                                        - /url: ../../plugins/customer-success-analytics/knowledge/cs-retention-metrics.md
                                        - generic [ref=e3669]: tree
                                        - generic [ref=e3670]: Renewal-forecast confidence — can I commit this number?
                                    - paragraph [ref=e3671]: "a renewal forecast (a committed renewal $ for the quarter, or a churn-$ projection) is being assembled and the team must decide how much confidence to attach to it. Observable inputs: how the forecast is built (per-account vs. top-down rate), whether the health tier is back-tested, and whether late-stage signals (decision-maker, multi-threading) are confirmed."
                                    - group [ref=e3672]:
                                        - generic "▸ Diagram" [ref=e3673] [cursor=pointer]
                                - listitem [ref=e3674]:
                                    - link "tree Renewal-risk call list — which account to call first" [ref=e3675] [cursor=pointer]:
                                        - /url: ../../plugins/customer-success-analytics/knowledge/customer-success-decision-trees.md
                                        - generic [ref=e3676]: tree
                                        - generic [ref=e3677]: Renewal-risk call list — which account to call first
                                    - paragraph [ref=e3678]: "the CS leader has the filtered Red-tier list sorted by days-to-renewal and must decide the call order. Observable inputs: days-to-renewal, tier-driver signals, ACV, and whether a live decision-maker is confirmed."
                                    - group [ref=e3679]:
                                        - generic "▸ Diagram" [ref=e3680] [cursor=pointer]
                                - listitem [ref=e3681]:
                                    - link "tree Retention metric choice — NRR, GRR, or both?" [ref=e3682] [cursor=pointer]:
