                                        - generic [ref=e4146]: tree
                                        - generic [ref=e4147]: Connector gap — build, buy, or workaround?
                                    - paragraph [ref=e4148]: "the source system has no first-class managed connector in Fivetran or Airbyte Cloud, OR the available connector has a known critical limitation (missing endpoint, broken incremental). Observable inputs: source category (LMS / HRIS / niche SaaS), whether a Merge.dev or Unified API covers it, and the engagement's ops-handoff requirement."
                                    - group [ref=e4149]:
                                        - generic "▸ Diagram" [ref=e4150] [cursor=pointer]
