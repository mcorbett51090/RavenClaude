                                        - generic [ref=e1499]: tree
                                        - generic [ref=e1500]: AWS landing zone — how to bootstrap (or extend) the account foundation?
                                    - paragraph [ref=e1501]: "you're standing up AWS for the first time, or you're on a single account and need to grow into a governed multi-account estate, or you already have Organizations and need to decide *how* to add guardrails. The observable inputs are: is there already an Organization, do you want AWS to *manage* the guardrails (vs hand-rolling them), and is regulatory/compliance scope driving the design."
