                                        - generic [ref=e17284]: tree
                                        - generic [ref=e17285]: CWV root-cause triage
                                    - paragraph [ref=e17286]: any CWV regression that needs diagnosis before fix-selection. **Traverse this tree top-to-bottom before picking a fix** — diagnosing the wrong vital wastes the budget.
                                    - group [ref=e17287]:
                                        - generic "▸ Diagram" [ref=e17288] [cursor=pointer]
                                - listitem [ref=e17289]:
                                    - link "tree Dark mode — which implementation path?" [ref=e17290] [cursor=pointer]:
                                        - /url: ../../plugins/web-design/knowledge/web-design-decision-trees.md
                                        - generic [ref=e17291]: tree
                                        - generic [ref=e17292]: Dark mode — which implementation path?
                                    - paragraph [ref=e17293]: "Adding or auditing dark mode on a site or component. Observable trigger: a design spec includes dark-mode colors, or a user preference query is being considered for theming."
