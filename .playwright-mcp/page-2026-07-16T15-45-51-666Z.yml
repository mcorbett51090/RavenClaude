                                    - link "tree Dimension history — Type-1 overwrite, Type-2 effective-dated, or snapshot?" [ref=e4180] [cursor=pointer]:
                                        - /url: ../../plugins/data-platform/knowledge/data-platform-decision-trees.md
                                        - generic [ref=e4181]: tree
                                        - generic [ref=e4182]: Dimension history — Type-1 overwrite, Type-2 effective-dated, or snapshot?
                                    - paragraph [ref=e4183]: 'modeling a dimension (`dim_customer`, `dim_product`, `dim_rep`, …) whose attributes can change over time, OR a client asks an "as-of a past date" question the current mart can''t answer. Observable inputs: does the business slice metrics by an attribute that changes, will anyone ask for the value *as it was* at a past date, and does the source system keep its own change history. This tree is **complementary to** the dbt-materialization tree above — that one picks `incremental`/`table`/`view` for *load* cost; this one picks the dimension *type* (whether to keep history at'
                                    - group [ref=e4184]:
                                        - generic "▸ Diagram" [ref=e4185] [cursor=pointer]
                                - listitem [ref=e4186]:
                                    - link "tree ELT / ingestion tool — share, workflow, managed, or custom?" [ref=e4187] [cursor=pointer]:
                                        - /url: ../../plugins/data-platform/knowledge/data-platform-decision-trees.md
                                        - generic [ref=e4188]: tree
                                        - generic [ref=e4189]: ELT / ingestion tool — share, workflow, managed, or custom?
                                    - paragraph [ref=e4190]: 'data must move from a source into the warehouse, OR a client asks "Airbyte vs Fivetran vs custom?" Observable inputs: source already on a lakehouse, destination is a warehouse vs. another SaaS, monthly active rows (MAR) volume, whether a native connector exists, and who operates it post-engagement.'
