                                        - generic [ref=e4153]: tree
                                        - generic [ref=e4154]: Cross-system identity resolution — which match method?
                                    - paragraph [ref=e4155]: "the build stitches the same real-world entity — usually a customer account — across two or more source systems into one conformed spine (e.g., Salesforce Account → Planhat company → Intercom company → Slack channel). This is the #1 silent-correctness risk in any multi-source analytics build: every metric sits on top of a join, and a wrong join is wrong invisibly."
                                    - group [ref=e4156]:
                                        - generic "▸ Diagram" [ref=e4157] [cursor=pointer]
