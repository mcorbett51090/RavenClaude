                                - generic [ref=e17231]: "17"
                            - list [ref=e17232]:
                                - listitem [ref=e17233]:
                                    - link "tree Accessibility remediation — how to prioritize a finding" [ref=e17234] [cursor=pointer]:
                                        - /url: ../../plugins/web-design/knowledge/css-architecture-and-a11y-remediation-decision-trees.md
                                        - generic [ref=e17235]: tree
                                        - generic [ref=e17236]: Accessibility remediation — how to prioritize a finding
                                    - paragraph [ref=e17237]: 'A WCAG audit (manual + automated) has produced a backlog of findings, and you must rank them for remediation — what blocks launch, what''s a fast-follow, what''s a backlog item. The observable trigger: you have ≥1 a11y finding with a WCAG success-criterion reference and need a defensible severity + sequencing, not "fix the Lighthouse list top-to-bottom."'
                                    - group [ref=e17238]:
                                        - generic "▸ Diagram" [ref=e17239] [cursor=pointer]
                                - listitem [ref=e17240]:
                                    - link "tree Accessibility — native element vs ARIA widget" [ref=e17241] [cursor=pointer]:
                                        - /url: ../../plugins/web-design/knowledge/web-design-decision-trees.md
                                        - generic [ref=e17242]: tree
                                        - generic [ref=e17243]: Accessibility — native element vs ARIA widget
                                    - paragraph [ref=e17244]: "You're building an interactive control (button, menu, modal, tabs, combobox, disclosure) and must decide whether to use a native HTML element, a native platform primitive (`<dialog>`/Popover), an accessible library primitive, or hand-rolled ARIA. The observable trigger: you're about to add `role=` / `tabindex` / `aria-*` to a `<div>` or `<span>`."
                                    - group [ref=e17245]:
                                        - generic "▸ Diagram" [ref=e17246] [cursor=pointer]
                                - listitem [ref=e17247]:
                                    - link "tree Architecture — rendering strategy (SSG / SSG+ISR / SSR / RSC / islands / CSR)" [ref=e17248] [cursor=pointer]:
                                        - /url: ../../plugins/web-design/knowledge/web-design-decision-trees.md
                                        - generic [ref=e17249]: tree
                                        - generic [ref=e17250]: Architecture — rendering strategy (SSG / SSG+ISR / SSR / RSC / islands / CSR)
                                    - paragraph [ref=e17251]: "Choosing how a page (or route) is rendered for a new build or a re-platform. The observable trigger: you're picking a framework or a per-route render mode and need to justify deviating from static-first (house opinion #9: SSG > SSR > CSR)."
                                    - group [ref=e17252]:
                                        - generic "▸ Diagram" [ref=e17253] [cursor=pointer]
                                - listitem [ref=e17254]:
                                    - link "tree CMS / content model — headless vs traditional vs static content files" [ref=e17255] [cursor=pointer]:
                                        - /url: ../../plugins/web-design/knowledge/web-design-decision-trees.md
                                        - generic [ref=e17256]: tree
                                        - generic [ref=e17257]: CMS / content model — headless vs traditional vs static content files
                                    - paragraph [ref=e17258]: "Choosing where a site's content lives. Observable inputs: who edits (developers vs non-technical authors), how often, and whether content feeds multiple channels."
                                    - group [ref=e17259]:
                                        - generic "▸ Diagram" [ref=e17260] [cursor=pointer]
                                - listitem [ref=e17261]:
                                    - link "tree Content SEO — classic search vs AI answer engine optimization" [ref=e17262] [cursor=pointer]:
                                        - /url: ../../plugins/web-design/knowledge/web-design-decision-trees.md
                                        - generic [ref=e17263]: tree
                                        - generic [ref=e17264]: Content SEO — classic search vs AI answer engine optimization
                                    - paragraph [ref=e17265]: "Deciding whether to optimize a piece of content for classic search ranking, for AI answer engine citations (AEO/GEO), or for both. Observable trigger: a content strategy question about whether headings/schema/structure choices should prioritize SERP position or AI Overview / Perplexity / ChatGPT citation."
                                    - group [ref=e17266]:
                                        - generic "▸ Diagram" [ref=e17267] [cursor=pointer]
                                - listitem [ref=e17268]:
                                    - link "tree Conversion — reduce fields vs add trust vs split into steps" [ref=e17269] [cursor=pointer]:
                                        - /url: ../../plugins/web-design/knowledge/web-design-decision-trees.md
                                        - generic [ref=e17270]: tree
                                        - generic [ref=e17271]: Conversion — reduce fields vs add trust vs split into steps
                                    - paragraph [ref=e17272]: "A form/funnel underperforms and you're choosing the intervention. Observable inputs: where users drop off, how many fields, and whether the ask feels risky to the user."
                                    - group [ref=e17273]:
                                        - generic "▸ Diagram" [ref=e17274] [cursor=pointer]
                                - listitem [ref=e17275]:
                                    - link "tree CSS architecture — which styling approach for a new surface" [ref=e17276] [cursor=pointer]:
                                        - /url: ../../plugins/web-design/knowledge/css-architecture-and-a11y-remediation-decision-trees.md
                                        - generic [ref=e17277]: tree
                                        - generic [ref=e17278]: CSS architecture — which styling approach for a new surface
                                    - paragraph [ref=e17279]: "You're starting a new site/app surface (or consolidating a drifting one) and must choose how CSS is authored and delivered: plain modern CSS, CSS Modules, a utility framework (Tailwind), a zero-runtime CSS-in-JS / styled system, or a runtime CSS-in-JS library. The observable trigger: you're about to add a styling dependency, or you're choosing between `className` conventions for a fresh codebase."
                                    - group [ref=e17280]:
                                        - generic "▸ Diagram" [ref=e17281] [cursor=pointer]
                                - listitem [ref=e17282]:
