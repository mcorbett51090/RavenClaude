                                        - generic [ref=e1506]: tree
                                        - generic [ref=e1507]: AWS security finding — remediate now or accept risk?
                                    - paragraph [ref=e1508]: "A Security Hub finding, GuardDuty alert, or Trusted Advisor recommendation surfaces a security issue. The observable inputs are: the severity (Critical/High/Medium/Low), whether it is a preventive or detective control gap, and whether the resource is in production."
                                    - group [ref=e1509]:
