                                    - paragraph [ref=e9608]: 'Someone asks "how should I extend Copilot for X?" / "declarative or custom-engine?" / the design seems to need iteration, proactivity, an off-M365 channel, or a non-Copilot model. (The summary tree is in [`agent-platform-decision-2026.md`](agent-platform-decision-2026.md); this adds the Foundry/Teams-SDK leaves and the seam routing.)'
