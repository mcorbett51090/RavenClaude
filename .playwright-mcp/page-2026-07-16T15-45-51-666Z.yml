                                        - generic [ref=e7339]: tree
                                        - generic [ref=e7340]: Account Risk Classification — Healthy, Watch, or At-Risk
                                    - paragraph [ref=e7341]: "the account manager is reviewing the customer portfolio and must classify each account's retention risk before the next QBR cycle. The observable entry: volume or shipment frequency has changed, a service failure occurred, the customer has gone quiet, or a competitor has been in contact."
                                    - group [ref=e7342]:
                                        - generic "▸ Diagram" [ref=e7343] [cursor=pointer]
                                - listitem [ref=e7344]:
                                    - link "tree Deadline mode-shift — air, sea-air, or air-bridge split (build-out 2026-06-05)" [ref=e7345] [cursor=pointer]:
                                        - /url: ../../plugins/freight-forwarding-sales/knowledge/freight-sales-decision-trees.md
                                        - generic [ref=e7346]: tree
                                        - generic [ref=e7347]: Deadline mode-shift — air, sea-air, or air-bridge split (build-out 2026-06-05)
                                    - paragraph [ref=e7348]: 'a shipment has a **hard deadline** (a stock-out, a launch, a contractual delivery date) and the reflex answer "put it all on air" needs a total-landed-cost check before it burns the customer''s money. The observable entry: a delivery date, a stock-out/line-down cost, and a chargeable weight exist. This **complements** the urgency-first Mode-selection tree by doing the *cost-vs-deadline crossover* — judging the air premium against the stock-out cost, not against the ocean rate.'
                                    - group [ref=e7349]:
                                        - generic "▸ Diagram" [ref=e7350] [cursor=pointer]
                                - listitem [ref=e7351]:
                                    - link "tree Incoterms selection" [ref=e7352] [cursor=pointer]:
                                        - /url: ../../plugins/freight-forwarding-sales/knowledge/freight-sales-decision-trees.md
                                        - generic [ref=e7353]: tree
                                        - generic [ref=e7354]: Incoterms selection
                                    - paragraph [ref=e7355]: you're proposing terms for a deal and must pick the Incoterm 2020 that fits the customer's capability and your service scope.
                                    - group [ref=e7356]:
                                        - generic "▸ Diagram" [ref=e7357] [cursor=pointer]
                                - listitem [ref=e7358]:
                                    - link "tree LCL vs FCL — consolidate or take a full box (build-out 2026-06-05)" [ref=e7359] [cursor=pointer]:
                                        - /url: ../../plugins/freight-forwarding-sales/knowledge/freight-sales-decision-trees.md
                                        - generic [ref=e7360]: tree
                                        - generic [ref=e7361]: LCL vs FCL — consolidate or take a full box (build-out 2026-06-05)
                                    - paragraph [ref=e7362]: "ocean cargo is sub-container or near a container-fill, and you must decide whether to quote **LCL** (priced per W/M revenue ton) or **FCL** (priced per box). The observable entry: a CBM + weight figure exists for the shipment and the per-unit cost flips somewhere in the ~13–15 CBM band. This **complements** the urgency-first Mode-selection tree above by doing the *ocean-only volume/cost crossover* that tree only points at."
                                    - group [ref=e7363]:
                                        - generic "▸ Diagram" [ref=e7364] [cursor=pointer]
