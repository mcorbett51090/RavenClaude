                                    - paragraph [ref=e1487]: "the bill is too high, or a cost-reduction target has been set. The observable inputs are: have you *measured* where the money goes (tags + Cost Explorer), is the spend driven by waste (idle/oversized/orphaned) or by genuine steady-state usage, and is the workload's footprint stable enough to commit to."
