                    - group [ref=e6465]:
                        - generic "finance 31 trees · 35 practices" [ref=e6466] [cursor=pointer]:
                            - text: finance
                            - generic [ref=e6467]: 31 trees · 35 practices
                        - generic [ref=e6468]:
                            - heading "Decision trees 31" [level=4] [ref=e6469]:
                                - text: Decision trees
                                - generic [ref=e6470]: "31"
                            - list [ref=e6471]:
                                - listitem [ref=e6472]:
                                    - link "tree Audit — control-deficiency severity (CD / SD / material weakness)" [ref=e6473] [cursor=pointer]:
                                        - /url: ../../plugins/finance/knowledge/finance-decision-trees.md
                                        - generic [ref=e6474]: tree
                                        - generic [ref=e6475]: Audit — control-deficiency severity (CD / SD / material weakness)
                                    - paragraph [ref=e6476]: "a control test failed (or a control is missing) and the exception must be **classified by severity** before it's tracked, escalated, or disclosed. Observable trigger: a test-of-operating-effectiveness exception, a walkthrough gap, or a self-identified control failure. This operationalizes [`../best-practices/audit-classify-deficiency-severity.md`](../best-practices/audit-classify-deficiency-severity.md): severity is **likelihood × magnitude vs materiality**, not the cosmetic size of the gap."
                                    - group [ref=e6477]:
                                        - generic "▸ Diagram" [ref=e6478] [cursor=pointer]
                                - listitem [ref=e6479]:
                                    - link "tree Capital — Acquire a capability (build vs buy vs lease)" [ref=e6480] [cursor=pointer]:
                                        - /url: ../../plugins/finance/knowledge/finance-decision-trees.md
                                        - generic [ref=e6481]: tree
                                        - generic [ref=e6482]: Capital — Acquire a capability (build vs buy vs lease)
                                    - paragraph [ref=e6483]: the business needs a capability or asset (software, a facility, equipment, a function) and must decide whether to build it in-house, buy/own it outright, or lease/subscribe. A capital or multi-year operating commitment turns on the answer.
                                    - group [ref=e6484]:
                                        - generic "▸ Diagram" [ref=e6485] [cursor=pointer]
                                - listitem [ref=e6486]:
                                    - link "tree Capital — Financing a need (debt vs equity vs internal cash)" [ref=e6487] [cursor=pointer]:
                                        - /url: ../../plugins/finance/knowledge/finance-decision-trees.md
                                        - generic [ref=e6488]: tree
                                        - generic [ref=e6489]: Capital — Financing a need (debt vs equity vs internal cash)
                                    - paragraph [ref=e6490]: the business needs funding for growth, an acquisition, or a gap, and must choose the source — internal cash, debt, or equity (or a hybrid). The amount is material enough to move leverage, dilution, or runway.
                                    - group [ref=e6491]:
                                        - generic "▸ Diagram" [ref=e6492] [cursor=pointer]
                                - listitem [ref=e6493]:
                                    - link "tree Close / Controller — Which accrual approach is appropriate" [ref=e6494] [cursor=pointer]:
                                        - /url: ../../plugins/finance/knowledge/finance-decision-trees.md
                                        - generic [ref=e6495]: tree
                                        - generic [ref=e6496]: Close / Controller — Which accrual approach is appropriate
                                    - paragraph [ref=e6497]: The controller or FP&A analyst is deciding how to estimate a period-end accrual — bonus, warranty, rent, professional fees, contingency — where the exact invoice has not yet arrived. The question is whether to use a formula-driven estimate, a probability-weighted range, a run-rate extrapolation, or to wait for the invoice.
                                    - group [ref=e6498]:
                                        - generic "▸ Diagram" [ref=e6499] [cursor=pointer]
                                - listitem [ref=e6500]:
                                    - link "tree Close — accrual vs. provision vs. prepaid vs. reserve vs. nothing" [ref=e6501] [cursor=pointer]:
                                        - /url: ../../plugins/finance/knowledge/accrual-and-cutoff-discipline.md
                                        - generic [ref=e6502]: tree
                                        - generic [ref=e6503]: Close — accrual vs. provision vs. prepaid vs. reserve vs. nothing
                                    - paragraph [ref=e6504]: an item is sitting at period end and you must decide what entry (if any) it is. Getting the *kind* wrong is as damaging as getting the period wrong — it determines whether the entry reverses, rolls forward, or shouldn't exist.
                                    - group [ref=e6505]:
                                        - generic "▸ Diagram" [ref=e6506] [cursor=pointer]
                                - listitem [ref=e6507]:
                                    - link "tree Close — cutoff (does this transaction belong in this period?)" [ref=e6508] [cursor=pointer]:
                                        - /url: ../../plugins/finance/knowledge/accrual-and-cutoff-discipline.md
                                        - generic [ref=e6509]: tree
                                        - generic [ref=e6510]: Close — cutoff (does this transaction belong in this period?)
                                    - paragraph [ref=e6511]: a transaction sits in the year-end window (the last few days of the period and the first few of the next) and you must place it in the correct period. Cutoff is the temporal edge of two assertions — **completeness** (nothing left out → understatement risk, mostly expenses/liabilities) and **occurrence** (nothing pulled forward → overstatement risk, mostly revenue).
                                    - group [ref=e6512]:
                                        - generic "▸ Diagram" [ref=e6513] [cursor=pointer]
                                - listitem [ref=e6514]:
                                    - link "tree Cost — absorption vs variable costing, which for which purpose" [ref=e6515] [cursor=pointer]:
                                        - /url: ../../plugins/finance/knowledge/cost-accounting.md
                                        - generic [ref=e6516]: tree
                                        - generic [ref=e6517]: Cost — absorption vs variable costing, which for which purpose
                                    - paragraph [ref=e6518]: "you must decide which costing basis produces the number. GAAP **requires absorption** for external reporting and inventory (fixed manufacturing overhead is a product cost under ASC 330); variable costing is an internal-decision tool only. The income difference when production ≠ sales is exactly **(units produced − units sold) × fixed OH per unit**. `[high]`"
                                    - group [ref=e6519]:
                                        - generic "▸ Diagram" [ref=e6520] [cursor=pointer]
                                - listitem [ref=e6521]:
                                    - link "tree Cost — period-end variance disposition" [ref=e6522] [cursor=pointer]:
                                        - /url: ../../plugins/finance/knowledge/cost-accounting.md
                                        - generic [ref=e6523]: tree
                                        - generic [ref=e6524]: Cost — period-end variance disposition
                                    - paragraph [ref=e6525]: "standard costing has produced variances and you must dispose of them at close. Sign convention throughout: **actual > standard ⇒ Unfavorable; actual < standard ⇒ Favorable.**"
                                    - group [ref=e6526]:
                                        - generic "▸ Diagram" [ref=e6527] [cursor=pointer]
                                - listitem [ref=e6528]:
                                    - link "tree Cost — which product-costing system (job vs process vs hybrid)" [ref=e6529] [cursor=pointer]:
                                        - /url: ../../plugins/finance/knowledge/cost-accounting.md
                                        - generic [ref=e6530]: tree
                                        - generic [ref=e6531]: Cost — which product-costing system (job vs process vs hybrid)
                                    - paragraph [ref=e6532]: you are designing or reviewing how production cost accumulates. The choice is dictated by **product heterogeneity and cost-traceability**, not by industry label — and it is **orthogonal** to the cost-measurement basis (actual/normal/standard) and the cost-flow assumption (FIFO/weighted-average/LIFO). Don't conflate the three axes.
                                    - group [ref=e6533]:
                                        - generic "▸ Diagram" [ref=e6534] [cursor=pointer]
                                - listitem [ref=e6535]:
                                    - link "tree Equity comp — condition type drives fair value and expense reversal" [ref=e6536] [cursor=pointer]:
                                        - /url: ../../plugins/finance/knowledge/equity-compensation-asc718.md
                                        - generic [ref=e6537]: tree
                                        - generic [ref=e6538]: Equity comp — condition type drives fair value and expense reversal
                                    - paragraph [ref=e6539]: "you are setting up (or reviewing) the expense for an award and must classify each vesting condition. **This is the #1 error area in ASC 718** — classify every condition before you book a dollar."
                                    - group [ref=e6540]:
                                        - generic "▸ Diagram" [ref=e6541] [cursor=pointer]
                                - listitem [ref=e6542]:
                                    - link "tree Equity comp — modification accounting (the probability transition)" [ref=e6543] [cursor=pointer]:
                                        - /url: ../../plugins/finance/knowledge/equity-compensation-asc718.md
                                        - generic [ref=e6544]: tree
                                        - generic [ref=e6545]: Equity comp — modification accounting (the probability transition)
                                    - paragraph [ref=e6546]: "award terms change (repricing, extending the exercise window, accelerating or re-targeting vesting). Modification accounting (ASC 718-20-35-3) layers an **incremental fair value** — `FV of the modified award immediately after − FV of the original award immediately before`, both at the modification date — on top of the original. **Classify by the probability transition, not the Roman numeral** (the I–IV numbering is inconsistent across guides)."
                                    - group [ref=e6547]:
                                        - generic "▸ Diagram" [ref=e6548] [cursor=pointer]
                                - listitem [ref=e6549]:
                                    - link "tree FP&A — Budget-vs-actual variance root-cause triage" [ref=e6550] [cursor=pointer]:
                                        - /url: ../../plugins/finance/knowledge/variance-root-cause-triage.md
                                        - generic [ref=e6551]: tree
                                        - generic [ref=e6552]: FP&A — Budget-vs-actual variance root-cause triage
                                    - paragraph [ref=e6553]: a P&L, balance-sheet, or cash line is off plan by a material amount (per the engagement's stated threshold — typically the greater of $50K or 5%) and you are about to write commentary that names the cause. **Traverse this tree top-to-bottom before selecting a driver — do NOT pattern-match on the line label or on the first explanation a stakeholder offered.**
                                    - group [ref=e6554]:
                                        - generic "▸ Diagram" [ref=e6555] [cursor=pointer]
                                - listitem [ref=e6556]:
                                    - link "tree FP&A — Forecast method selection (driver-based vs trend vs zero-based)" [ref=e6557] [cursor=pointer]:
                                        - /url: ../../plugins/finance/knowledge/finance-decision-trees.md
                                        - generic [ref=e6558]: tree
                                        - generic [ref=e6559]: FP&A — Forecast method selection (driver-based vs trend vs zero-based)
                                    - paragraph [ref=e6560]: you are about to build or refresh a forecast/budget for a line (or a whole P&L) and must choose *how* to forecast it — decompose into operational drivers, extrapolate a trend, or rebuild bottom-up from zero. The line is material enough that the method choice changes the answer or the effort materially.
                                    - group [ref=e6561]:
                                        - generic "▸ Diagram" [ref=e6562] [cursor=pointer]
                                - listitem [ref=e6563]:
                                    - link "tree FP&A — is the plan capacity-feasible" [ref=e6564] [cursor=pointer]:
                                        - /url: ../../plugins/finance/knowledge/fpa-operating-model-and-planning.md
                                        - generic [ref=e6565]: tree
                                        - generic [ref=e6566]: FP&A — is the plan capacity-feasible
                                    - paragraph [ref=e6567]: a revenue or service plan asserts output that the headcount plan must actually field. This is the load-bearing link from headcount to revenue — a bookings target built on more *ramped* capacity than hiring can deliver is not achievable.
                                    - group [ref=e6568]:
                                        - generic "▸ Diagram" [ref=e6569] [cursor=pointer]
                                - listitem [ref=e6570]:
                                    - link "tree FP&A — Variance decomposition method (which bridge to build)" [ref=e6571] [cursor=pointer]:
                                        - /url: ../../plugins/finance/knowledge/finance-decision-trees.md
                                        - generic [ref=e6572]: tree
                                        - generic [ref=e6573]: FP&A — Variance decomposition method (which bridge to build)
                                    - paragraph [ref=e6574]: "a *reconciled* material variance needs commentary and you must choose how to decompose it — a price/volume/mix bridge, a constant-currency split, a one-time isolation, or a simple rate × volume bridge. The recon gate has already cleared (per the RECON leaf of [`variance-root-cause-triage.md`](./variance-root-cause-triage.md))."
                                    - group [ref=e6575]:
                                        - generic "▸ Diagram" [ref=e6576] [cursor=pointer]
                                - listitem [ref=e6577]:
                                    - link "tree FP&A — which budgeting approach" [ref=e6578] [cursor=pointer]:
                                        - /url: ../../plugins/finance/knowledge/fpa-operating-model-and-planning.md
                                        - generic [ref=e6579]: tree
                                        - generic [ref=e6580]: FP&A — which budgeting approach
                                    - paragraph [ref=e6581]: "you are choosing how to build a budget line or cost center. Two independent choices combine: **directional flow** (top-down / bottom-up / counter-flow) and **build method** (incremental / zero-based / activity-based). On flow, the practitioner default is **counter-flow** — issue top-down targets and envelopes, build bottom-up within them, reconcile; a divergence over ~10% is the conversation, not an error to average away."
                                    - group [ref=e6582]:
                                        - generic "▸ Diagram" [ref=e6583] [cursor=pointer]
                                - listitem [ref=e6584]:
                                    - link "tree FP&A — which capital-budgeting method leads" [ref=e6585] [cursor=pointer]:
                                        - /url: ../../plugins/finance/knowledge/fpa-decision-support-and-unit-economics.md
                                        - generic [ref=e6586]: tree
                                        - generic [ref=e6587]: FP&A — which capital-budgeting method leads
                                    - paragraph [ref=e6588]: you are evaluating an investment (capex, a new product line, build-vs-buy, a market entry) and must choose the method that *decides* it. A defensible case uses **incremental cash flows only, ignores sunk costs, charges opportunity cost, and discounts at a risk-matched rate** (the **hurdle rate** = WACC plus a premium for project-specific risk — discounting a risky bet at the corporate WACC overvalues it).
                                    - group [ref=e6589]:
                                        - generic "▸ Diagram" [ref=e6590] [cursor=pointer]
                                - listitem [ref=e6591]:
                                    - link "tree FP&A — which efficiency metric for this decision/stage" [ref=e6592] [cursor=pointer]:
                                        - /url: ../../plugins/finance/knowledge/fpa-decision-support-and-unit-economics.md
                                        - generic [ref=e6593]: tree
                                        - generic [ref=e6594]: FP&A — which efficiency metric for this decision/stage
                                    - paragraph [ref=e6595]: you must pick the lead efficiency metric for a board/operating conversation. The right metric depends on the *decision*, not fashion — and the stage modifies which is actionable.
                                    - group [ref=e6596]:
                                        - generic "▸ Diagram" [ref=e6597] [cursor=pointer]
                                - listitem [ref=e6598]:
                                    - link "tree FP&A — which planning instrument answers this question" [ref=e6599] [cursor=pointer]:
                                        - /url: ../../plugins/finance/knowledge/fpa-operating-model-and-planning.md
                                        - generic [ref=e6600]: tree
                                        - generic [ref=e6601]: FP&A — which planning instrument answers this question
                                    - paragraph [ref=e6602]: someone asks a planning/performance question and you must pick the right instrument rather than reflexively opening the budget. Picking the wrong one is how "are we on track?" gets answered against a stale forecast, or how a 3-year strategy question gets answered with a scaled-up budget.
                                    - group [ref=e6603]:
                                        - generic "▸ Diagram" [ref=e6604] [cursor=pointer]
                                - listitem [ref=e6605]:
                                    - link "tree M&A — business combination vs. asset acquisition (the screen test)" [ref=e6606] [cursor=pointer]:
                                        - /url: ../../plugins/finance/knowledge/m-and-a-purchase-accounting-asc805.md
                                        - generic [ref=e6607]: tree
                                        - generic [ref=e6608]: M&A — business combination vs. asset acquisition (the screen test)
                                    - paragraph [ref=e6609]: you have acquired a set of assets and/or activities and must decide whether to apply the full **acquisition method** (ASC 805 business combination) or **asset-acquisition** (cost-accumulation) accounting. This is the threshold question — the two models diverge sharply on transaction costs, goodwill, and contingent consideration — so resolve it **before** building the purchase entry.
                                    - group [ref=e6610]:
                                        - generic "▸ Diagram" [ref=e6611] [cursor=pointer]
                                - listitem [ref=e6612]:
                                    - link "tree M&A — contingent consideration (earnout) classification and remeasurement" [ref=e6613] [cursor=pointer]:
                                        - /url: ../../plugins/finance/knowledge/m-and-a-purchase-accounting-asc805.md
                                        - generic [ref=e6614]: tree
                                        - generic [ref=e6615]: M&A — contingent consideration (earnout) classification and remeasurement
                                    - paragraph [ref=e6616]: "the deal includes contingent consideration (an earnout, a clawback, a milestone payment) in a **business combination**. The initial classification — liability vs. equity — is the fork that drives every subsequent period, so settle it at acquisition. Recognized at **acquisition-date fair value** as part of consideration transferred; **initial** classification is determined under ASC 480 / 815-40 per ASC 805-30-25-6. `[high]`"
                                    - group [ref=e6617]:
                                        - generic "▸ Diagram" [ref=e6618] [cursor=pointer]
                                - listitem [ref=e6619]:
                                    - link "tree Revenue — over-time vs point-in-time recognition (ASC 606 step 5)" [ref=e6620] [cursor=pointer]:
                                        - /url: ../../plugins/finance/knowledge/finance-decision-trees.md
                                        - generic [ref=e6621]: tree
                                        - generic [ref=e6622]: Revenue — over-time vs point-in-time recognition (ASC 606 step 5)
                                    - paragraph [ref=e6623]: 'a contract''s revenue is being recognized and the decision is _when_ — recognized **over time** as the work progresses, or **at a point in time** when control transfers. Observable trigger: a new contract type (a subscription, a construction/build-to-order job, a milestone-based service, a product sale), or a period-end question "should this be deferred / how much is earned?". Assumes ASC 606 steps 1–4 are done (contract identified, performance obligations separated, price allocated); this is **step 5**. It does **not** decide GAAP-vs-management view (house opinion #12)'
                                    - group [ref=e6624]:
                                        - generic "▸ Diagram" [ref=e6625] [cursor=pointer]
                                - listitem [ref=e6626]:
                                    - link "tree Tax — do we need a valuation allowance?" [ref=e6627] [cursor=pointer]:
                                        - /url: ../../plugins/finance/knowledge/tax-provision-asc740.md
                                        - generic [ref=e6628]: tree
                                        - generic [ref=e6629]: Tax — do we need a valuation allowance?
                                    - paragraph [ref=e6630]: you hold a deferred tax asset (NOLs, credits, deductible temporaries) and must decide whether to reduce it by a valuation allowance. This is the most-second-guessed estimate in the provision — work it by **jurisdiction / tax-paying component**, weighing **all** positive and negative evidence.
                                    - group [ref=e6631]:
                                        - generic "▸ Diagram" [ref=e6632] [cursor=pointer]
                                - listitem [ref=e6633]:
                                    - link "tree Tax — uncertain tax position (the two-step model)" [ref=e6634] [cursor=pointer]:
                                        - /url: ../../plugins/finance/knowledge/tax-provision-asc740.md
                                        - generic [ref=e6635]: tree
                                        - generic [ref=e6636]: Tax — uncertain tax position (the two-step model)
                                    - paragraph [ref=e6637]: the return takes a position whose sustainability on the merits is uncertain. ASC 740-10 keeps a **two-step** model (legacy FIN 48), assuming the position *will* be examined by an authority with full knowledge of the facts.
                                    - group [ref=e6638]:
                                        - generic "▸ Diagram" [ref=e6639] [cursor=pointer]
                                - listitem [ref=e6640]:
                                    - link "tree Treasury — cash-shortfall response ladder (cheapest, most-reversible first)" [ref=e6641] [cursor=pointer]:
                                        - /url: ../../plugins/finance/knowledge/finance-decision-trees.md
                                        - generic [ref=e6642]: tree
                                        - generic [ref=e6643]: Treasury — cash-shortfall response ladder (cheapest, most-reversible first)
                                    - paragraph [ref=e6644]: "the 13-week direct-method cash forecast (or a covenant headroom check) shows a projected shortfall, and the question is _which lever to pull, in what order_. Observable trigger: a forecast week dips below the minimum cash buffer, a covenant test is at risk, or a large disbursement can't be funded. The discipline: exhaust **operating/working-capital levers** before **financing** ones, and reversible before irreversible — pulling an expensive or dilutive lever first destroys value a timing fix would have solved."
                                    - group [ref=e6645]:
                                        - generic "▸ Diagram" [ref=e6646] [cursor=pointer]
                                - listitem [ref=e6647]:
                                    - link "tree Treasury — Which covenant test to run first" [ref=e6648] [cursor=pointer]:
                                        - /url: ../../plugins/finance/knowledge/finance-decision-trees.md
                                        - generic [ref=e6649]: tree
                                        - generic [ref=e6650]: Treasury — Which covenant test to run first
                                    - paragraph [ref=e6651]: The treasury analyst is preparing a covenant-compliance certificate or monitoring compliance status mid-period. The credit agreement contains multiple financial covenants (leverage, coverage, liquidity) and the analyst must determine which test is most binding given current financial position.
                                    - group [ref=e6652]:
                                        - generic "▸ Diagram" [ref=e6653] [cursor=pointer]
                                - listitem [ref=e6654]:
                                    - link "tree Valuation — pre-tax cost of debt" [ref=e6655] [cursor=pointer]:
                                        - /url: ../../plugins/finance/knowledge/wacc-cost-of-capital-sourcing.md
                                        - generic [ref=e6656]: tree
                                        - generic [ref=e6657]: Valuation — pre-tax cost of debt
                                    - paragraph [ref=e6658]: you need the pre-tax cost of debt, to be tax-affected by the **same** marginal rate used in unlevering beta and in the FCF. Use the company's **current marginal** borrowing cost (what it would issue at *today*), not the legacy coupon — but weight it at the **target** structure (and re-estimate the rating spread at the target leverage if the rating shifts).
                                    - group [ref=e6659]:
                                        - generic "▸ Diagram" [ref=e6660] [cursor=pointer]
                                - listitem [ref=e6661]:
                                    - link "tree Valuation — Primary method selection (DCF vs comps vs precedent)" [ref=e6662] [cursor=pointer]:
                                        - /url: ../../plugins/finance/knowledge/finance-decision-trees.md
                                        - generic [ref=e6663]: tree
                                        - generic [ref=e6664]: Valuation — Primary method selection (DCF vs comps vs precedent)
                                    - paragraph [ref=e6665]: you must value a business or asset and choose which method carries primary weight. The valuation is of record (409A, fairness support, board decision, pre-deal) — not a back-of-envelope gut-check.
                                    - group [ref=e6666]:
                                        - generic "▸ Diagram" [ref=e6667] [cursor=pointer]
                                - listitem [ref=e6668]:
