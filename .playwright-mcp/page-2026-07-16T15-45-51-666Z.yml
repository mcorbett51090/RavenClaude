                                    - paragraph [ref=e17300]: "Deciding whether a styling decision should go through a token/design-system layer (or adopt a component foundation) or be a one-off. The observable trigger: you're about to type a hex, a magic spacing number, or `npm install` a component library — or the same value is appearing in a third place."
