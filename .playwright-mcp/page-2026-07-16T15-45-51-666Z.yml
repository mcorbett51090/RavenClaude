                                        - generic [ref=e7734]: tree
                                        - generic [ref=e7735]: Is monetization healthy?
                                - listitem [ref=e7736]:
                                    - link "tree Memory budget exceeded — out-of-memory / eviction / hitching on load" [ref=e7737] [cursor=pointer]:
                                        - /url: ../../plugins/game-development/knowledge/gamedev-runtime-performance-decision-trees.md
                                        - generic [ref=e7738]: tree
                                        - generic [ref=e7739]: Memory budget exceeded — out-of-memory / eviction / hitching on load
                                    - paragraph [ref=e7740]: "the build is over its platform memory budget — OOM crashes on low-end devices, texture eviction/pop-in, or memory-pressure hitches. Observable inputs: the platform memory budget, a memory snapshot broken down by category (textures, meshes, audio, code/managed heap), and whether usage grows over a session."
