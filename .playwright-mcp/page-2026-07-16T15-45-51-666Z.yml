                                    - link "tree dbt materialization for a support-ticket mart" [ref=e4173] [cursor=pointer]:
                                        - /url: ../../plugins/data-platform/knowledge/data-platform-decision-trees.md
                                        - generic [ref=e4174]: tree
                                        - generic [ref=e4175]: dbt materialization for a support-ticket mart
                                    - paragraph [ref=e4176]: "building a `fct_ticket` or `fct_conversation_event` mart over a conformed support source (Zendesk, Freshdesk, Intercom, SFDC Service Cloud, JSM, HubSpot Service, Help Scout, Front) and choosing the materialization strategy. Observable inputs: ticket volume per day, whether SLA breach and first-response-time fields require near-real-time freshness, and the dashboard refresh SLA agreed with the client."
                                    - group [ref=e4177]:
                                        - generic "▸ Diagram" [ref=e4178] [cursor=pointer]
