                                        - generic [ref=e12786]: tree
                                        - generic [ref=e12787]: Supplier risk — How to respond to a supplier financial distress signal
                                    - paragraph [ref=e12788]: The supplier-risk-specialist or sourcing-lead has identified a signal of financial distress in a key supplier — a credit-rating downgrade, a news report of restructuring, a late invoice pattern, a missed delivery, or a direct conversation suggesting cash-flow strain. The team must decide how urgently to respond and what actions to take.
