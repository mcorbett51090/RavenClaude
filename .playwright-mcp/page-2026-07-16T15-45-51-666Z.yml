                                    - link "tree Dashboard performance problem — where is the bottleneck?" [ref=e4166] [cursor=pointer]:
                                        - /url: ../../plugins/data-platform/knowledge/data-platform-decision-trees.md
                                        - generic [ref=e4167]: tree
                                        - generic [ref=e4168]: Dashboard performance problem — where is the bottleneck?
                                    - paragraph [ref=e4169]: "a dashboard widget is slow to load (KPI >200ms, chart >800ms, table >1.5s per the plugin's budget targets), or the warehouse bill has spiked after a dashboard launch. Observable inputs: whether the widget uses a pre-aggregation, the query plan from Cube Dev Tools, and the warehouse scan size."
                                    - group [ref=e4170]:
                                        - generic "▸ Diagram" [ref=e4171] [cursor=pointer]
