                                        - generic [ref=e7713]: tree
                                        - generic [ref=e7714]: D1 retention is low — root cause diagnosis
                                    - paragraph [ref=e7715]: "D1 retention is below the team's target threshold or benchmark for the genre. Observable inputs: tutorial completion rate, day-0 session count, session length distribution, and crash-free rate."
                                    - group [ref=e7716]:
                                        - generic "▸ Diagram" [ref=e7717] [cursor=pointer]
                                - listitem [ref=e7718]:
                                    - link "tree ECS vs OOP for the runtime data architecture" [ref=e7719] [cursor=pointer]:
                                        - /url: ../../plugins/game-development/knowledge/gamedev-architecture-and-networking-decision-trees.md
                                        - generic [ref=e7720]: tree
                                        - generic [ref=e7721]: ECS vs OOP for the runtime data architecture
                                    - paragraph [ref=e7722]: "deciding how to structure the game's runtime entities — classic object/component OOP (GameObjects/Actors with inheritance/composition) vs a data-oriented Entity-Component-System. Observable inputs: entity count at peak, whether a data-layout/cache bottleneck is *proven* (not assumed), team familiarity, and the engine's native idiom."
                                    - group [ref=e7723]:
                                        - generic "▸ Diagram" [ref=e7724] [cursor=pointer]
                                - listitem [ref=e7725]:
                                    - link "tree Feature feasibility — build or cut" [ref=e7726] [cursor=pointer]:
                                        - /url: ../../plugins/game-development/knowledge/gamedev-decision-trees.md
                                        - generic [ref=e7727]: tree
                                        - generic [ref=e7728]: Feature feasibility — build or cut
                                    - paragraph [ref=e7729]: "a feature proposal is on the table and the team must decide whether to build it in the current scope, defer it, or cut it. Observable inputs: the feature's dependency on core systems, estimated engineering cost, content-pipeline impact, and whether a prototype exists."
                                    - group [ref=e7730]:
                                        - generic "▸ Diagram" [ref=e7731] [cursor=pointer]
