                    - group [ref=e1200]:
                        - generic "auth-identity 10 trees · 20 practices" [ref=e1201] [cursor=pointer]:
                            - text: auth-identity
                            - generic [ref=e1202]: 10 trees · 20 practices
                        - generic [ref=e1203]:
                            - heading "Decision trees 10" [level=4] [ref=e1204]:
                                - text: Decision trees
                                - generic [ref=e1205]: "10"
                            - list [ref=e1206]:
                                - listitem [ref=e1207]:
                                    - link "tree Build vs buy — managed provider vs OSS vs roll-your-own" [ref=e1208] [cursor=pointer]:
                                        - /url: ../../plugins/auth-identity/knowledge/auth-identity-decision-trees.md
                                        - generic [ref=e1209]: tree
                                        - generic [ref=e1210]: Build vs buy — managed provider vs OSS vs roll-your-own
                                    - paragraph [ref=e1211]: 'You''re choosing *what* provides authentication for a new app/API/dashboard. Observable trigger: "should I use Supabase Auth, Clerk, Auth0, or roll my own?", "do I need an auth provider at all?", or a greenfield "add login" with no provider chosen yet.'
                                    - group [ref=e1212]:
                                        - generic "▸ Diagram" [ref=e1213] [cursor=pointer]
                                - listitem [ref=e1214]:
                                    - link "tree Gate the analytics dashboard — and the seam to data-platform" [ref=e1215] [cursor=pointer]:
                                        - /url: ../../plugins/auth-identity/knowledge/auth-identity-decision-trees.md
                                        - generic [ref=e1216]: tree
                                        - generic [ref=e1217]: Gate the analytics dashboard — and the seam to data-platform
                                    - paragraph [ref=e1218]: 'You''re putting the analytics dashboard (the marketplace''s generated dashboard HTML + embedded BI views) behind login. Observable trigger: "gate my dashboard behind Google login", "only logged-in users see the dashboard", or "each tenant sees only its rows in the embedded view." This is a **security control**: the chosen leaf escalates to `ravenclaude-core/security-reviewer`.'
                                    - group [ref=e1219]:
                                        - generic "▸ Diagram" [ref=e1220] [cursor=pointer]
                                - listitem [ref=e1221]:
                                    - link "tree Logout — what must be revoked?" [ref=e1222] [cursor=pointer]:
                                        - /url: ../../plugins/auth-identity/knowledge/auth-identity-decision-trees.md
                                        - generic [ref=e1223]: tree
                                        - generic [ref=e1224]: Logout — what must be revoked?
                                    - paragraph [ref=e1225]: 'Implementing or reviewing a logout flow. Observable trigger: a logout button, a session-expiry handler, a "sign out of all devices" feature, or a security-review finding about incomplete logout.'
                                    - group [ref=e1226]:
                                        - generic "▸ Diagram" [ref=e1227] [cursor=pointer]
                                - listitem [ref=e1228]:
                                    - link "tree Refresh token reuse detection — respond to a replayed token" [ref=e1229] [cursor=pointer]:
                                        - /url: ../../plugins/auth-identity/knowledge/auth-identity-decision-trees.md
                                        - generic [ref=e1230]: tree
                                        - generic [ref=e1231]: Refresh token reuse detection — respond to a replayed token
                                    - paragraph [ref=e1232]: "An incoming refresh token request fails the reuse-detection check (the token was already used or has been seen before). Observable trigger: an `invalid_grant` from the provider due to a reused refresh token, or an internal flag that a token was already rotated."
                                    - group [ref=e1233]:
                                        - generic "▸ Diagram" [ref=e1234] [cursor=pointer]
                                - listitem [ref=e1235]:
                                    - link "tree Session vs JWT, and where tokens live" [ref=e1236] [cursor=pointer]:
                                        - /url: ../../plugins/auth-identity/knowledge/auth-identity-decision-trees.md
                                        - generic [ref=e1237]: tree
                                        - generic [ref=e1238]: Session vs JWT, and where tokens live
                                    - paragraph [ref=e1239]: 'You''re deciding how to persist the authenticated session and where each token is stored. Observable trigger: "session cookie or JWT?", "where do I keep the access token?", or a review finding tokens in `localStorage`.'
                                    - group [ref=e1240]:
                                        - generic "▸ Diagram" [ref=e1241] [cursor=pointer]
                                - listitem [ref=e1242]:
                                    - link "tree When to require step-up (re-)authentication for a sensitive action?" [ref=e1243] [cursor=pointer]:
                                        - /url: ../../plugins/auth-identity/knowledge/mfa-and-auth-method-selection-trees.md
                                        - generic [ref=e1244]: tree
                                        - generic [ref=e1245]: When to require step-up (re-)authentication for a sensitive action?
                                    - paragraph [ref=e1246]: 'A user is already logged in and is about to do something consequential — and you''re deciding whether to demand a fresh, stronger authentication *at that moment*. Observable trigger: "should changing the password / email require re-auth?", "protect the money-movement endpoint", "the user has been logged in for days — is that session strong enough to delete the account?".'
                                    - group [ref=e1247]:
                                        - generic "▸ Diagram" [ref=e1248] [cursor=pointer]
                                - listitem [ref=e1249]:
                                    - link "tree Which auth providers should you offer?" [ref=e1250] [cursor=pointer]:
                                        - /url: ../../plugins/auth-identity/knowledge/auth-identity-decision-trees.md
                                        - generic [ref=e1251]: tree
                                        - generic [ref=e1252]: Which auth providers should you offer?
                                    - paragraph [ref=e1253]: 'You''ve chosen the auth product (e.g. Supabase Auth) and now decide *which login methods to surface* — Google, Apple, Microsoft, GitHub, magic link, passkeys, email+password. Observable trigger: "add Apple too", "what login options should I show?", "do I need passwords?".'
                                    - group [ref=e1254]:
                                        - generic "▸ Diagram" [ref=e1255] [cursor=pointer]
                                - listitem [ref=e1256]:
                                    - link "tree Which MFA factor should you require?" [ref=e1257] [cursor=pointer]:
                                        - /url: ../../plugins/auth-identity/knowledge/mfa-and-auth-method-selection-trees.md
                                        - generic [ref=e1258]: tree
                                        - generic [ref=e1259]: Which MFA factor should you require?
                                    - paragraph [ref=e1260]: 'You''ve decided the app needs a second factor (or you''re choosing what to *offer* as MFA) and must pick the factor type. Observable trigger: "add MFA / 2FA", "is SMS OTP good enough?", "do we need hardware keys?", "what counts as phishing-resistant?".'
                                    - group [ref=e1261]:
                                        - generic "▸ Diagram" [ref=e1262] [cursor=pointer]
                                - listitem [ref=e1263]:
                                    - link "tree Which OAuth flow — by client type" [ref=e1264] [cursor=pointer]:
                                        - /url: ../../plugins/auth-identity/knowledge/auth-identity-decision-trees.md
                                        - generic [ref=e1265]: tree
                                        - generic [ref=e1266]: Which OAuth flow — by client type
                                    - paragraph [ref=e1267]: 'You''ve chosen a provider and must pick the OAuth/OIDC flow for a specific client. Observable trigger: "which flow for my SPA / mobile app / backend / CLI?", or a legacy app still on Implicit.'
                                    - group [ref=e1268]:
                                        - generic "▸ Diagram" [ref=e1269] [cursor=pointer]
                                - listitem [ref=e1270]:
                                    - link "tree Which session storage strategy for this app type?" [ref=e1271] [cursor=pointer]:
                                        - /url: ../../plugins/auth-identity/knowledge/auth-identity-decision-trees.md
                                        - generic [ref=e1272]: tree
                                        - generic [ref=e1273]: Which session storage strategy for this app type?
                                    - paragraph [ref=e1274]: 'Designing or reviewing how an authenticated session is stored and transported. Observable trigger: "where do I put the access token?", an SSR vs SPA architectural decision, or a security finding about token storage.'
                                    - group [ref=e1275]:
                                        - generic "▸ Diagram" [ref=e1276] [cursor=pointer]
