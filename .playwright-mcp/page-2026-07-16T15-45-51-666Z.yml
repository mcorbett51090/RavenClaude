                                        - generic [ref=e12758]: tree
                                        - generic [ref=e12759]: Savings measurement — Is this a valid realized saving
                                    - paragraph [ref=e12760]: A procurement team has completed a sourcing event and is calculating the savings to report to finance and to the CPO scorecard. The question is whether the saving is real, recognized, and attributable to procurement action — or whether it is an inflation of the true benefit.
                                    - group [ref=e12761]:
                                        - generic "▸ Diagram" [ref=e12762] [cursor=pointer]
                                - listitem [ref=e12763]:
                                    - link "tree Sourcing — Make in-house vs buy from the market" [ref=e12764] [cursor=pointer]:
                                        - /url: ../../plugins/procurement-sourcing/knowledge/procurement-make-vs-buy-decision-tree.md
                                        - generic [ref=e12765]: tree
                                        - generic [ref=e12766]: Sourcing — Make in-house vs buy from the market
                                    - paragraph [ref=e12767]: A component, service, or capability could be produced internally or procured externally, and procurement must give a defensible recommendation. The decision is **not** a pure cost comparison — strategy (core competency), control (quality / IP / regulation), supply-market reality, and reversibility gate the cost arithmetic. Cost is necessary but not sufficient.
                                    - group [ref=e12768]:
                                        - generic "▸ Diagram" [ref=e12769] [cursor=pointer]
                                - listitem [ref=e12770]:
                                    - link "tree Sourcing — Where does this category sit on the Kraljic matrix" [ref=e12771] [cursor=pointer]:
                                        - /url: ../../plugins/procurement-sourcing/knowledge/procurement-kraljic-positioning-decision-tree.md
                                        - generic [ref=e12772]: tree
                                        - generic [ref=e12773]: Sourcing — Where does this category sit on the Kraljic matrix
                                    - paragraph [ref=e12774]: A category is being segmented before a sourcing strategy is chosen. The analyst must resolve two axes — **profit impact** (the spend / margin / business-criticality the category represents) and **supply risk** (scarcity of qualified suppliers, switching difficulty, supply-market volatility, geographic/geopolitical concentration) — to land the category in one of four quadrants. The quadrant then selects the play (hand off to the "Which sourcing play" tree).
                                    - group [ref=e12775]:
                                        - generic "▸ Diagram" [ref=e12776] [cursor=pointer]
                                - listitem [ref=e12777]:
                                    - link "tree Sourcing — Which sourcing play for this category" [ref=e12778] [cursor=pointer]:
                                        - /url: ../../plugins/procurement-sourcing/knowledge/procurement-decision-trees.md
                                        - generic [ref=e12779]: tree
                                        - generic [ref=e12780]: Sourcing — Which sourcing play for this category
                                    - paragraph [ref=e12781]: A category is ready to be sourced and the analyst must choose between a competitive RFx, a sole-source negotiation, a negotiated renewal, or a market-test. The decision depends on the Kraljic position, the supply-market structure, and the switching-cost profile.
                                    - group [ref=e12782]:
                                        - generic "▸ Diagram" [ref=e12783] [cursor=pointer]
