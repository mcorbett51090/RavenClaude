                        - generic "salesforce 36 trees · 60 practices" [ref=e14590] [cursor=pointer]:
                            - text: salesforce
                            - generic [ref=e14591]: 36 trees · 60 practices
                        - generic [ref=e14592]:
                            - heading "Decision trees 36" [level=4] [ref=e14593]:
                                - text: Decision trees
                                - generic [ref=e14594]: "36"
                            - list [ref=e14595]:
                                - listitem [ref=e14596]:
                                    - link "tree agent or deterministic automation?" [ref=e14597] [cursor=pointer]:
                                        - /url: ../../plugins/salesforce/knowledge/agentforce-determinism-and-trust.md
                                        - generic [ref=e14598]: tree
                                        - generic [ref=e14599]: agent or deterministic automation?
                                    - group [ref=e14600]:
                                        - generic "▸ Diagram" [ref=e14601] [cursor=pointer]
                                - listitem [ref=e14602]:
                                    - link "tree Apex Security — where to enforce CRUD/FLS (with sharing / WITH SECURITY_ENFORCED / stripInaccessible / USER_MODE)" [ref=e14603] [cursor=pointer]:
                                        - /url: ../../plugins/salesforce/knowledge/apex-decision-trees.md
                                        - generic [ref=e14604]: tree
                                        - generic [ref=e14605]: Apex Security — where to enforce CRUD/FLS (with sharing / WITH SECURITY_ENFORCED / stripInaccessible / USER_MODE)
                                    - paragraph [ref=e14606]: "You are writing Apex that reads or writes records on behalf of a user (a controller, a service called from LWC/Aura/VF, a user-invoked action). Observable triggers: a PMD/CRUD-FLS reviewer finding, an `@AuraEnabled` method exposing data, or a `without sharing` keyword with no justification. The *verdict* escalates to `ravenclaude-core/security-reviewer`; this tree picks the *mechanism*."
                                    - group [ref=e14607]:
                                        - generic "▸ Diagram" [ref=e14608] [cursor=pointer]
                                - listitem [ref=e14609]:
                                    - link "tree Apex test isolation — which dependency-isolation technique?" [ref=e14610] [cursor=pointer]:
                                        - /url: ../../plugins/salesforce/knowledge/apex-decision-trees.md
                                        - generic [ref=e14611]: tree
                                        - generic [ref=e14612]: Apex test isolation — which dependency-isolation technique?
                                    - paragraph [ref=e14613]: "You are writing an Apex test class and a method under test has a dependency you want to isolate: an external HTTP callout, a SOQL query over real org data, a time-sensitive operation, or a call to another Apex service class. Observable triggers: a test that fails intermittently depending on org data, a test that issues live callouts, or a test that is only meaningful with specific record state."
                                    - group [ref=e14614]:
                                        - generic "▸ Diagram" [ref=e14615] [cursor=pointer]
                                - listitem [ref=e14616]:
                                    - link "tree Async Apex — which channel (Future / Queueable / Batch / Scheduled / Platform Event)" [ref=e14617] [cursor=pointer]:
                                        - /url: ../../plugins/salesforce/knowledge/apex-decision-trees.md
                                        - generic [ref=e14618]: tree
                                        - generic [ref=e14619]: Async Apex — which channel (Future / Queueable / Batch / Scheduled / Platform Event)
                                    - paragraph [ref=e14620]: 'You have work that must leave the synchronous transaction — a callout from a trigger context, a roll-up over more rows than a synchronous query can hold, a job that must chain, or a recurring task. Observable triggers: `System.LimitException` from synchronous volume, "callout not allowed from trigger," a need to run on a schedule, or an `@future` that won''t compile because you passed an sObject.'
                                    - group [ref=e14621]:
                                        - generic "▸ Diagram" [ref=e14622] [cursor=pointer]
                                - listitem [ref=e14623]:
                                    - link "tree Automation density — where does this new automation go on a busy object?" [ref=e14624] [cursor=pointer]:
                                        - /url: ../../plugins/salesforce/knowledge/automation-density-decision-trees.md
                                        - generic [ref=e14625]: tree
                                        - generic [ref=e14626]: Automation density — where does this new automation go on a busy object?
                                    - paragraph [ref=e14627]: 'You need to add automation to an object that **already has** one or more automations on the same DML event. Observable triggers: a recursion error after adding a Flow, a field that''s set by two automations and "flickers," an object with a trigger *and* two record-triggered Flows *and* a legacy Process Builder, or a review finding that the same save fires five things in an order nobody can predict.'
                                    - group [ref=e14628]:
                                        - generic "▸ Diagram" [ref=e14629] [cursor=pointer]
                                - listitem [ref=e14630]:
                                    - link "tree Automation — Agentforce agent vs Flow/Apex?" [ref=e14631] [cursor=pointer]:
                                        - /url: ../../plugins/salesforce/knowledge/platform-alm-agentforce-decision-trees.md
                                        - generic [ref=e14632]: tree
                                        - generic [ref=e14633]: Automation — Agentforce agent vs Flow/Apex?
                                    - paragraph [ref=e14634]: 'A task could plausibly be "an AI agent", and you must decide whether it should be. Observable trigger: "can Agentforce do this?", "should this be an agent?", or a stakeholder asking for an AI assistant over a fixed-path process.'
                                    - group [ref=e14635]:
                                        - generic "▸ Diagram" [ref=e14636] [cursor=pointer]
                                - listitem [ref=e14637]:
                                    - link "tree Automation — which Flow type?" [ref=e14638] [cursor=pointer]:
                                        - /url: ../../plugins/salesforce/knowledge/flow-lwc-decision-trees.md
                                        - generic [ref=e14639]: tree
                                        - generic [ref=e14640]: Automation — which Flow type?
                                    - group [ref=e14641]:
                                        - generic "▸ Diagram" [ref=e14642] [cursor=pointer]
                                - listitem [ref=e14643]:
                                    - link "tree Build method — declarative vs programmatic for this requirement?" [ref=e14644] [cursor=pointer]:
                                        - /url: ../../plugins/salesforce/knowledge/platform-alm-agentforce-decision-trees.md
                                        - generic [ref=e14645]: tree
                                        - generic [ref=e14646]: Build method — declarative vs programmatic for this requirement?
                                    - paragraph [ref=e14647]: 'A new automation or customization requirement, and you must pick the build tool. Observable trigger: "should this be a Flow or Apex?", a new field-update/validation/automation request, or a record-trigger being scoped.'
                                    - group [ref=e14648]:
                                        - generic "▸ Diagram" [ref=e14649] [cursor=pointer]
                                - listitem [ref=e14650]:
                                    - link "tree Bulk Safety — is this Apex safe for a 200-record load?" [ref=e14651] [cursor=pointer]:
                                        - /url: ../../plugins/salesforce/knowledge/apex-decision-trees.md
                                        - generic [ref=e14652]: tree
                                        - generic [ref=e14653]: Bulk Safety — is this Apex safe for a 200-record load?
                                    - paragraph [ref=e14654]: "You are reviewing or writing any Apex that runs in a trigger, a Batch `execute`, or any path a data load can reach. Observable triggers: `Too many SOQL queries: 101`, `Too many DML statements: 151`, `Apex CPU time limit exceeded`, or a test that only inserts one record."
                                    - group [ref=e14655]:
                                        - generic "▸ Diagram" [ref=e14656] [cursor=pointer]
                                - listitem [ref=e14657]:
                                    - link "tree Data — how to open record access (OWD / hierarchy / sharing rules / manual / Apex-managed)" [ref=e14658] [cursor=pointer]:
                                        - /url: ../../plugins/salesforce/knowledge/integration-data-decision-trees.md
                                        - generic [ref=e14659]: tree
                                        - generic [ref=e14660]: Data — how to open record access (OWD / hierarchy / sharing rules / manual / Apex-managed)
                                    - paragraph [ref=e14661]: 'You''re designing who can see a record type and choosing among OWD, role hierarchy, sharing rules, manual shares, and Apex managed sharing. Observable trigger: "user/group X can''t see record Y" or a new object''s sharing design.'
                                    - group [ref=e14662]:
                                        - generic "▸ Diagram" [ref=e14663] [cursor=pointer]
                                - listitem [ref=e14664]:
                                    - link "tree Data — is this query LDV-safe?" [ref=e14665] [cursor=pointer]:
                                        - /url: ../../plugins/salesforce/knowledge/integration-data-decision-trees.md
                                        - generic [ref=e14666]: tree
                                        - generic [ref=e14667]: Data — is this query LDV-safe?
                                    - paragraph [ref=e14668]: "You're authoring or debugging a SOQL query against a high-volume object (millions of rows), or you hit `Non-selective query against large object type`, a query timeout, or a slow list view/report."
                                    - group [ref=e14669]:
                                        - generic "▸ Diagram" [ref=e14670] [cursor=pointer]
                                - listitem [ref=e14671]:
                                    - link "tree Data — which load tool (Data Loader vs Bulk API vs ETL)" [ref=e14672] [cursor=pointer]:
                                        - /url: ../../plugins/salesforce/knowledge/integration-data-decision-trees.md
                                        - generic [ref=e14673]: tree
                                        - generic [ref=e14674]: Data — which load tool (Data Loader vs Bulk API vs ETL)
                                    - paragraph [ref=e14675]: "You must insert/update/upsert/delete a dataset into an org and are choosing the tool. Observable triggers: a row count beyond a handful, a recurring sync, or a multi-source transform."
                                    - group [ref=e14676]:
                                        - generic "▸ Diagram" [ref=e14677] [cursor=pointer]
                                - listitem [ref=e14678]:
                                    - link "tree Deployment — change set vs Metadata API vs SFDX/CI?" [ref=e14679] [cursor=pointer]:
                                        - /url: ../../plugins/salesforce/knowledge/platform-alm-agentforce-decision-trees.md
                                        - generic [ref=e14680]: tree
                                        - generic [ref=e14681]: Deployment — change set vs Metadata API vs SFDX/CI?
                                    - paragraph [ref=e14682]: 'Metadata is ready to move between orgs and you must choose the *mechanism*. Observable trigger: "how do we get this to UAT/prod?" or someone reaches for the Setup → Outbound Change Sets UI.'
                                    - group [ref=e14683]:
                                        - generic "▸ Diagram" [ref=e14684] [cursor=pointer]
                                - listitem [ref=e14685]:
                                    - link "tree Experience Cloud — which auth model for a new site?" [ref=e14686] [cursor=pointer]:
                                        - /url: ../../plugins/salesforce/knowledge/apex-decision-trees.md
                                        - generic [ref=e14687]: tree
                                        - generic [ref=e14688]: Experience Cloud — which auth model for a new site?
                                    - paragraph [ref=e14689]: 'You are designing a new Experience Cloud (formerly Community) site and must choose the authentication model: guest user, self-registration, SSO, or a combination. Observable triggers: "we need a partner portal," "customers should be able to register and track their orders," or "our employees access Salesforce via Azure AD and need a public-facing site too."'
                                    - group [ref=e14690]:
                                        - generic "▸ Diagram" [ref=e14691] [cursor=pointer]
                                - listitem [ref=e14692]:
                                    - link "tree Flow or Apex?" [ref=e14693] [cursor=pointer]:
                                        - /url: ../../plugins/salesforce/knowledge/flow-vs-apex-decision.md
                                        - generic [ref=e14694]: tree
                                        - generic [ref=e14695]: Flow or Apex?
                                    - group [ref=e14696]:
                                        - generic "▸ Diagram" [ref=e14697] [cursor=pointer]
                                - listitem [ref=e14698]:
                                    - link "tree how to package and ship" [ref=e14699] [cursor=pointer]:
                                        - /url: ../../plugins/salesforce/knowledge/packaging-and-deployment.md
                                        - generic [ref=e14700]: tree
                                        - generic [ref=e14701]: how to package and ship
                                    - group [ref=e14702]:
                                        - generic "▸ Diagram" [ref=e14703] [cursor=pointer]
                                - listitem [ref=e14704]:
                                    - link "tree Integration & Data — at-least-once event delivery, is the consumer safe?" [ref=e14705] [cursor=pointer]:
                                        - /url: ../../plugins/salesforce/knowledge/integration-data-decision-trees.md
                                        - generic [ref=e14706]: tree
                                        - generic [ref=e14707]: Integration & Data — at-least-once event delivery, is the consumer safe?
                                    - paragraph [ref=e14708]: "You subscribe to Platform Events or CDC and must confirm the consumer won't double-process a redelivered event or silently miss events. Observable triggers: duplicate downstream records, a consumer that was offline, or designing any event subscriber."
                                    - group [ref=e14709]:
                                        - generic "▸ Diagram" [ref=e14710] [cursor=pointer]
