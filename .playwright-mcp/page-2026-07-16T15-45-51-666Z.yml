                        - generic [ref=e13076]:
                            - heading "Decision trees 7" [level=4] [ref=e13077]:
                                - text: Decision trees
                                - generic [ref=e13078]: "7"
                            - list [ref=e13079]:
                                - listitem [ref=e13080]:
                                    - link "tree Change request — approve, reject, or defer?" [ref=e13081] [cursor=pointer]:
                                        - /url: ../../plugins/project-management/knowledge/pm-decision-trees.md
                                        - generic [ref=e13082]: tree
                                        - generic [ref=e13083]: Change request — approve, reject, or defer?
                                    - paragraph [ref=e13084]: "A change request has been raised on a baselined predictive project (or at a milestone gate on a hybrid). The change control board or PM must disposition it. Observable trigger: a formal or informal request to alter scope, schedule, cost, or quality that has arrived after the baseline is approved."
                                    - group [ref=e13085]:
                                        - generic "▸ Diagram" [ref=e13086] [cursor=pointer]
                                - listitem [ref=e13087]:
                                    - link "tree Closing a phase gate — proceed, hold, or reset?" [ref=e13088] [cursor=pointer]:
                                        - /url: ../../plugins/project-management/knowledge/pm-decision-trees.md
                                        - generic [ref=e13089]: tree
                                        - generic [ref=e13090]: Closing a phase gate — proceed, hold, or reset?
                                    - paragraph [ref=e13091]: "A predictive or hybrid project has reached a planned phase gate or stage gate (end of design, end of build, end of UAT, etc.). The sponsor and PM must decide whether to proceed to the next phase, hold pending resolution of open items, or reset the current phase. Observable trigger: a formal phase review is scheduled and the phase deliverables are being assessed against the gate criteria."
                                    - group [ref=e13092]:
                                        - generic "▸ Diagram" [ref=e13093] [cursor=pointer]
                                - listitem [ref=e13094]:
                                    - link "tree Delivery approach — predictive, agile, or hybrid?" [ref=e13095] [cursor=pointer]:
                                        - /url: ../../plugins/project-management/knowledge/pm-decision-trees.md
                                        - generic [ref=e13096]: tree
                                        - generic [ref=e13097]: Delivery approach — predictive, agile, or hybrid?
                                    - paragraph [ref=e13098]: "a project is starting (or being reset) and the question is _how to run it_ — a predictive plan-of-record (delivery-lead), an empirical sprint/flow cadence (scrum-master), or a hybrid that does both at different altitudes. Observable inputs: how stable the **requirements** are, how fixed the **scope/date/budget** are by contract or mandate, whether the work is **discovery-heavy** vs well-understood, and whether a **governance/stage-gate** obligation exists. The failure this prevents: forcing a Gantt onto genuinely exploratory work, or running pure open-ended sprints unde"
                                    - group [ref=e13099]:
                                        - generic "▸ Diagram" [ref=e13100] [cursor=pointer]
                                - listitem [ref=e13101]:
                                    - link "tree Escalation threshold — resolve at team level or escalate?" [ref=e13102] [cursor=pointer]:
                                        - /url: ../../plugins/project-management/knowledge/pm-decision-trees.md
                                        - generic [ref=e13103]: tree
                                        - generic [ref=e13104]: Escalation threshold — resolve at team level or escalate?
                                    - paragraph [ref=e13105]: "An issue has been raised in the project and the team must decide whether it can be resolved within the project team or whether it requires escalation to the PM, the sponsor, or the steering committee. Observable trigger: a blocker, a conflict, a resource constraint, or a risk event that the team cannot resolve with their existing authority and resources."
                                    - group [ref=e13106]:
                                        - generic "▸ Diagram" [ref=e13107] [cursor=pointer]
                                - listitem [ref=e13108]:
                                    - link "tree Risk response — which response strategy to choose?" [ref=e13109] [cursor=pointer]:
                                        - /url: ../../plugins/project-management/knowledge/pm-decision-trees.md
                                        - generic [ref=e13110]: tree
                                        - generic [ref=e13111]: Risk response — which response strategy to choose?
                                    - paragraph [ref=e13112]: 'A risk has been scored on the register and the team must choose a response strategy. Observable trigger: a risk entry in the register with a probability × impact score and no response assigned; or the team debating whether to "just accept" a high-scored risk.'
                                    - group [ref=e13113]:
                                        - generic "▸ Diagram" [ref=e13114] [cursor=pointer]
                                - listitem [ref=e13115]:
                                    - link "tree Sprint scope injection — accept, defer, or cancel the sprint?" [ref=e13116] [cursor=pointer]:
                                        - /url: ../../plugins/project-management/knowledge/pm-decision-trees.md
                                        - generic [ref=e13117]: tree
                                        - generic [ref=e13118]: Sprint scope injection — accept, defer, or cancel the sprint?
                                    - paragraph [ref=e13119]: "Mid-sprint, a stakeholder or Product Owner wants to inject new scope. Observable trigger: a new story, bug, or requirement surfaces after the sprint planning is closed and the team has started work."
                                    - group [ref=e13120]:
                                        - generic "▸ Diagram" [ref=e13121] [cursor=pointer]
                                - listitem [ref=e13122]:
                                    - link "tree Status RAG — which color is correct?" [ref=e13123] [cursor=pointer]:
                                        - /url: ../../plugins/project-management/knowledge/pm-decision-trees.md
                                        - generic [ref=e13124]: tree
                                        - generic [ref=e13125]: Status RAG — which color is correct?
                                    - paragraph [ref=e13126]: 'Preparing a status report or steering pack and choosing the RAG (Red/Amber/Green) status for the project or a workstream. Observable trigger: a project manager asking "what color should this be?" — especially when there is pressure to show Green on a project with schedule or cost indicators in the amber range.'
                                    - group [ref=e13127]:
                                        - generic "▸ Diagram" [ref=e13128] [cursor=pointer]
