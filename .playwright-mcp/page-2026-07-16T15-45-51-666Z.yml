                                        - generic [ref=e4581]: tree
                                        - generic [ref=e4582]: Stateful recovery — how do I size and restore operator state?
                                    - paragraph [ref=e4583]: "a stateful processor (windowed aggregation, join, dedup store) needs a recovery and state-sizing strategy — choosing checkpoint/state-store config, the state backend, and how state is restored after a crash or rescale. Observable inputs: state size relative to memory, whether keys live forever or expire, the tolerable recovery time, and whether you ever rescale parallelism."
