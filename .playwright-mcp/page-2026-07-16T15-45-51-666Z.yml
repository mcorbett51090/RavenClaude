                                        - generic [ref=e11832]: Power BI — Copilot returns generic / wrong reports (which grounding layer to apply)
                                    - paragraph [ref=e11833]: 'Power BI **Copilot** (report narratives, "answer a question about the data", page generation) produces output that is generic, thin, or confidently wrong — and the model itself is functionally correct (visuals render, DAX is right). The fix is **grounding the semantic model for AI**, not redesigning visuals. Observable triggers: "the narrative just restates the numbers", "Copilot picked the wrong measure", "it doesn''t understand our terminology", "answers are inconsistent run-to-run". Traverse top-to-bottom and apply the **first** layer whose condition matches — but not'
