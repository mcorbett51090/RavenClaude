                    - group [ref=e2537]:
                        - generic "claude-app-engineering 12 trees · 35 practices" [ref=e2538] [cursor=pointer]:
                            - text: claude-app-engineering
                            - generic [ref=e2539]: 12 trees · 35 practices
                        - generic [ref=e2540]:
                            - heading "Decision trees 12" [level=4] [ref=e2541]:
                                - text: Decision trees
                                - generic [ref=e2542]: "12"
                            - list [ref=e2543]:
                                - listitem [ref=e2544]:
                                    - link "tree Async delivery — polling vs streaming vs webhook" [ref=e2545] [cursor=pointer]:
                                        - /url: ../../plugins/claude-app-engineering/knowledge/claude-app-decision-trees.md
                                        - generic [ref=e2546]: tree
                                        - generic [ref=e2547]: Async delivery — polling vs streaming vs webhook
                                    - paragraph [ref=e2548]: 'A Claude task is expected to run longer than a synchronous HTTP timeout, or uses the Batch API, or involves a multi-step agentic job. Observable triggers: client timeout errors on long jobs; high polling costs; "how do I deliver results to the user for a job that takes minutes?"'
                                    - group [ref=e2549]:
                                        - generic "▸ Diagram" [ref=e2550] [cursor=pointer]
                                - listitem [ref=e2551]:
                                    - link "tree Cache-hit-rate collapse — why isn't prompt caching saving money?" [ref=e2552] [cursor=pointer]:
                                        - /url: ../../plugins/claude-app-engineering/knowledge/cost-and-caching-decision-trees.md
                                        - generic [ref=e2553]: tree
                                        - generic [ref=e2554]: Cache-hit-rate collapse — why isn't prompt caching saving money?
                                    - paragraph [ref=e2555]: 'Prompt caching is configured (there''s a `cache_control` breakpoint) but the bill isn''t dropping as expected, or someone says "caching isn''t working." The single observable that drives the whole tree is the response `usage` block — specifically `cache_read_input_tokens` (served-from-cache, ~0.1×) vs `cache_creation_input_tokens` (written-to-cache, the ~1.25× / 2×-for-1h premium) across **repeated, same-shape** requests. Not for deciding *whether* to cache at all (that''s a "is the prefix large + reused?" question) — this is for diagnosing a cache that''s *configured but no'
                                    - group [ref=e2556]:
                                        - generic "▸ Diagram" [ref=e2557] [cursor=pointer]
                                - listitem [ref=e2558]:
                                    - link "tree Capability home — prompt-only vs in-process tool vs MCP server" [ref=e2559] [cursor=pointer]:
                                        - /url: ../../plugins/claude-app-engineering/knowledge/claude-app-decision-trees.md
                                        - generic [ref=e2560]: tree
                                        - generic [ref=e2561]: Capability home — prompt-only vs in-process tool vs MCP server
                                    - paragraph [ref=e2562]: "Claude needs to *do* something and the observable inputs are: does the task need an **external call/effect at all** (vs reasoning over what's already in context); is the capability **reused across apps/agents/clients** or app-specific; and is it **coupled to one app's state** or independently runnable. Not for Anthropic-hosted server tools (computer use / code execution / web / Files / memory — a separate category, [`server-side-tools-and-files.md`](server-side-tools-and-files.md))."
                                    - group [ref=e2563]:
                                        - generic "▸ Diagram" [ref=e2564] [cursor=pointer]
                                - listitem [ref=e2565]:
                                    - link "tree Claude Build Surface — choosing how to build a Claude-backed feature" [ref=e2566] [cursor=pointer]:
                                        - /url: ../../plugins/claude-app-engineering/knowledge/claude-build-surface-decision-tree.md
                                        - generic [ref=e2567]: tree
                                        - generic [ref=e2568]: Claude Build Surface — choosing how to build a Claude-backed feature
                                    - paragraph [ref=e2569]: 'The user asks "how should I build this Claude app?" / "Agent SDK or Managed Agents?" / "do I need an agent loop or just a Messages call?" — i.e. a Claude-backed feature needs a build surface and the observable inputs are: are you still prototyping a prompt; does Claude need to autonomously read/run/edit files + use tools in a loop; and if so, should the agent + sandbox run in *your* process/infra or be Anthropic-hosted (async/long-running, no infra to operate). Not for the deployment-target call (Claude API vs Bedrock/Vertex/Foundry — that''s a downstream residency/quota'
                                    - group [ref=e2570]:
                                        - generic "▸ Diagram" [ref=e2571] [cursor=pointer]
                                - listitem [ref=e2572]:
                                    - link "tree Context format — native document vs pre-extracted text vs Files API" [ref=e2573] [cursor=pointer]:
                                        - /url: ../../plugins/claude-app-engineering/knowledge/claude-app-decision-trees.md
                                        - generic [ref=e2574]: tree
                                        - generic [ref=e2575]: Context format — native document vs pre-extracted text vs Files API
                                    - paragraph [ref=e2576]: 'A document (PDF, image, long HTML page) must be fed to Claude and you must choose the input format. Observable triggers: "should I extract text before sending?"; "the PDF has charts I need Claude to read"; "I''m sending the same report to 50 requests today."'
                                    - group [ref=e2577]:
                                        - generic "▸ Diagram" [ref=e2578] [cursor=pointer]
                                - listitem [ref=e2579]:
                                    - link "tree Document input — native PDF/image, pre-extracted text, or Files API?" [ref=e2580] [cursor=pointer]:
                                        - /url: ../../plugins/claude-app-engineering/knowledge/claude-app-decision-trees.md
                                        - generic [ref=e2581]: tree
                                        - generic [ref=e2582]: Document input — native PDF/image, pre-extracted text, or Files API?
                                    - paragraph [ref=e2583]: "the app feeds **one document** (or a known small set) to Claude — a contract, invoice, report, scanned form — and the observable inputs are: does the task need the document's **visual layer** (layout, tables, figures, handwriting, charts) or just the **words**; is the **same document reused** across many requests/turns; and what's the **volume** (native document tokens are a real line item at scale). This is the _single-document input-mode_ fork; for answering over a _corpus_ (many documents, search), use the retrieval-strategy tree above instead. The failure it prevent"
                                    - group [ref=e2584]:
                                        - generic "▸ Diagram" [ref=e2585] [cursor=pointer]
                                - listitem [ref=e2586]:
                                    - link "tree Injection risk — should this content touch tool permissions?" [ref=e2587] [cursor=pointer]:
                                        - /url: ../../plugins/claude-app-engineering/knowledge/claude-app-decision-trees.md
                                        - generic [ref=e2588]: tree
                                        - generic [ref=e2589]: Injection risk — should this content touch tool permissions?
                                    - paragraph [ref=e2590]: 'A `tool_result`, retrieved document, fetched webpage, Files-API file, or user-supplied string is about to be inserted into the context window, and one or more tools in scope can perform destructive or privileged actions. Observable triggers: "can I pass this webhook payload to the model?"; "the user uploaded a PDF and I''m feeding it directly to an agent with write tools."'
                                    - group [ref=e2591]:
                                        - generic "▸ Diagram" [ref=e2592] [cursor=pointer]
                                - listitem [ref=e2593]:
                                    - link "tree Model selection — which Claude model for this task?" [ref=e2594] [cursor=pointer]:
                                        - /url: ../../plugins/claude-app-engineering/knowledge/claude-app-decision-trees.md
                                        - generic [ref=e2595]: tree
                                        - generic [ref=e2596]: Model selection — which Claude model for this task?
                                    - paragraph [ref=e2597]: "A request needs a model assigned and the observable inputs are the task *shape* — is it high-volume classification/extraction/triage; is it general app work (drafting, summarizing, moderate reasoning, tool use); or is it the genuinely hard reasoning tail (deep agentic work, multi-file refactors, hard analysis). Use this **after** the build surface is chosen ([`claude-build-surface-decision-tree.md`](claude-build-surface-decision-tree.md)) — surface and model are orthogonal. Not for the deployment-target call (Claude API vs Bedrock/Vertex/Foundry)."
                                    - group [ref=e2598]:
                                        - generic "▸ Diagram" [ref=e2599] [cursor=pointer]
                                - listitem [ref=e2600]:
                                    - link "tree Orchestration shape — single call vs workflow vs agent" [ref=e2601] [cursor=pointer]:
                                        - /url: ../../plugins/claude-app-engineering/knowledge/claude-app-decision-trees.md
                                        - generic [ref=e2602]: tree
                                        - generic [ref=e2603]: Orchestration shape — single call vs workflow vs agent
                                    - paragraph [ref=e2604]: "A multi-step Claude-backed task needs a structure and the observable inputs are: **can the steps be predetermined** (a fixed pipeline) or must they be **decided dynamically** by the model; if fixed, is it **one step or many**; and does the task need **iterative refinement to a checkable rubric**. Use this once the build surface is chosen ([`claude-build-surface-decision-tree.md`](claude-build-surface-decision-tree.md)) — orchestration shape and surface are related but distinct (a workflow can run on the Messages API; an agent implies the Agent SDK / Managed Agents)."
                                    - group [ref=e2605]:
                                        - generic "▸ Diagram" [ref=e2606] [cursor=pointer]
                                - listitem [ref=e2607]:
                                    - link "tree Retrieval strategy — long context vs Files API vs RAG" [ref=e2608] [cursor=pointer]:
                                        - /url: ../../plugins/claude-app-engineering/knowledge/claude-app-decision-trees.md
                                        - generic [ref=e2609]: tree
                                        - generic [ref=e2610]: Retrieval strategy — long context vs Files API vs RAG
                                    - paragraph [ref=e2611]: "Claude must answer over a corpus and the observable inputs are corpus **size** (does it fit under ~200K tokens [verify]), **volatility** (static vs dynamic/per-tenant/frequently-updated), the **shape per request** (a handful of known files vs search over a big/growing KB), and whether you **must surface citations**. Not the chunking/rerank *internals* (that's [`retrieval-and-rag-2026.md`](retrieval-and-rag-2026.md) once you're on the RAG branch)."
                                    - group [ref=e2612]:
                                        - generic "▸ Diagram" [ref=e2613] [cursor=pointer]
                                - listitem [ref=e2614]:
                                    - link "tree The cost-lever ladder — the Claude bill is too high; which lever first?" [ref=e2615] [cursor=pointer]:
                                        - /url: ../../plugins/claude-app-engineering/knowledge/cost-and-caching-decision-trees.md
                                        - generic [ref=e2616]: tree
                                        - generic [ref=e2617]: The cost-lever ladder — the Claude bill is too high; which lever first?
                                    - paragraph [ref=e2618]: "Spend on Claude is higher than wanted and you need to know which lever moves the most money for the least risk, **in order** — not to pull all of them at once. Observable inputs: is the same large context re-sent across requests; is every call on the flagship model; is the work latency-tolerant/offline; are outputs/`max_tokens` larger than needed. The metric throughout is **cost-per-resolved-task** (and the cache hit rate that multiplies it), **not** raw token count — a cheap call that fails and re-routes costs more than starting one rung up."
                                    - group [ref=e2619]:
                                        - generic "▸ Diagram" [ref=e2620] [cursor=pointer]
                                - listitem [ref=e2621]:
                                    - link "tree When to add an eval gate" [ref=e2622] [cursor=pointer]:
                                        - /url: ../../plugins/claude-app-engineering/knowledge/claude-app-decision-trees.md
                                        - generic [ref=e2623]: tree
                                        - generic [ref=e2624]: When to add an eval gate
                                    - paragraph [ref=e2625]: A change is about to ship and the observable input is **what kind of change** it is — a behavioral change to the prompt / model / tool definitions; a retrieval-pipeline change; a pure refactor with no behavior change; or a brand-new feature with no prior baseline. The question is whether CI needs an eval delta to gate it.
                                    - group [ref=e2626]:
                                        - generic "▸ Diagram" [ref=e2627] [cursor=pointer]
                            - heading "Best practices 35" [level=4] [ref=e2628]:
                                - text: Best practices
                                - generic [ref=e2629]: "35"
                            - list [ref=e2630]:
