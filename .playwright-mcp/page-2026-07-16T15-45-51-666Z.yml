                                    - paragraph [ref=e6686]: A DCF model has reached the end of the explicit forecast period and requires a terminal value. The analyst must choose between the Gordon Growth Model (perpetuity growth) and an exit-multiple approach, and must decide whether to apply both as a cross-check or rely on one.
