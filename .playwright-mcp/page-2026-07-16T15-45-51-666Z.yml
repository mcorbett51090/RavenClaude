                            - generic [ref=e12551]: 11 trees · 21 practices
                        - generic [ref=e12552]:
                            - heading "Decision trees 11" [level=4] [ref=e12553]:
                                - text: Decision trees
                                - generic [ref=e12554]: "11"
                            - list [ref=e12555]:
                                - listitem [ref=e12556]:
                                    - link "tree Can I trust this measurement? (MSA / Gage R&R triage)" [ref=e12557] [cursor=pointer]:
                                        - /url: ../../plugins/process-improvement/knowledge/process-improvement-decision-trees.md
                                        - generic [ref=e12558]: tree
                                        - generic [ref=e12559]: Can I trust this measurement? (MSA / Gage R&R triage)
                                    - paragraph [ref=e12560]: 'you are about to baseline (or have baselined) on measured data and must confirm the *measurement system itself* isn''t the source of the variation you''re chasing. The observable trigger is "we have numbers" — **before** you trust them. This is the gate that protects house opinion #1 (measure before you change) from being built on sand.'
                                    - group [ref=e12561]:
                                        - generic "▸ Diagram" [ref=e12562] [cursor=pointer]
                                - listitem [ref=e12563]:
                                    - link "tree Capability study came back low — what now?" [ref=e12564] [cursor=pointer]:
                                        - /url: ../../plugins/process-improvement/knowledge/spc-response-decision-trees.md
                                        - generic [ref=e12565]: tree
                                        - generic [ref=e12566]: Capability study came back low — what now?
                                    - paragraph [ref=e12567]: you ran a capability study and Cpk/Ppk landed below the target (typically < 1.33). The observable trigger is **a capability index plus its spec limits**, and the question "what do we actually change?". The wrong move is to "tighten the process" generically; the right move depends on *why* the index is low — spread, centering, or instability — which are different fixes.
                                    - group [ref=e12568]:
                                        - generic "▸ Diagram" [ref=e12569] [cursor=pointer]
                                - listitem [ref=e12570]:
                                    - link "tree Common cause or special cause — how do I respond? (the anti-tampering gate)" [ref=e12571] [cursor=pointer]:
                                        - /url: ../../plugins/process-improvement/knowledge/spc-response-decision-trees.md
                                        - generic [ref=e12572]: tree
                                        - generic [ref=e12573]: Common cause or special cause — how do I respond? (the anti-tampering gate)
                                    - paragraph [ref=e12574]: a metric moved, a week looks "bad", a control chart has a new point, or a manager wants to react. The observable trigger is **a request to act on a single observation or a short-run movement**. This is the most damaging decision in day-to-day process management, because the default human reaction — adjust in response to every dip — is precisely the error.
                                    - group [ref=e12575]:
                                        - generic "▸ Diagram" [ref=e12576] [cursor=pointer]
                                - listitem [ref=e12577]:
                                    - link "tree DMAIC phase gate — can we proceed to the next phase?" [ref=e12578] [cursor=pointer]:
                                        - /url: ../../plugins/process-improvement/knowledge/process-improvement-decision-trees.md
                                        - generic [ref=e12579]: tree
                                        - generic [ref=e12580]: DMAIC phase gate — can we proceed to the next phase?
                                    - paragraph [ref=e12581]: 'A DMAIC tollgate review is in progress and the team must decide whether to advance, return, or conditionally pass. Observable trigger: end of a DMAIC phase; a sponsor or project manager asking "are we ready to move on?"; a phase deliverable is claimed complete.'
                                    - group [ref=e12582]:
                                        - generic "▸ Diagram" [ref=e12583] [cursor=pointer]
                                - listitem [ref=e12584]:
                                    - link "tree Is this process capable / in control? (triage)" [ref=e12585] [cursor=pointer]:
                                        - /url: ../../plugins/process-improvement/knowledge/process-improvement-decision-trees.md
                                        - generic [ref=e12586]: tree
                                        - generic [ref=e12587]: Is this process capable / in control? (triage)
                                    - paragraph [ref=e12588]: You have process data and are asked "how good is this process?" / "is it meeting spec?". The observable trigger is data + a spec/target, and the need to decide *control first, capability second*.
                                    - group [ref=e12589]:
                                        - generic "▸ Diagram" [ref=e12590] [cursor=pointer]
                                - listitem [ref=e12591]:
                                    - link "tree Kaizen event or full DMAIC?" [ref=e12592] [cursor=pointer]:
                                        - /url: ../../plugins/process-improvement/knowledge/process-improvement-decision-trees.md
                                        - generic [ref=e12593]: tree
                                        - generic [ref=e12594]: Kaizen event or full DMAIC?
                                    - paragraph [ref=e12595]: 'An improvement need has been identified and the team must decide the vehicle. Observable trigger: a complaint, a missed metric, or a manager saying "we need to fix this" — before any project work begins.'
                                    - group [ref=e12596]:
                                        - generic "▸ Diagram" [ref=e12597] [cursor=pointer]
