                                    - link "Pattern — strong default whenever the goal is throughput/lead-time. Local improvements away from the constraint feel productive and change nothing the customer sees. Deviate only when the \"sub-process\" is itself the constraint, or the work is a quick win with near-zero cost. Optimize the constraint, not a sub-process — speeding a non-bottleneck step doesn't speed the system" [ref=e12687] [cursor=pointer]:
