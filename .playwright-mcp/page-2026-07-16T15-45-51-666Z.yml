                                    - paragraph [ref=e4197]: "a dashboard must be embedded and you must choose how the embed authenticates the viewer's tenant scope. Observable inputs: is the dashboard tenant-scoped at all, is it interactive (filters/drill) vs. static, and is it Power BI (Azure AD) vs. an app-issued-JWT tool (Cube/Superset/Metabase)."
                                    - group [ref=e4198]:
