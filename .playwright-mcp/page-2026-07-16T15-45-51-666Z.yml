                                        - generic [ref=e1492]: tree
                                        - generic [ref=e1493]: AWS IAM — role, federated identity, or long-lived key?
                                    - paragraph [ref=e1494]: "A workload, a CI/CD pipeline, or a human needs AWS credentials. The observable inputs are: what is the caller (EC2 instance, ECS task, Lambda, Kubernetes pod, GitHub Actions runner, human developer), and where does it run. The goal is the shortest-lived credential possible for the job."
