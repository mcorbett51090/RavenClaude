                                        - generic [ref=e6677]: tree
                                        - generic [ref=e6678]: Valuation — which ERP source for this engagement
                                    - paragraph [ref=e6679]: you are building a cost of equity and must choose an equity-risk-premium source. The ERP is the single most consequential and most contested WACC input; the choice must be **paired consistently** with the risk-free convention (§ below) — do not mix schools.
