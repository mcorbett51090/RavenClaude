                                    - link "Absolute rule — a carve-out from a BMA *licence* requirement does **not** remove the entity's *AML/ATF* obligations; conflating the two is a recurring, examinable error. BMA — a licensing exemption is not an AML exemption" [ref=e13911] [cursor=pointer]:
                                        - /url: ../../plugins/regulatory-compliance/best-practices/bma-a-licensing-exemption-is-not-an-aml-exemption.md
                                        - generic [ref=e13912]: Absolute rule — a carve-out from a BMA *licence* requirement does **not** remove the entity's *AML/ATF* obligations; conflating the two is a recurring, examinable error.
                                        - generic [ref=e13913]: BMA — a licensing exemption is not an AML exemption
