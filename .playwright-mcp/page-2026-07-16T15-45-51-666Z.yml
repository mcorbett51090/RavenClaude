                                - listitem [ref=e16203]:
                                    - link "Pattern — format every shipped view for fast reading and for users who can't perceive color, contrast, or fine detail; treat accessibility as a build requirement, not a polish step. Format for legibility and accessibility — color is never the only channel" [ref=e16204] [cursor=pointer]:
                                        - /url: ../../plugins/tableau/best-practices/viz-formatting-and-accessibility.md
                                        - generic [ref=e16205]: Pattern — format every shipped view for fast reading and for users who can't perceive color, contrast, or fine detail; treat accessibility as a build requirement, not a polish step.
