                                        - /url: ../../plugins/game-development/knowledge/gamedev-runtime-performance-decision-trees.md
                                        - generic [ref=e7756]: tree
                                        - generic [ref=e7757]: The frame is over budget — which subsystem owns it
                                    - paragraph [ref=e7758]: "the game misses its frame-time budget — either a low *average* frame rate (sustained over budget) or a periodic *hitch* (occasional spike over budget while the average looks fine). Observable inputs: target FPS → ms budget, a captured frame profile, the CPU-vs-GPU split, draw-call count, and managed-allocation-per-frame."
