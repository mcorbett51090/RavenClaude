                                    - paragraph [ref=e7765]: "a new project (or a deliberate re-platform) is choosing an engine. Observable inputs: team's existing expertise, target platforms, genre/3D-vs-2D, source-access / royalty constraints, and whether a hard technical requirement rules an engine in or out."
