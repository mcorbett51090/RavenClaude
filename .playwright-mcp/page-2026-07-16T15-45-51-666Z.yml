                            - generic [ref=e1677]: 12 trees · 31 practices
                        - generic [ref=e1678]:
                            - heading "Decision trees 12" [level=4] [ref=e1679]:
                                - text: Decision trees
                                - generic [ref=e1680]: "12"
                            - list [ref=e1681]:
                                - listitem [ref=e1682]:
                                    - link "tree Azure Compute — selecting a host for an app workload" [ref=e1683] [cursor=pointer]:
                                        - /url: ../../plugins/azure-cloud/knowledge/azure-compute-decision-tree.md
                                        - generic [ref=e1684]: tree
                                        - generic [ref=e1685]: Azure Compute — selecting a host for an app workload
                                    - paragraph [ref=e1686]: 'The user asks "where should this run?" / "which Azure compute for X?" / "should this be on AKS?" — i.e. a workload needs a host and the observable inputs are its shape (static SPA, event-driven/spiky, containerized, plain HTTP web app) and whether it needs the Kubernetes API, a service mesh, GPU node pools, or multi-workload isolation. Not for the data tier (Azure SQL / Cosmos / PostgreSQL — `azure-architect`) and not for the AI hosting layer (Foundry — [`azure-ai-foundry.md`](azure-ai-foundry.md)).'
                                    - group [ref=e1687]:
                                        - generic "▸ Diagram" [ref=e1688] [cursor=pointer]
                                - listitem [ref=e1689]:
                                    - link "tree Azure FinOps — which cost lever to pull first?" [ref=e1690] [cursor=pointer]:
                                        - /url: ../../plugins/azure-cloud/knowledge/azure-compute-decision-tree.md
                                        - generic [ref=e1691]: tree
                                        - generic [ref=e1692]: Azure FinOps — which cost lever to pull first?
                                    - paragraph [ref=e1693]: "An Azure subscription bill is higher than expected, a budget alert has fired, or the team is asked to reduce Azure spend. The observable inputs are: which resource types dominate the bill, and whether the usage patterns are appropriate."
                                    - group [ref=e1694]:
                                        - generic "▸ Diagram" [ref=e1695] [cursor=pointer]
                                - listitem [ref=e1696]:
                                    - link "tree Azure IaC — Bicep vs Terraform for an estate" [ref=e1697] [cursor=pointer]:
                                        - /url: ../../plugins/azure-cloud/knowledge/azure-iac-decision-and-bicep.md
                                        - generic [ref=e1698]: tree
                                        - generic [ref=e1699]: Azure IaC — Bicep vs Terraform for an estate
                                    - paragraph [ref=e1700]: 'The user asks "Bicep or Terraform?" / "which IaC tool for our Azure work?" — i.e. a new IaC effort is starting and the observable inputs are: is the estate **Azure-only** or **multi/hybrid-cloud**, and is there an **existing Terraform estate** the team already operates. Not for *how* to author a specific resource (that''s the AVM/module question, downstream of this call).'
                                    - group [ref=e1701]:
                                        - generic "▸ Diagram" [ref=e1702] [cursor=pointer]
                                - listitem [ref=e1703]:
                                    - link "tree Azure Identity — managed identity, WIF, or app registration?" [ref=e1704] [cursor=pointer]:
                                        - /url: ../../plugins/azure-cloud/knowledge/azure-compute-decision-tree.md
                                        - generic [ref=e1705]: tree
                                        - generic [ref=e1706]: Azure Identity — managed identity, WIF, or app registration?
                                    - paragraph [ref=e1707]: "A workload, CI/CD pipeline, or service needs to authenticate to Azure APIs or other Entra-protected resources. The observable inputs are: where does the caller run (Azure compute, GitHub Actions, external service, developer laptop) and whether the caller is a human or a workload."
                                    - group [ref=e1708]:
                                        - generic "▸ Diagram" [ref=e1709] [cursor=pointer]
                                - listitem [ref=e1710]:
                                    - link "tree Azure Integration — choosing a messaging/integration technology" [ref=e1711] [cursor=pointer]:
                                        - /url: ../../plugins/azure-cloud/knowledge/azure-integration-decision.md
                                        - generic [ref=e1712]: tree
                                        - generic [ref=e1713]: Azure Integration — choosing a messaging/integration technology
                                    - paragraph [ref=e1714]: 'The user asks "connect these systems" / "Service Bus or Event Grid?" / "how do we publish this API?" — i.e. two or more systems need to be wired together on Azure and the observable input is the *kind* of integration: a designer-first workflow/orchestration, a reliable command, a reactive event notification, high-throughput streaming/telemetry, a published/governed API, or custom serverless glue. Not for the Power-Automate-vs-Logic-Apps ownership call (that''s the seam table above, owned initially by `power-platform/flow-engineer`).'
                                    - group [ref=e1715]:
                                        - generic "▸ Diagram" [ref=e1716] [cursor=pointer]
                                - listitem [ref=e1717]:
                                    - link "tree Azure networking — Private Endpoint vs Service Endpoint vs VNet Integration" [ref=e1718] [cursor=pointer]:
                                        - /url: ../../plugins/azure-cloud/knowledge/azure-compute-decision-tree.md
                                        - generic [ref=e1719]: tree
                                        - generic [ref=e1720]: Azure networking — Private Endpoint vs Service Endpoint vs VNet Integration
                                    - paragraph [ref=e1721]: "A PaaS resource (Storage, Key Vault, SQL, Cosmos, Container Registry, Service Bus) needs to be reachable from a VNet without being public. The observable inputs are: does the resource need a private IP in the VNet, does it need to be reachable from on-premises, and is the team using Private DNS."
                                    - group [ref=e1722]:
                                        - generic "▸ Diagram" [ref=e1723] [cursor=pointer]
                                - listitem [ref=e1724]:
                                    - link "tree Compute — which Azure host for a workload (cross-reference)" [ref=e1725] [cursor=pointer]:
                                        - /url: ../../plugins/azure-cloud/knowledge/azure-decision-trees.md
                                        - generic [ref=e1726]: tree
                                        - generic [ref=e1727]: Compute — which Azure host for a workload (cross-reference)
                                    - paragraph [ref=e1728]: '"Where should this run?" / "which Azure compute for X?" / "should this be AKS?" — a workload needs a host. This is a pointer; the **canonical, fully-elaborated tree** (with per-leaf `requires:` notes and the prod-floor tradeoffs table) is in [`azure-compute-decision-tree.md`](azure-compute-decision-tree.md). Traverse it there.'
                                    - group [ref=e1729]:
                                        - generic "▸ Diagram" [ref=e1730] [cursor=pointer]
                                - listitem [ref=e1731]:
                                    - link "tree IaC approach — Bicep vs Terraform vs portal-then-export" [ref=e1732] [cursor=pointer]:
                                        - /url: ../../plugins/azure-cloud/knowledge/azure-decision-trees.md
                                        - generic [ref=e1733]: tree
                                        - generic [ref=e1734]: IaC approach — Bicep vs Terraform vs portal-then-export
                                    - paragraph [ref=e1735]: 'A new IaC effort is starting (or someone is about to click in the portal) and you must pick the **authoring approach** — the observable inputs are *Azure-only vs multi/hybrid-cloud*, *an existing Terraform estate*, and *whether the change is exploratory or production-bound*. The tool sub-choice (Bicep vs Terraform mechanics) is elaborated in [`azure-iac-decision-and-bicep.md`](azure-iac-decision-and-bicep.md); this tree adds the **portal-then-export** branch and the "never click-ops prod" guardrail.'
                                    - group [ref=e1736]:
                                        - generic "▸ Diagram" [ref=e1737] [cursor=pointer]
                                - listitem [ref=e1738]:
                                    - link "tree Identity — managed identity vs workload identity federation vs service principal" [ref=e1739] [cursor=pointer]:
                                        - /url: ../../plugins/azure-cloud/knowledge/azure-decision-trees.md
                                        - generic [ref=e1740]: tree
                                        - generic [ref=e1741]: Identity — managed identity vs workload identity federation vs service principal
                                    - paragraph [ref=e1742]: "A workload, pipeline, or external system **needs an identity to call Azure** and you must pick how it authenticates — the observable inputs are *where the caller runs* (inside Azure / in CI/CD or another cloud / a legacy system with no federation) and whether a federation trust can be established. Not for *what the identity can do* (that's RBAC — see the [`identity-rbac-least-privilege-and-custom-roles.md`](../best-practices/identity-rbac-least-privilege-and-custom-roles.md) rule), and not for human sign-in (Conditional Access)."
                                    - group [ref=e1743]:
                                        - generic "▸ Diagram" [ref=e1744] [cursor=pointer]
                                - listitem [ref=e1745]:
                                    - link "tree Network Topology — single VNet vs hub-spoke vs Virtual WAN" [ref=e1746] [cursor=pointer]:
                                        - /url: ../../plugins/azure-cloud/knowledge/azure-decision-trees.md
                                        - generic [ref=e1747]: tree
                                        - generic [ref=e1748]: Network Topology — single VNet vs hub-spoke vs Virtual WAN
                                    - paragraph [ref=e1749]: "You're designing the **connectivity layer** for an estate and must choose a topology — the observable inputs are *how many regions*, *whether you aggregate branches / VPN / ExpressRoute*, *how many spokes/peerings* you'd hand-manage, and *how much transit plumbing you want Microsoft to own*. Not for spoke-internal segmentation (that's NSGs/subnets — the [`network-segment-subnets-with-nsgs-and-forced-egress.md`](../best-practices/network-segment-subnets-with-nsgs-and-forced-egress.md) rule)."
                                    - group [ref=e1750]:
                                        - generic "▸ Diagram" [ref=e1751] [cursor=pointer]
                                - listitem [ref=e1752]:
                                    - link "tree Region / Data Residency Selection" [ref=e1753] [cursor=pointer]:
                                        - /url: ../../plugins/azure-cloud/knowledge/azure-decision-trees.md
                                        - generic [ref=e1754]: tree
                                        - generic [ref=e1755]: Region / Data Residency Selection
                                    - paragraph [ref=e1756]: You're choosing **which Azure region** to deploy into — the observable inputs are *a data-residency/sovereignty requirement*, *whether the chosen region has availability zones*, *where its paired region sits*, and *whether the needed service exists in-region*. The trap is picking by latency/cost first; residency must gate the choice because **region is effectively immutable** (resources can't move regions).
                                    - group [ref=e1757]:
                                        - generic "▸ Diagram" [ref=e1758] [cursor=pointer]
                                - listitem [ref=e1759]:
                                    - link "tree Secret Store — where does this secret/credential live?" [ref=e1760] [cursor=pointer]:
                                        - /url: ../../plugins/azure-cloud/knowledge/azure-decision-trees.md
                                        - generic [ref=e1761]: tree
                                        - generic [ref=e1762]: Secret Store — where does this secret/credential live?
                                    - paragraph [ref=e1763]: A workload needs a **secret, key, certificate, or credential** and you must decide where it lives and how it's read — the observable inputs are *whether the target service supports managed identity natively*, *whether the secret is app config vs a cryptographic key/cert*, and *whether the consuming compute supports Key Vault references*. The default answer is increasingly "no secret at all."
                                    - group [ref=e1764]:
                                        - generic "▸ Diagram" [ref=e1765] [cursor=pointer]
