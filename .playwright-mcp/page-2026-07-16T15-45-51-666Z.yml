                                        - generic [ref=e7745]: tree
                                        - generic [ref=e7746]: Monetization design — which model for this game
                                    - paragraph [ref=e7747]: "a new game project is evaluating which monetization model to build around. Observable inputs: target platform, target audience, core-loop type, and competitive genre context."
