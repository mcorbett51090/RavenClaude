                                        - generic [ref=e15770]: tree
                                        - generic [ref=e15771]: Placement Model — Contract vs. Contract-to-Hire vs. Direct (Perm)
                                    - paragraph [ref=e15772]: 'the firm (or a client) is choosing the **commercial model** for filling a need — a temp/contract placement (markup on an hourly spread), a contract-to-hire (temp spread now, conversion fee later), or a direct/perm placement (one-time fee, % of salary). The question is which model fits the demand shape and the firm''s margin/cash profile, not how to source the candidate. Observable entry signal: "should we place this contract or perm?", a client asking to convert a contractor, or a margin-mix decision about which models the desk should favor.'
                                    - group [ref=e15773]:
                                        - generic "▸ Diagram" [ref=e15774] [cursor=pointer]
