                                    - paragraph [ref=e9042]: "a prospective client has described a new matter and the firm must decide whether to take it, decline it, or escalate a question before any engagement letter is drafted. Intake is **risk management, not a sales step** — the conflict check and fit/viability screen run *before* the engagement, because the worst client is the one you should have declined (§3 #2)."
