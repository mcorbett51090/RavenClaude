                                - listitem [ref=e5574]:
                                    - link "tree Account health → first action (green / yellow / red)" [ref=e5575] [cursor=pointer]:
                                        - /url: ../../plugins/edtech-partner-success/knowledge/partner-success-decision-trees.md
                                        - generic [ref=e5576]: tree
                                        - generic [ref=e5577]: Account health → first action (green / yellow / red)
                                    - paragraph [ref=e5578]: "a partner's composite health band has just changed, OR you're doing a routine pulse and need the first action for a partner sitting in a given band. Observable inputs: the band (green / yellow / red), whether a red-flag trigger fired independently, last-successful-sync recency, calendar phase, and score-drift suspicion. This is the *triage* step; declining/red cases hand off to the play-selection router."
                                    - group [ref=e5579]:
                                        - generic "▸ Diagram" [ref=e5580] [cursor=pointer]
                                - listitem [ref=e5581]:
                                    - link "tree Adoption intervention — which lever for a low-utilization read" [ref=e5582] [cursor=pointer]:
                                        - /url: ../../plugins/edtech-partner-success/knowledge/adoption-and-expansion-decision-trees.md
                                        - generic [ref=e5583]: tree
                                        - generic [ref=e5584]: Adoption intervention — which lever for a low-utilization read
                                    - paragraph [ref=e5585]: "the **license/seat-utilization** metric has come back low (a meaningful fraction of provisioned seats have <N meaningful sessions in the last 90 days), and the PSM must decide *which adoption intervention* to run — **before** reaching for any commercial motion. This is the deeper traversal beneath the play-selection router's IMPLEMENTATION / ADOPTION branches. Observable inputs: last-successful-rostering-sync recency + row-count stability, calendar phase, adoption stage, whether the train-the-trainer cascade reached the dead segment, and whether a competing/overlapping"
                                    - group [ref=e5586]:
                                        - generic "▸ Diagram" [ref=e5587] [cursor=pointer]
                                - listitem [ref=e5588]:
                                    - link "tree AI in EdTech — how to respond to a district partner asking about AI policy" [ref=e5589] [cursor=pointer]:
                                        - /url: ../../plugins/edtech-partner-success/knowledge/partner-success-decision-trees.md
                                        - generic [ref=e5590]: tree
                                        - generic [ref=e5591]: AI in EdTech — how to respond to a district partner asking about AI policy
                                    - paragraph [ref=e5592]: "a district administrator, curriculum director, or school board member asks about the vendor's AI features, data practices, or the district's own AI policy for student use. Observable inputs: whether the question is about the vendor's AI tools, the district's student-facing AI use, or FERPA / COPPA implications."
                                    - group [ref=e5593]:
                                        - generic "▸ Diagram" [ref=e5594] [cursor=pointer]
                                - listitem [ref=e5595]:
                                    - link "tree Escalate to the executive sponsor — or not" [ref=e5596] [cursor=pointer]:
                                        - /url: ../../plugins/edtech-partner-success/knowledge/partner-success-decision-trees.md
                                        - generic [ref=e5597]: tree
                                        - generic [ref=e5598]: Escalate to the executive sponsor — or not
                                    - paragraph [ref=e5599]: "an issue has surfaced (a stalled commitment, a recovery target missed, a cross-functional blocker, a renewal at risk) and the PSM must decide whether to pull the executive sponsor in. Observable inputs: whether the issue is within PSM authority, whether lower escalation tiers have been exhausted, the blast radius / reversibility, and whether a live exec sponsor exists."
                                    - group [ref=e5600]:
                                        - generic "▸ Diagram" [ref=e5601] [cursor=pointer]
                                - listitem [ref=e5602]:
                                    - link "tree Expand or stabilize — gating an expansion motion" [ref=e5603] [cursor=pointer]:
                                        - /url: ../../plugins/edtech-partner-success/knowledge/adoption-and-expansion-decision-trees.md
                                        - generic [ref=e5604]: tree
                                        - generic [ref=e5605]: Expand or stabilize — gating an expansion motion
                                    - paragraph [ref=e5606]: "a partner looks like an expansion candidate (a seat / module / department / tier-upgrade / multi-year opportunity is on the table) and the PSM must decide whether to **open the expansion motion now** or **stabilize first**. This operationalizes the expansion 3-gate model (top-quartile health AND demonstrable adoption AND organizational readiness) as a traversable tree, with the don't-sell discipline baked in. Observable inputs: health band/quartile, an earned-value trigger, named-decision-maker liveness, recent leadership transition, adoption depth vs. breadth, and rene"
                                    - group [ref=e5607]:
                                        - generic "▸ Diagram" [ref=e5608] [cursor=pointer]
